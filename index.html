<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فريق AI Agents - نظام الأرباح الذكي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #666;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card .currency {
            font-size: 1rem;
            color: #999;
        }

        /* Agents Grid */
        .agents-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .agents-section h2 {
            color: #333;
            margin-bottom: 20px;
            border-right: 4px solid #667eea;
            padding-right: 15px;
        }

        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .agent-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
        }

        .agent-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102,126,234,0.2);
        }

        .agent-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .agent-role {
            color: #667eea;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .agent-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        .status-active {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        /* Earnings Table */
        .earnings-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .earnings-section h2 {
            color: #333;
            margin-bottom: 20px;
            border-right: 4px solid #667eea;
            padding-right: 15px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f8f9fa;
            color: #333;
            font-weight: bold;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .refresh-btn:hover {
            background: #5a67d8;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            .stat-card .value {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 فريق AI Agents</h1>
            <p>9 وكلاء اصطناعيين يعملون بشكل تلقائي لجني الأرباح</p>
            <div class="badge">🟢 النظام يعمل 24/7</div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h3>💰 إجمالي الأرباح</h3>
                <div class="value" id="totalEarnings">0</div>
                <div class="currency">درهم</div>
            </div>
            <div class="stat-card">
                <h3>📊 عدد العمليات</h3>
                <div class="value" id="transactionCount">0</div>
            </div>
            <div class="stat-card">
                <h3>✅ العمليات المكتملة</h3>
                <div class="value" id="completedCount">0</div>
            </div>
            <div class="stat-card">
                <h3>⏳ قيد الانتظار</h3>
                <div class="value" id="pendingCount">0</div>
            </div>
        </div>

        <div class="agents-section">
            <h2>🧠 فريق الـ 9 وكلاء</h2>
            <div class="agents-grid" id="agentsGrid"></div>
        </div>

        <div class="earnings-section">
            <button class="refresh-btn" onclick="loadData()">🔄 تحديث البيانات</button>
            <h2>📋 سجل الأرباح</h2>
            <div class="table-container">
                <table id="earningsTable">
                    <thead>
                        <tr><th>المنصة</th><th>المبلغ</th><th>المصدر</th><th>الحالة</th><th>التاريخ</th></tr>
                    </thead>
                    <tbody id="earningsBody">
                        <tr><td colspan="5" class="loading">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // قائمة الوكلاء
        const agents = [
            { name: "المدير التنفيذي", role: "إدارة الفريق واتخاذ القرارات", status: "active" },
            { name: "محلل البيانات", role: "تحليل الأداء وتقديم التقارير", status: "active" },
            { name: "مدير المنصات", role: "إدارة حسابات المنصات", status: "active" },
            { name: "مدير الخدمات", role: "تنفيذ الخدمات التقنية", status: "active" },
            { name: "المسوق الرقمي", role: "التسويق وجلب العملاء", status: "active" },
            { name: "مدير المحتوى", role: "إنشاء المحتوى للتسويق", status: "active" },
            { name: "المحاسب", role: "تتبع الأرباح والمصروفات", status: "active" },
            { name: "مطور الويب", role: "تطوير وصيانة الواجهات", status: "active" },
            { name: "مطور الألعاب", role: "تطوير الألعاب (قريباً)", status: "pending" }
        ];

        // عرض الوكلاء
        function displayAgents() {
            const container = document.getElementById('agentsGrid');
            container.innerHTML = agents.map(agent => `
                <div class="agent-card">
                    <div class="agent-name">${agent.name}</div>
                    <div class="agent-role">${agent.role}</div>
                    <span class="agent-status ${agent.status === 'active' ? 'status-active' : 'status-pending'}">
                        ${agent.status === 'active' ? '🟢 يعمل' : '⏳ قيد الإعداد'}
                    </span>
                </div>
            `).join('');
        }

        // جلب البيانات من API
        async function loadData() {
            try {
                // جلب الأرباح
                const earningsRes = await fetch('/api/earnings');
                const earningsData = await earningsRes.json();
                
                if (earningsData.success) {
                    displayEarnings(earningsData.data);
                    updateStats(earningsData.data);
                } else {
                    showError('فشل في تحميل الأرباح');
                }
                
                // جلب الإجمالي
                const totalRes = await fetch('/api/earnings/total');
                const totalData = await totalRes.json();
                if (totalData.success) {
                    document.getElementById('totalEarnings').innerText = totalData.total.toFixed(2);
                }
                
            } catch (error) {
                console.error('Error:', error);
                showError('لا يمكن الاتصال بالسيرفر. تأكد من تشغيل السيرفر.');
            }
        }

        // عرض الأرباح في الجدول
        function displayEarnings(earnings) {
            const tbody = document.getElementById('earningsBody');
            
            if (!earnings || earnings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="loading">لا توجد أرباح مسجلة بعد</td></tr>';
                return;
            }
            
            tbody.innerHTML = earnings.map(item => `
                <tr>
                    <td>${item.platform || '-'}</td>
                    <td><strong>${parseFloat(item.amount).toFixed(2)}</strong> درهم</td>
                    <td>${item.source || '-'}</td>
                    <td><span class="status-badge status-${item.status}">${item.status === 'completed' ? '✅ مكتمل' : '⏳ قيد الانتظار'}</span></td>
                    <td>${new Date(item.date).toLocaleString('ar-MA')}</td>
                </tr>
            `).join('');
        }

        // تحديث الإحصائيات
        function updateStats(earnings) {
            const total = earnings.reduce((sum, item) => sum + parseFloat(item.amount), 0);
            const completed = earnings.filter(e => e.status === 'completed').length;
            const pending = earnings.filter(e => e.status === 'pending').length;
            
            document.getElementById('totalEarnings').innerText = total.toFixed(2);
            document.getElementById('transactionCount').innerText = earnings.length;
            document.getElementById('completedCount').innerText = completed;
            document.getElementById('pendingCount').innerText = pending;
        }

        // عرض خطأ
        function showError(message) {
            const tbody = document.getElementById('earningsBody');
            tbody.innerHTML = `<tr><td colspan="5" class="error">⚠️ ${message}</td></tr>`;
        }

        // تحميل البيانات عند فتح الصفحة
        displayAgents();
        loadData();
        
        // تحديث تلقائي كل 30 ثانية
        setInterval(loadData, 30000);
    </script>
</body>
</html>
