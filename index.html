<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>realteam | Redirecting...</title>
    <script>
        // قائمة اللغات المدعومة وملفاتها
        const languages = {
            ar: { file: 'ar.html', name: 'العربية', priority: 1 },   // العربية
            en: { file: 'en.html', name: 'English', priority: 2 },    // الإنجليزية
            fr: { file: 'fr.html', name: 'Français', priority: 3 },    // الفرنسية
            es: { file: 'es.html', name: 'Español', priority: 4 },     // الإسبانية
            de: { file: 'de.html', name: 'Deutsch', priority: 5 },     // الألمانية
            zh: { file: 'zh.html', name: '中文', priority: 6 }          // الصينية
        };

        // 1. الحصول على لغة المتصفح (مثال: 'ar', 'en-US' -> 'en')
        let userLang = (navigator.language || navigator.userLanguage || 'en').split('-')[0];
        
        // 2. التحقق من وجود اللغة في قائمتنا
        let targetLang = languages[userLang] ? userLang : 'en';
        
        // 3. (اختياري) يمكنك أيضاً فحص Geolocation API لتحديد البلد وتحسين الدقة
        //    لكننا سنكتفي بلغة المتصفح للتبسيط.

        // 4. إعادة التوجيه إلى الملف المناسب
        window.location.href = languages[targetLang].file;
    </script>
</head>
<body>
    <p>جاري إعادة التوجيه إلى النسخة المناسبة...</p>
    <p>Redirecting to your language...</p>
</body>
</html>
