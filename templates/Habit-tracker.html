<!DOCTYPE html>
<html lang="{{LANG}}" dir="{{DIR}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>{{GAME_NAME}}</title>
<style>
:root{--acc:{{ACCENT}};--acc-rgb:{{ACCENT_RGB}};--bg:#0a0a14;--surface:#12121f;--text:#f1f5f9;--text2:#7a7a8a;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Segoe UI',Tajawal,sans-serif;color:var(--text);user-select:none;-webkit-user-select:none;}
#app{display:flex;flex-direction:column;width:100%;max-width:420px;height:100dvh;margin:0 auto;overflow-y:auto;}
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(0,0,0,0.5);border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:10;}
#back-btn{background:none;border:1px solid rgba(255,255,255,0.2);color:var(--text2);padding:4px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:0.7rem;}
#game-title{font-weight:900;font-size:1rem;color:var(--acc);}
#streak-bar{display:flex;align-items:center;justify-content:center;padding:12px 16px;background:var(--surface);gap:8px;font-weight:700;}
.streak-flame{font-size:1.5rem;}
.streak-num{font-size:1.8rem;color:var(--acc);font-family:monospace;}
.habit-list{flex:1;padding:8px 16px;display:flex;flex-direction:column;gap:10px;}
.habit-row{background:var(--surface);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;}
.habit-info{display:flex;align-items:center;gap:10px;}
.habit-emoji{font-size:1.5rem;}
.habit-name{font-weight:700;}
.habit-days{display:flex;gap:4px;}
.day-dot{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:0.7rem;cursor:pointer;transition:all 0.2s;}
.day-dot.done{background:var(--acc);border-color:var(--acc);color:#000;}
.day-dot.today{border:2px solid var(--acc);}
#add-habit{background:var(--acc);color:#000;border:none;padding:12px 24px;border-radius:10px;font-weight:700;margin:8px 16px 16px;cursor:pointer;font-family:inherit;font-size:0.85rem;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <button id="back-btn" onclick="history.back()">← {{BACK_LBL}}</button>
    <div id="game-title">{{EMOJI}} {{GAME_NAME}}</div>
    <div style="width:50px"></div>
  </div>
  <div id="streak-bar">
    <span class="streak-flame">🔥</span>
    <span class="streak-num" id="streakNum">0</span>
    <span style="font-size:0.8rem;color:var(--text2)">{{STREAK_LBL}}</span>
  </div>
  <div class="habit-list" id="habitList"></div>
  <button id="add-habit" onclick="addHabit()">+ {{START_LBL2}}</button>
</div>

<script>
const SK = 'rt_habits_{{PRODUCT_ID}}';
const S = () => JSON.parse(localStorage.getItem(SK) || '{}');
const sv = d => localStorage.setItem(SK, JSON.stringify({...S(),...d}));

const DEFAULT_HABITS = [
  { emoji:'💧', name:'Shower' },
  { emoji:'🏃', name:'Gym' },
  { emoji:'📖', name:'Read' },
  { emoji:'🧘', name:'Relax' },
];

function init() {
  const data = S();
  if (!data.habits || data.habits.length === 0) {
    sv({ habits: DEFAULT_HABITS.map(h => ({...h, days:{}})), lastReset: new Date().toDateString() });
  }
  const today = new Date().toDateString();
  if (data.lastReset !== today) {
    data.lastReset = today;
    sv(data);
  }
  render();
}

function render() {
  const data = S();
  const habits = data.habits || [];
  const today = new Date();
  const dayNames = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const currentWeek = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    currentWeek.push({ date: d, label: dayNames[d.getDay()], key: d.toDateString(), isToday: i === 0 });
  }

  document.getElementById('habitList').innerHTML = habits.map((h, hi) => `
    <div class="habit-row">
      <div class="habit-info">
        <span class="habit-emoji">${h.emoji}</span>
        <span class="habit-name">${h.name}</span>
      </div>
      <div class="habit-days">
        ${currentWeek.map(d => `
          <div class="day-dot${h.days[d.key]?' done':''}${d.isToday?' today':''}"
               onclick="toggleDay(${hi},'${d.key}')">${d.label}</div>
        `).join('')}
      </div>
    </div>
  `).join('');

  // حساب streak
  let streak = 0;
  const allDoneToday = habits.every(h => h.days[today.toDateString()]);
  if (allDoneToday) {
    for (let i = 0; i < currentWeek.length; i++) {
      const d = currentWeek[i];
      const allDone = habits.every(h => h.days[d.key]);
      if (allDone) streak++;
      else break;
    }
  }
  document.getElementById('streakNum').textContent = streak;
}

function toggleDay(habitIdx, dateKey) {
  const data = S();
  data.habits[habitIdx].days[dateKey] = !data.habits[habitIdx].days[dateKey];
  sv(data);
  render();
}

function addHabit() {
  const name = prompt('Habit name:');
  if (!name) return;
  const emoji = prompt('Emoji (optional):') || '⭐';
  const data = S();
  data.habits.push({ emoji, name, days: {} });
  sv(data);
  render();
}

init();
</script>
</body>
</html>
