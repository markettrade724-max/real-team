<!DOCTYPE html>
<html lang="{{LANG}}" dir="{{DIR}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>{{GAME_NAME}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --accent: {{ACCENT}};
    --accent-rgb: {{ACCENT_RGB}};
    --bg: #050810;
    --surface: #0d1117;
    --surface2: #161b22;
    --text: #e6edf3;
    --text2: #8b949e;
    --danger: #ff3860;
    --success: #23d18b;
    --glow: 0 0 20px rgba(var(--accent-rgb),.6);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .6rem 1rem;
    background: linear-gradient(180deg, rgba(var(--accent-rgb),.15) 0%, transparent 100%);
    border-bottom: 1px solid rgba(var(--accent-rgb),.2);
    position: relative;
    z-index: 10;
  }

  #back-btn {
    background: none; border: 1px solid rgba(var(--accent-rgb),.4);
    color: var(--accent); padding: .3rem .8rem;
    border-radius: 4px; cursor: pointer;
    font-family: inherit; font-size: .75rem;
    letter-spacing: .05em;
    transition: all .2s;
  }
  #back-btn:hover { background: rgba(var(--accent-rgb),.15); box-shadow: var(--glow); }

  #game-title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(.8rem, 3vw, 1rem);
    color: var(--accent);
    text-shadow: var(--glow);
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  /* ── HUD ── */
  #hud {
    display: flex;
    gap: 1rem;
    align-items: center;
    padding: .4rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid rgba(var(--accent-rgb),.1);
    font-size: .75rem;
    letter-spacing: .05em;
    position: relative;
    z-index: 10;
  }

  .hud-item { display: flex; align-items: center; gap: .4rem; }
  .hud-label { color: var(--text2); text-transform: uppercase; font-size: .65rem; }
  .hud-val {
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: .85rem;
    min-width: 2.5rem;
    text-align: center;
  }

  #lives-display { display: flex; gap: .2rem; }
  .life-icon { font-size: .9rem; transition: all .3s; }
  .life-icon.lost { opacity: .2; filter: grayscale(1); }

  #combo-bar {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  #combo-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), #fff);
    border-radius: 2px;
    transition: width .3s;
  }

  /* ── CANVAS WRAPPER ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #game-canvas {
    display: block;
    image-rendering: pixelated;
    touch-action: none;
  }

  /* ── SCAN LINES overlay ── */
  #canvas-wrap::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.08) 2px, rgba(0,0,0,.08) 4px);
    pointer-events: none;
    z-index: 5;
  }

  /* ── CONTROLS ── */
  #controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: .6rem 1rem;
    background: var(--surface);
    border-top: 1px solid rgba(var(--accent-rgb),.1);
    gap: 1rem;
    position: relative;
    z-index: 10;
  }

  .dpad {
    display: grid;
    grid-template-areas: '. u .' 'l . r' '. d .';
    grid-template-columns: 2.2rem 2.2rem 2.2rem;
    grid-template-rows: 2.2rem 2.2rem 2.2rem;
    gap: .15rem;
  }

  .dpad-btn {
    background: var(--surface2);
    border: 1px solid rgba(var(--accent-rgb),.3);
    border-radius: 6px;
    color: var(--accent);
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .1s;
    user-select: none;
    -webkit-user-select: none;
  }
  .dpad-btn:active, .dpad-btn.pressed {
    background: rgba(var(--accent-rgb),.3);
    box-shadow: var(--glow);
    transform: scale(.92);
  }

  #btn-up    { grid-area: u; }
  #btn-left  { grid-area: l; }
  #btn-right { grid-area: r; }
  #btn-down  { grid-area: d; }

  #action-btns { display: flex; flex-direction: column; gap: .5rem; }

  .action-btn {
    padding: .6rem 1.4rem;
    border-radius: 8px;
    border: 2px solid;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: .7rem;
    letter-spacing: .05em;
    cursor: pointer;
    transition: all .15s;
    text-transform: uppercase;
    user-select: none;
    -webkit-user-select: none;
  }
  .action-btn:active { transform: scale(.93); }

  #btn-fire {
    background: rgba(255,56,96,.15);
    border-color: var(--danger);
    color: var(--danger);
  }
  #btn-fire:active { background: rgba(255,56,96,.4); box-shadow: 0 0 15px rgba(255,56,96,.6); }

  #btn-special {
    background: rgba(var(--accent-rgb),.15);
    border-color: var(--accent);
    color: var(--accent);
  }
  #btn-special:active { background: rgba(var(--accent-rgb),.4); box-shadow: var(--glow); }

  /* ── OVERLAYS ── */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 20;
    background: rgba(5,8,16,.92);
    backdrop-filter: blur(8px);
    gap: 1.2rem;
    padding: 2rem;
    text-align: center;
  }
  .overlay.hidden { display: none; }

  .overlay-icon { font-size: 4rem; filter: drop-shadow(var(--glow)); }
  .overlay-title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(1.4rem, 5vw, 2rem);
    color: var(--accent);
    text-shadow: var(--glow);
    text-transform: uppercase;
    letter-spacing: .1em;
  }
  .overlay-subtitle {
    color: var(--text2);
    font-size: .85rem;
    line-height: 1.6;
    max-width: 280px;
  }

  .score-display {
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--text);
  }
  .score-display span { color: var(--accent); }

  .overlay-btn {
    padding: .75rem 2.5rem;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: .85rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
    box-shadow: var(--glow);
  }
  .overlay-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(var(--accent-rgb),.8); }

  .level-badge {
    background: rgba(var(--accent-rgb),.15);
    border: 1px solid rgba(var(--accent-rgb),.4);
    border-radius: 6px;
    padding: .4rem 1rem;
    font-size: .75rem;
    color: var(--text2);
  }
  .level-badge strong { color: var(--accent); }

  /* ── AD BANNER ── */
  #ad-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: .35rem 1rem;
    background: rgba(var(--accent-rgb),.05);
    border-top: 1px solid rgba(var(--accent-rgb),.1);
    font-size: .65rem;
    color: var(--text2);
  }
  #ad-remove { color: var(--accent); cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <button id="back-btn" onclick="history.back()">← {{BACK_LBL}}</button>
  <div id="game-title">{{EMOJI}} {{GAME_NAME}}</div>
  <div id="score-hud" style="font-family:'Orbitron',monospace;color:var(--accent);font-size:.85rem;font-weight:700">0</div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-item">
    <span class="hud-label">{{SCORE_LBL}}</span>
    <span class="hud-val" id="score-val">0</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">{{LEVEL_LBL}}</span>
    <span class="hud-val" id="level-val">1</span>
  </div>
  <div class="hud-item" style="flex:1">
    <div id="combo-bar"><div id="combo-fill"></div></div>
  </div>
  <div class="hud-item">
    <div id="lives-display"></div>
  </div>
</div>

<!-- CANVAS -->
<div id="canvas-wrap">
  <canvas id="game-canvas"></canvas>

  <!-- START OVERLAY -->
  <div class="overlay" id="overlay-start">
    <div class="overlay-icon">{{EMOJI}}</div>
    <div class="overlay-title">{{GAME_NAME}}</div>
    <div class="overlay-subtitle">{{GAME_DESC}}</div>
    <div class="level-badge">{{LEVEL_LBL}} <strong id="start-level">1</strong></div>
    <button class="overlay-btn" id="btn-start">{{START_LBL}}</button>
  </div>

  <!-- WIN OVERLAY -->
  <div class="overlay hidden" id="overlay-win">
    <div class="overlay-icon">🏆</div>
    <div class="overlay-title">{{WIN_TITLE}}</div>
    <div class="score-display">{{SCORE_LBL}}: <span id="final-score">0</span></div>
    <div class="overlay-subtitle" id="win-msg"></div>
    <button class="overlay-btn" id="btn-next">{{PLAY_AGAIN_LBL}}</button>
    <button class="overlay-btn" style="background:transparent;border:1px solid var(--accent);color:var(--accent);box-shadow:none" id="btn-restart-win">{{RESTART_LBL}}</button>
  </div>

  <!-- LOSE OVERLAY -->
  <div class="overlay hidden" id="overlay-lose">
    <div class="overlay-icon">💀</div>
    <div class="overlay-title">{{GAMEOVER_LBL}}</div>
    <div class="score-display">{{SCORE_LBL}}: <span id="lose-score">0</span></div>
    <div class="overlay-subtitle" id="lose-msg"></div>
    <button class="overlay-btn" id="btn-restart">{{RESTART_LBL}}</button>
  </div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <div class="dpad">
    <button class="dpad-btn" id="btn-up">▲</button>
    <button class="dpad-btn" id="btn-left">◄</button>
    <button class="dpad-btn" id="btn-right">►</button>
    <button class="dpad-btn" id="btn-down">▼</button>
  </div>
  <div id="action-btns">
    <button class="action-btn" id="btn-fire">🔫 <span id="fire-lbl">Fire</span></button>
    <button class="action-btn" id="btn-special">⚡ <span id="special-lbl">Special</span></button>
  </div>
</div>

<!-- AD BAR -->
<div id="ad-bar">
  <span>{{AD_LABEL}}</span>
  <span id="ad-remove">{{AD_REMOVE_LABEL}}</span>
</div>

<script>
// ── polyfill roundRect ──────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
    this.beginPath();
    this.moveTo(x + r.tl, y);
    this.lineTo(x + w - r.tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
    this.lineTo(x + w, y + h - r.br);
    this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
    this.lineTo(x + r.bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
    this.lineTo(x, y + r.tl);
    this.quadraticCurveTo(x, y, x + r.tl, y);
    this.closePath();
  };
}

// ─── MULTI-LANG FALLBACK LABELS ─────────────────────────────
const L = {
  fire:    '{{FIRE_LBL}}'    || 'Fire',
  special: '{{SPECIAL_LBL}}' || 'Special',
  next:    '{{NEXT_LBL}}'    || 'Next →',
  wave:    '{{WAVE_LBL}}'    || 'Wave',
};
// Patch DOM labels that generator may have missed
(function patchLabels() {
  const fl = document.getElementById('fire-lbl');
  if (fl && fl.textContent === 'Fire' && L.fire !== 'Fire') fl.textContent = L.fire;
  const sl = document.getElementById('special-lbl');
  if (sl && sl.textContent === 'Special' && L.special !== 'Special') sl.textContent = L.special;
  const nb = document.getElementById('btn-next');
  if (nb && nb.textContent.trim() === '{{PLAY_AGAIN_LBL}}') nb.textContent = L.next;
  // If generator left {{WAVE_LBL}} unreplaced, patch the badge
  const badge = document.querySelector('.level-badge');
  if (badge && badge.innerHTML.includes('{{')) {
    badge.innerHTML = '{{LEVEL_LBL}} <strong id="start-level">1</strong> &mdash; ' + L.wave + ' 1';
  }
})();

// ─── CONFIG ──────────────────────────────────────────────────
const CONFIG = {
  emoji: '{{EMOJI}}',
  accent: '{{ACCENT}}',
  levels: {{LEVELS_JSON}} || [],
  iaps: {{IAPS_JSON}} || [],
  maxLives: 3,
  lifeIcon: '❤️',
};

// ─── STATE ───────────────────────────────────────────────────
const STATE = {
  score: 0, lives: CONFIG.maxLives, level: 0,
  wave: 1, combo: 0, comboTimer: 0,
  running: false, phase: 'start',
  keys: { up:false, down:false, left:false, right:false, fire:false, special:false },
  player: null, bullets: [], enemies: [], particles: [], powerups: [],
  enemyBullets: [], specialCooldown: 0, fireTimer: 0,
};

// ─── CANVAS SETUP ────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  canvas.width = w;
  canvas.height = h;
  if (STATE.player) {
    STATE.player.x = Math.min(STATE.player.x, w - STATE.player.r);
    STATE.player.y = Math.min(STATE.player.y, h - STATE.player.r);
  }
  initStars();
}
window.addEventListener('resize', resizeCanvas);

// ─── LEVEL DATA ──────────────────────────────────────────────
function getLevelData() {
  const lvls = CONFIG.levels;
  if (Array.isArray(lvls) && lvls.length > 0) {
    return lvls[Math.min(STATE.level, lvls.length - 1)];
  }
  // Fallback default
  return {
    enemyCount: 5 + STATE.level * 3,
    enemySpeed: 1 + STATE.level * 0.3,
    enemyHealth: 1 + Math.floor(STATE.level / 2),
    bulletSpeed: 6,
    spawnInterval: Math.max(60, 120 - STATE.level * 10),
    emojis: ['👾','🤖','👽','🦠','💀','🔥','⚡','🌀'],
    winMessage: 'Wave cleared!',
    loseMessage: 'Mission failed. Try again!',
  };
}

// ─── PARTICLES ───────────────────────────────────────────────
function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * .5;
    const speed = 2 + Math.random() * 4;
    STATE.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1, decay: .04 + Math.random() * .04,
      size: 3 + Math.random() * 5,
      color,
    });
  }
}

// ─── PLAYER ──────────────────────────────────────────────────
function createPlayer() {
  return {
    x: canvas.width / 2,
    y: canvas.height - 80,
    r: 18, speed: 4.5,
    invincible: 0,
    thrustAnim: 0,
  };
}

function drawPlayer(p) {
  const { x, y, r, invincible } = p;
  if (invincible > 0 && Math.floor(invincible / 5) % 2 === 0) return;

  ctx.save();
  ctx.translate(x, y);

  // Engine glow
  p.thrustAnim = (p.thrustAnim || 0) + .15;
  const thrustSize = r * (.4 + Math.sin(p.thrustAnim) * .2);
  const thrustGrad = ctx.createRadialGradient(0, r, 0, 0, r, thrustSize * 2);
  thrustGrad.addColorStop(0, CONFIG.accent);
  thrustGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = thrustGrad;
  ctx.beginPath();
  ctx.ellipse(0, r + thrustSize, thrustSize * .6, thrustSize, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ship body glow
  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 1.5);
  grad.addColorStop(0, CONFIG.accent + '40');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, r * 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Player emoji
  ctx.font = `${r * 1.6}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(CONFIG.emoji, 0, 0);

  ctx.restore();
}

// ─── ENEMIES ─────────────────────────────────────────────────
function spawnEnemy() {
  const ld = getLevelData();
  const emojis = ld.emojis || ['👾','🤖','👽'];
  const x = 30 + Math.random() * (canvas.width - 60);
  STATE.enemies.push({
    x, y: -30,
    r: 16,
    speed: ld.enemySpeed * (.8 + Math.random() * .4),
    health: ld.enemyHealth,
    maxHealth: ld.enemyHealth,
    emoji: emojis[Math.floor(Math.random() * emojis.length)],
    fireTimer: Math.floor(Math.random() * 120),
    pattern: Math.random() < .3 ? 'zigzag' : 'straight',
    zigDir: Math.random() < .5 ? 1 : -1,
    zigTimer: 0,
  });
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  // Health bar
  if (e.maxHealth > 1) {
    const bw = e.r * 2.5;
    const bh = 4;
    const bx = -bw / 2, by = -e.r - 10;
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 2); ctx.fill();
    const hp = e.health / e.maxHealth;
    ctx.fillStyle = hp > .5 ? '#23d18b' : hp > .25 ? '#f0a500' : '#ff3860';
    ctx.beginPath(); ctx.roundRect(bx, by, bw * hp, bh, 2); ctx.fill();
  }

  ctx.font = `${e.r * 1.8}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(e.emoji, 0, 0);

  ctx.restore();
}

// ─── BULLETS ─────────────────────────────────────────────────
function fireBullet() {
  const p = STATE.player;
  STATE.bullets.push({ x: p.x, y: p.y - p.r, vy: -8, r: 5, dmg: 1 });
}

function fireSpecial() {
  if (STATE.specialCooldown > 0) return;
  const p = STATE.player;
  for (let i = -2; i <= 2; i++) {
    STATE.bullets.push({ x: p.x + i * 12, y: p.y - p.r, vy: -10, vx: i * .4, r: 6, dmg: 2, special: true });
  }
  STATE.specialCooldown = 180;
  spawnParticles(p.x, p.y, CONFIG.accent, 12);
}

function drawBullet(b) {
  ctx.save();
  if (b.special) {
    ctx.shadowBlur = 15;
    ctx.shadowColor = CONFIG.accent;
  }
  const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 2);
  grad.addColorStop(0, b.special ? '#fff' : CONFIG.accent);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = b.special ? CONFIG.accent : '#fff';
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawEnemyBullet(b) {
  ctx.save();
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#ff3860';
  ctx.fillStyle = '#ff3860';
  ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// ─── PARTICLE DRAW ───────────────────────────────────────────
function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha = p.life;
  ctx.fillStyle = p.color;
  ctx.shadowBlur = 10; ctx.shadowColor = p.color;
  ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// ─── BACKGROUND ──────────────────────────────────────────────
const stars = [];
function initStars() {
  stars.length = 0;
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      s: Math.random() * 2,
      speed: .5 + Math.random() * 1.5,
    });
  }
}

function drawBackground() {
  ctx.fillStyle = '#050810';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    ctx.globalAlpha = .4 + Math.random() * .3;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// ─── COLLISION ───────────────────────────────────────────────
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

// ─── SCORE / LIVES ───────────────────────────────────────────
function updateScore(pts) {
  STATE.score += pts * (1 + STATE.combo * .1);
  STATE.combo++;
  STATE.comboTimer = 120;
  document.getElementById('score-val').textContent = Math.floor(STATE.score);
  document.getElementById('score-hud').textContent = Math.floor(STATE.score);
  const fill = Math.min(STATE.combo * 10, 100);
  document.getElementById('combo-fill').style.width = fill + '%';
}

function loseLife() {
  STATE.lives--;
  STATE.player.invincible = 120;
  spawnParticles(STATE.player.x, STATE.player.y, '#ff3860', 15);
  renderLives();
  if (STATE.lives <= 0) endGame(false);
}

function renderLives() {
  const el = document.getElementById('lives-display');
  el.innerHTML = '';
  for (let i = 0; i < CONFIG.maxLives; i++) {
    const s = document.createElement('span');
    s.className = 'life-icon' + (i >= STATE.lives ? ' lost' : '');
    s.textContent = CONFIG.lifeIcon;
    el.appendChild(s);
  }
}

// ─── SPAWN CONTROLLER ────────────────────────────────────────
let spawnTimer = 0, totalSpawned = 0;
function handleSpawning() {
  const ld = getLevelData();
  spawnTimer++;
  if (totalSpawned < ld.enemyCount && spawnTimer >= ld.spawnInterval) {
    spawnTimer = 0;
    spawnEnemy();
    totalSpawned++;
  }
  if (totalSpawned >= ld.enemyCount && STATE.enemies.length === 0) {
    endGame(true);
  }
}

// ─── GAME LOOP ───────────────────────────────────────────────
let raf;
function gameLoop() {
  if (!STATE.running) return;
  raf = requestAnimationFrame(gameLoop);

  drawBackground();

  const p = STATE.player;
  const spd = p.speed;

  // Move player
  if (STATE.keys.left)  p.x = Math.max(p.r, p.x - spd);
  if (STATE.keys.right) p.x = Math.min(canvas.width - p.r, p.x + spd);
  if (STATE.keys.up)    p.y = Math.max(p.r, p.y - spd);
  if (STATE.keys.down)  p.y = Math.min(canvas.height - p.r, p.y + spd);

  // Auto fire
  STATE.fireTimer++;
  if (STATE.keys.fire && STATE.fireTimer >= 12) { fireBullet(); STATE.fireTimer = 0; }
  if (STATE.specialCooldown > 0) STATE.specialCooldown--;

  // Combo decay
  if (STATE.comboTimer > 0) { STATE.comboTimer--; }
  else if (STATE.combo > 0) {
    STATE.combo = 0;
    document.getElementById('combo-fill').style.width = '0%';
  }

  // Spawning
  handleSpawning();

  // Update bullets
  STATE.bullets = STATE.bullets.filter(b => {
    b.x += b.vx || 0; b.y += b.vy;
    if (b.y < -20 || b.y > canvas.height + 20) return false;
    drawBullet(b);
    return true;
  });

  // Update enemy bullets
  STATE.enemyBullets = STATE.enemyBullets.filter(b => {
    b.x += b.vx || 0; b.y += b.vy;
    if (b.y > canvas.height + 20) return false;
    drawEnemyBullet(b);
    // Hit player
    if (p.invincible <= 0 && dist(b, p) < p.r + 5) { loseLife(); return false; }
    return true;
  });

  // Update enemies
  STATE.enemies = STATE.enemies.filter(e => {
    // Movement
    if (e.pattern === 'zigzag') {
      e.zigTimer++;
      if (e.zigTimer > 40) { e.zigDir *= -1; e.zigTimer = 0; }
      e.x += e.speed * e.zigDir * .8;
      e.x = Math.max(e.r, Math.min(canvas.width - e.r, e.x));
    }
    e.y += e.speed;

    // Enemy fires
    e.fireTimer--;
    if (e.fireTimer <= 0) {
      e.fireTimer = 80 + Math.floor(Math.random() * 60);
      const angle = Math.atan2(p.y - e.y, p.x - e.x);
      STATE.enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4 });
    }

    // Off screen
    if (e.y > canvas.height + 40) {
      if (p.invincible <= 0) loseLife();
      return false;
    }

    // Hit by player bullet
    STATE.bullets = STATE.bullets.filter(b => {
      if (dist(b, e) < e.r + b.r) {
        e.health -= b.dmg;
        spawnParticles(b.x, b.y, CONFIG.accent, 5);
        return false;
      }
      return true;
    });

    if (e.health <= 0) {
      updateScore(10 + STATE.level * 5);
      spawnParticles(e.x, e.y, '#ff3860', 12);
      return false;
    }

    // Hit player
    if (p.invincible <= 0 && dist(e, p) < e.r + p.r) {
      e.health -= 1;
      loseLife();
    }

    drawEnemy(e);
    return true;
  });

  // Particles
  STATE.particles = STATE.particles.filter(pt => {
    pt.x += pt.vx; pt.y += pt.vy;
    pt.vx *= .92; pt.vy *= .92;
    pt.life -= pt.decay;
    if (pt.life <= 0) return false;
    drawParticle(pt);
    return true;
  });

  // Player invincible
  if (p.invincible > 0) p.invincible--;
  drawPlayer(p);
}

// ─── GAME STATES ─────────────────────────────────────────────
function startGame() {
  cancelAnimationFrame(raf);
  STATE.score = 0; STATE.lives = CONFIG.maxLives;
  STATE.wave = 1; STATE.combo = 0; STATE.comboTimer = 0;
  STATE.bullets = []; STATE.enemies = []; STATE.particles = [];
  STATE.enemyBullets = []; STATE.specialCooldown = 0; STATE.fireTimer = 0;
  spawnTimer = 0; totalSpawned = 0;
  STATE.player = createPlayer();
  renderLives();
  document.getElementById('score-val').textContent = '0';
  document.getElementById('score-hud').textContent = '0';
  document.getElementById('level-val').textContent = STATE.level + 1;
  document.getElementById('start-level').textContent = STATE.level + 1;
  hideAllOverlays();
  STATE.running = true;
  gameLoop();
}

function endGame(win) {
  STATE.running = false;
  cancelAnimationFrame(raf);
  const ld = getLevelData();
  if (win) {
    document.getElementById('final-score').textContent = Math.floor(STATE.score);
    document.getElementById('win-msg').textContent = ld.winMessage || '🎉';
    showOverlay('overlay-win');
  } else {
    document.getElementById('lose-score').textContent = Math.floor(STATE.score);
    document.getElementById('lose-msg').textContent = ld.loseMessage || '💀';
    showOverlay('overlay-lose');
  }
}

function showOverlay(id) {
  document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function hideAllOverlays() {
  document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
}

// ─── CONTROLS ────────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-restart').addEventListener('click', startGame);
document.getElementById('btn-restart-win').addEventListener('click', startGame);
document.getElementById('btn-next').addEventListener('click', () => {
  const maxLevel = Array.isArray(CONFIG.levels) && CONFIG.levels.length > 0
    ? CONFIG.levels.length - 1 : 4;
  STATE.level = Math.min(STATE.level + 1, maxLevel);
  startGame();
});

// D-pad
const dpadMap = {
  'btn-up':    'up',
  'btn-left':  'left',
  'btn-right': 'right',
  'btn-down':  'down',
};
Object.entries(dpadMap).forEach(([btnId, key]) => {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.addEventListener('pointerdown', () => { STATE.keys[key] = true; btn.classList.add('pressed'); });
  btn.addEventListener('pointerup',   () => { STATE.keys[key] = false; btn.classList.remove('pressed'); });
  btn.addEventListener('pointerleave',() => { STATE.keys[key] = false; btn.classList.remove('pressed'); });
});

document.getElementById('btn-fire')?.addEventListener('pointerdown', () => { STATE.keys.fire = true; });
document.getElementById('btn-fire')?.addEventListener('pointerup',   () => { STATE.keys.fire = false; });
document.getElementById('btn-special')?.addEventListener('pointerdown', fireSpecial);

// Keyboard
window.addEventListener('keydown', e => {
  const m = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right', ' ':'fire', 'z':'fire', 'x':'special' };
  if (m[e.key]) { STATE.keys[m[e.key]] = true; e.preventDefault(); }
  if (e.key === 'x') fireSpecial();
});
window.addEventListener('keyup', e => {
  const m = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right', ' ':'fire', 'z':'fire' };
  if (m[e.key]) STATE.keys[m[e.key]] = false;
});

// ─── INIT ─────────────────────────────────────────────────────
resizeCanvas();
initStars();
showOverlay('overlay-start');
</script>
