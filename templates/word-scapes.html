<!DOCTYPE html>
<html lang="{{LANG}}" dir="{{DIR}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>{{GAME_NAME}}</title>
<style>
:root{--acc:{{ACCENT}};--acc-rgb:{{ACCENT_RGB}};--bg:#0a0f0f;--surface:#131c1c;--text:#e2e8f0;--text2:#7a8a8a;--letter-bg:rgba(255,255,255,0.04);--letter-bg-done:rgba({{ACCENT_RGB}},0.2);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Segoe UI',Tajawal,sans-serif;color:var(--text);user-select:none;-webkit-user-select:none;}
#app{display:flex;flex-direction:column;width:100%;max-width:420px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;}
#bg-image{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.25;transition:background-image 0.8s;z-index:0;filter:blur(2px) brightness(0.6);}
#content{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;}
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.05);}
#back-btn{background:none;border:1px solid rgba(255,255,255,0.15);color:var(--text2);padding:4px 12px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.7rem;}
#game-title{font-weight:900;font-size:1rem;color:var(--acc);text-shadow:0 0 20px rgba(var(--acc-rgb),0.3);}
#score-panel{display:flex;justify-content:center;gap:20px;padding:10px 16px;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.04);}
.score-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.score-label{font-size:0.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.1em;}
.score-value{font-size:1.3rem;font-weight:900;color:var(--acc);font-family:monospace;}
#found-words{display:flex;flex-wrap:wrap;gap:5px;padding:10px 16px;justify-content:center;min-height:32px;}
.found-word{background:var(--letter-bg-done);color:var(--acc);padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:700;animation:wordPop 0.3s ease;}
@keyframes wordPop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
#remaining-words{display:flex;flex-wrap:wrap;gap:4px;padding:6px 16px;justify-content:center;}
.remaining-word{color:var(--text2);font-size:0.7rem;padding:2px 8px;border:1px dashed rgba(255,255,255,0.1);border-radius:10px;}
#letter-grid{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;}
.grid-wrap{display:grid;gap:6px;width:min(320px,100%);}
.letter-cell{aspect-ratio:1;background:var(--letter-bg);border:1px solid rgba(255,255,255,0.06);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;color:var(--text);cursor:pointer;transition:all 0.15s;position:relative;}
.letter-cell.selected{background:var(--acc);color:#000;transform:scale(1.08);box-shadow:0 0 15px rgba(var(--acc-rgb),0.4);border-color:var(--acc);z-index:2;}
.letter-cell.done{background:var(--letter-bg-done);border-color:rgba(var(--acc-rgb),0.3);color:var(--acc);}
#progress-bar{width:100%;height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;margin:0 16px;}
#progress-fill{height:100%;background:var(--acc);border-radius:2px;transition:width 0.4s;}
.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;background:rgba(10,15,15,0.9);backdrop-filter:blur(14px);gap:12px;text-align:center;}
.overlay.hidden{display:none;}
.overlay-title{font-size:2rem;font-weight:900;color:var(--acc);text-shadow:0 0 30px rgba(var(--acc-rgb),0.4);}
.overlay-subtitle{color:var(--text2);font-size:0.85rem;line-height:1.5;max-width:280px;}
.btn{background:var(--acc);color:#000;padding:12px 28px;border:none;border-radius:12px;font-weight:700;font-size:0.9rem;cursor:pointer;font-family:inherit;box-shadow:0 0 20px rgba(var(--acc-rgb),0.3);transition:all 0.2s;}
.btn:active{transform:scale(0.96);}
</style>
</head>
<body>
<div id="app">
  <div id="bg-image"></div>
  <div id="content">
    <div id="header">
      <button id="back-btn" onclick="history.back()">← {{BACK_LBL}}</button>
      <div id="game-title">{{EMOJI}} {{GAME_NAME}}</div>
      <div style="width:50px"></div>
    </div>
    <div id="score-panel">
      <div class="score-item"><span class="score-label">{{SCORE_LBL}}</span><span class="score-value" id="scoreVal">0</span></div>
      <div class="score-item"><span class="score-label">{{LEVEL_LBL}}</span><span class="score-value" id="levelVal">1</span></div>
      <div class="score-item"><span class="score-label">{{BEST_LBL}}</span><span class="score-value" id="bestVal">0</span></div>
    </div>
    <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
    <div id="found-words"></div>
    <div id="remaining-words"></div>
    <div id="letter-grid"></div>
  </div>
</div>
<div class="overlay hidden" id="winOverlay">
  <div style="font-size:4rem">🏆</div>
  <div class="overlay-title">{{WIN_TITLE}}</div>
  <div class="overlay-subtitle" id="winMsg"></div>
  <button class="btn" onclick="nextLevel()">{{NEXT_LBL}} →</button>
</div>
<div class="overlay hidden" id="gameOver">
  <div style="font-size:4rem">⏳</div>
  <div class="overlay-title">{{GAMEOVER_LBL}}</div>
  <div class="overlay-subtitle" id="finalScore"></div>
  <button class="btn" onclick="restartGame()">🔄 {{RETRY_LBL}}</button>
</div>
<script>
const SK = 'rt_words_{{PRODUCT_ID}}';
const S = () => JSON.parse(localStorage.getItem(SK) || '{}');
const sv = d => localStorage.setItem(SK, JSON.stringify({...S(),...d}));

// Word packs per language
const WORDS = {
  ar: {
    easy: ['سماء','أرض','وردة','نهر','جبل','قلم','شمس','ليل','بيت','باب','ورق','ذهب','زهر','طفل','ضوء'],
    medium: ['مدرسة','حديقة','فيل','تفاحة','بحر','سماء','نجمة','رياضة','مكتبة','مغامرة'],
    hard: ['استثنائي','فراشة','كهرباء','ياسمين','جوهرة','محيط','مملكة','مظلة','كنز','زمردة'],
  },
  en: {
    easy: ['SKY','SEA','SUN','TREE','BIRD','FISH','HOME','STAR','MOON','BOOK','ROSE','LAKE','GOLD','BABY','LAMP'],
    medium: ['FOREST','CASTLE','RIVER','CLOUD','DREAM','GARDEN','HORSE','PLANET','STORM','BRIDGE'],
    hard: ['MYSTERY','JUNGLE','CASTLE','THUNDER','EMERALD','HORIZON','DOLPHIN','CRYSTAL','JOURNEY','COURAGE'],
  },
  fr: { easy: ['CIEL','MER','SOLEIL','ARBRE','FLEUR','LUNE','LIVRE','MAISON','ROI','CHAT'], medium: ['JARDIN','FORET','RIVIERE','PLAGE','NUAGE','CHATEAU','CHEVAL','POISSON','ORAGE','PONT'], hard: ['MYSTERE','DIAMANT','JUNGLE','HORIZON','DAUPHIN','CRISTAL','VOYAGE','COURAGE','CHANTEUR','SOURIRE'] },
  es: { easy: ['SOL','MAR','CIELO','ARBOL','FLOR','LUNA','CASA','REY','GATO','LIBRO'], medium: ['JARDIN','BOSQUE','RIO','PLAYA','NUBE','CASTILLO','CABALLO','PEZ','TORMENTA','PUENTE'], hard: ['MISTERIO','DIAMANTE','SELVA','HORIZONTE','DELFIN','CRISTAL','VIAJE','VALOR','CANTANTE','SONRISA'] },
  de: { easy: ['HIMMEL','MEER','SONNE','BAUM','BLUME','MOND','HAUS','KÖNIG','BUCH','KATZE'], medium: ['GARTEN','WALD','FLUSS','STRAND','WOLKE','SCHLOSS','PFERD','FISCH','STURM','BRÜCKE'], hard: ['GEHEIMNIS','DIAMANT','DSCHUNGEL','HORIZONT','DELFIN','KRISTALL','REISE','MUT','SÄNGER','LÄCHELN'] },
  zh: { easy: ['天','海','日','木','花','月','星','山','水','火'], medium: ['森林','城堡','河流','沙滩','云朵','梦想','花园','马','风暴','桥'], hard: ['神秘','钻石','丛林','地平线','海豚','水晶','旅程','勇气','歌手','微笑'] },
};

const LANG = '{{LANG}}';
const wordPacks = WORDS[LANG] || WORDS.en;
const BG_IMAGES = [
  'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=400&h=600&fit=crop',
  'https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=400&h=600&fit=crop',
  'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=400&h=600&fit=crop',
  'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400&h=600&fit=crop',
  'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=400&h=600&fit=crop',
  'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400&h=600&fit=crop',
  'https://images.unsplash.com/photo-1426604966848-d7adac402bff?w=400&h=600&fit=crop',
  'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&h=600&fit=crop',
];

let level=0, score=0, best=S().best||0, words=[], foundWords=[], gridCols=5, gridRows=5;
let selectedCells=[], isSelecting=false;
document.getElementById('bestVal').textContent=best;

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function generateLevel(){
  const difficulty = level<3?'easy':level<6?'medium':'hard';
  const pool = wordPacks[difficulty];
  const wordCount = Math.min(3+level, pool.length);
  words = shuffle([...pool]).slice(0, wordCount).map(w=>w.toUpperCase());
  foundWords = [];
  selectedCells = []; isSelecting = false;
  gridRows = Math.min(6, 4+Math.floor(level/2));
  gridCols = Math.min(6, 4+Math.floor(level/2));
  document.getElementById('levelVal').textContent = level+1;
  document.getElementById('bg-image').style.backgroundImage = `url(${BG_IMAGES[level%BG_IMAGES.length]})`;
  renderAll();
}

function buildLetterGrid(){
  // Place words randomly in the grid
  const grid = Array.from({length:gridRows},()=>Array(gridCols).fill(''));
  const directions = [[0,1],[1,0],[1,1],[-1,1]];
  words.forEach(word=>{
    let placed=false;
    for(let attempt=0;attempt<50&&!placed;attempt++){
      const dir = directions[Math.floor(Math.random()*directions.length)];
      const row = Math.floor(Math.random()*(gridRows-(dir[0]===-1?word.length:0)));
      const col = Math.floor(Math.random()*(gridCols-(dir[1]===1?word.length:0)));
      if(row<0||row>=gridRows||col<0||col>=gridCols) continue;
      let fits=true;
      for(let i=0;i<word.length;i++){
        const r=row+i*dir[0], c=col+i*dir[1];
        if(r<0||r>=gridRows||c<0||c>=gridCols||(grid[r][c]!==''&&grid[r][c]!==word[i])){fits=false;break;}
      }
      if(fits){for(let i=0;i<word.length;i++){const r=row+i*dir[0],c=col+i*dir[1];grid[r][c]=word[i];}placed=true;}
    }
  });
  // Fill empty cells
  for(let r=0;r<gridRows;r++)for(let c=0;c<gridCols;c++)if(!grid[r][c])grid[r][c]=String.fromCharCode(65+Math.floor(Math.random()*26));
  return grid;
}

let letterGrid = [];

function renderAll(){
  letterGrid = buildLetterGrid();
  const wrap = document.getElementById('letter-grid');
  wrap.innerHTML = `<div class="grid-wrap" style="grid-template-columns:repeat(${gridCols},1fr);grid-template-rows:repeat(${gridRows},1fr)">${letterGrid.flat().map((l,i)=>{
    const r=Math.floor(i/gridCols), c=i%gridCols;
    const found = foundWords.some(w=>{
      // Check if this letter belongs to a found word (simplified: just mark all letters of found words)
      return words.includes(w) && letterGrid[r][c] && w.includes(letterGrid[r][c]);
    });
    return `<div class="letter-cell${found?' done':''}" data-row="${r}" data-col="${c}">${l}</div>`;
  }).join('')}</div>`;

  // Touch/swipe selection
  const cells = wrap.querySelectorAll('.letter-cell');
  cells.forEach(cell=>{
    cell.addEventListener('pointerdown', e=>{
      e.preventDefault();
      isSelecting = true;
      selectedCells = [cell];
      cell.classList.add('selected');
    });
    cell.addEventListener('pointermove', e=>{
      if(!isSelecting) return;
      const target = document.elementFromPoint(e.clientX, e.clientY);
      if(!target || !target.classList.contains('letter-cell')) return;
      if(!selectedCells.includes(target)){
        selectedCells.push(target);
        target.classList.add('selected');
      }
    });
  });

  window.addEventListener('pointerup', ()=>{
    if(!isSelecting) return;
    isSelecting = false;
    // Check if selected word is valid
    const selWord = selectedCells.map(c=>letterGrid[c.dataset.row][c.dataset.col]).join('');
    if(words.includes(selWord) && !foundWords.includes(selWord)){
      foundWords.push(selWord);
      score += selWord.length * 10;
      if(score>best){best=score;sv({best});document.getElementById('bestVal').textContent=best;}
      document.getElementById('scoreVal').textContent=score;
      const progress = foundWords.length/words.length*100;
      document.getElementById('progress-fill').style.width=progress+'%';
      // Render found words
      document.getElementById('found-words').innerHTML = foundWords.map(w=>`<span class="found-word">${w}</span>`).join('');
      document.getElementById('remaining-words').innerHTML = words.filter(w=>!foundWords.includes(w)).map(w=>`<span class="remaining-word">${w}</span>`).join('');
      // Mark cells as done
      selectedCells.forEach(c=>c.classList.add('done'));
      if(foundWords.length===words.length){
        setTimeout(()=>document.getElementById('winOverlay').classList.remove('hidden'),500);
      }
    }
    // Deselect
    selectedCells.forEach(c=>c.classList.remove('selected'));
    selectedCells=[];
  });

  document.getElementById('found-words').innerHTML = foundWords.map(w=>`<span class="found-word">${w}</span>`).join('');
  document.getElementById('remaining-words').innerHTML = words.filter(w=>!foundWords.includes(w)).map(w=>`<span class="remaining-word">${w}</span>`).join('');
  document.getElementById('progress-fill').style.width = (foundWords.length/words.length*100)+'%';
}

function nextLevel(){
  level++;
  document.getElementById('winOverlay').classList.add('hidden');
  generateLevel();
}

function restartGame(){
  level=0; score=0;
  document.getElementById('scoreVal').textContent='0';
  document.getElementById('gameOver').classList.add('hidden');
  generateLevel();
}

generateLevel();
</script>
</body>
</html>
