<!DOCTYPE html>
<html lang="{{LANG}}" dir="{{DIR}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>{{GAME_NAME}} — realteam</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--acc:{{ACCENT}};--bg:#000008;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'Tajawal',sans-serif;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;color:#fff;}
.screen{display:none;position:fixed;inset:0;flex-direction:column;
  align-items:center;justify-content:center;z-index:10;
  background:rgba(0,0,8,0.95);backdrop-filter:blur(4px);}
.screen.active{display:flex;}
.game-logo{font-family:'Orbitron',monospace;font-size:clamp(1.8rem,6vw,3.5rem);
  font-weight:900;color:var(--acc);text-shadow:0 0 40px var(--acc);
  margin-bottom:8px;letter-spacing:4px;animation:pulse 2s infinite;text-align:center;padding:0 16px;}
.game-sub{color:rgba(255,255,255,0.5);font-size:0.85rem;margin-bottom:40px;
  text-align:center;padding:0 24px;line-height:1.6;}
.btn-play{background:var(--acc);color:#000;border:none;padding:16px 48px;
  border-radius:50px;font-size:1.1rem;font-weight:900;cursor:pointer;
  font-family:'Orbitron',monospace;letter-spacing:2px;
  box-shadow:0 0 40px var(--acc);transition:transform 0.2s;}
.btn-play:active{transform:scale(0.96);}
.btn-secondary{background:transparent;color:rgba(255,255,255,0.5);
  border:1px solid rgba(255,255,255,0.2);padding:10px 28px;
  border-radius:50px;font-size:0.82rem;cursor:pointer;
  font-family:'Tajawal',sans-serif;margin-top:12px;transition:0.2s;}
.btn-secondary:hover{border-color:var(--acc);color:var(--acc);}
#hud{position:fixed;top:0;left:0;right:0;z-index:5;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:linear-gradient(rgba(0,0,8,0.9),transparent);}
.hud-val{font-family:'Orbitron',monospace;font-size:0.95rem;color:var(--acc);}
.hud-lbl{font-size:0.58rem;color:rgba(255,255,255,0.4);letter-spacing:0.1em;}
canvas{display:block;max-width:100vw;max-height:100vh;touch-action:none;}
#controls{position:fixed;bottom:0;left:0;right:0;z-index:5;
  display:flex;justify-content:space-between;align-items:flex-end;
  padding:14px;pointer-events:none;}
.ctrl-btn{pointer-events:all;background:rgba(255,255,255,0.1);
  border:2px solid rgba(255,255,255,0.2);border-radius:50%;
  width:60px;height:60px;display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;cursor:pointer;user-select:none;-webkit-user-select:none;}
.ctrl-btn:active{background:rgba(255,255,255,0.25);}
.ctrl-group{display:flex;gap:8px;}
#fire-btn{background:rgba(255,60,60,0.2);border-color:rgba(255,60,60,0.5);
  width:72px;height:72px;font-size:1.8rem;}
#fire-btn:active{background:rgba(255,60,60,0.5);}
.go-score{font-family:'Orbitron',monospace;font-size:2.5rem;font-weight:900;
  color:var(--acc);margin:12px 0;}
.go-title{font-family:'Orbitron',monospace;font-size:1.3rem;color:#fff;margin-bottom:4px;}
.go-best{font-size:0.82rem;color:rgba(255,255,255,0.5);margin-bottom:28px;}
#levelup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:8;font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:900;
  color:var(--acc);text-shadow:0 0 30px var(--acc);
  opacity:0;pointer-events:none;transition:opacity 0.3s;text-align:center;}
#levelup.show{opacity:1;}
@keyframes pulse{0%,100%{text-shadow:0 0 40px var(--acc)}50%{text-shadow:0 0 80px var(--acc)}}
</style>
</head>
<body>

<div class="screen active" id="startScreen">
  <div class="game-logo">{{GAME_NAME}}</div>
  <div class="game-sub">{{GAME_DESC}}</div>
  <button class="btn-play" onclick="startGame()">▶ {{START_LBL}}</button>
  <button class="btn-secondary" onclick="IAPStore.open()">🛒 {{SHOP_LBL}}</button>
  <div style="margin-top:20px;font-size:0.75rem;color:rgba(255,255,255,0.3)">
    {{BEST_LBL}}: <span id="bestScore" style="color:var(--acc)">0</span>
  </div>
</div>

<div class="screen" id="gameoverScreen">
  <div class="go-title">{{GAMEOVER_LBL}}</div>
  <div class="go-score" id="finalScore">0</div>
  <div class="go-best" id="bestMsg"></div>
  <button class="btn-play" onclick="startGame()">↺ {{RETRY_LBL}}</button>
  <button class="btn-secondary" onclick="showStart()">🏠 {{HOME_LBL}}</button>
</div>

<div id="hud" style="display:none">
  <div><div class="hud-lbl">{{SCORE_LBL}}</div><div class="hud-val" id="scoreDisplay">0</div></div>
  <div style="text-align:center"><div class="hud-lbl">{{LEVEL_LBL}}</div><div class="hud-val" id="levelDisplay">1</div></div>
  <div style="text-align:right"><div class="hud-lbl">{{LIVES_LBL}}</div><div style="font-size:0.9rem" id="livesDisplay">❤️❤️❤️</div></div>
</div>

<canvas id="gameCanvas"></canvas>
<div id="levelup">LEVEL UP!</div>

<div id="controls" style="display:none">
  <div class="ctrl-group">
    <button class="ctrl-btn" id="leftBtn">◀</button>
    <button class="ctrl-btn" id="rightBtn">▶</button>
  </div>
  <button class="ctrl-btn" id="fire-btn">🔥</button>
</div>

<script src="/iap-modal.js"></script>
<script src="/social-bar.js"></script>
<script>
const ACCENT='{{ACCENT}}',IAPS={{IAPS_JSON}},LANG='{{LANG}}',PROD_ID='{{PRODUCT_ID}}';
IAPStore.init(PROD_ID,LANG,IAPS);
SocialBar.init({title:'{{GAME_NAME}}',url:location.href,lang:LANG});

const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

let state='start',score=0,level=1,lives=3,raf;
let bestScore=parseInt(localStorage.getItem('best_'+PROD_ID)||'0');
document.getElementById('bestScore').textContent=bestScore;

let player,bullets,enemies,particles,stars,keys={};
let touchLeft=false,touchRight=false,touchFire=false;
let lastShot=0,enemyTimer=0,bossActive=false;

function init(){
  player={x:W/2,y:H-100,w:36,h:46,speed:6};
  bullets=[];enemies=[];particles=[];
  bossActive=false;
  stars=Array.from({length:70},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,s:Math.random()*0.5+0.3}));
}

function spawnEnemy(){
  const fast=Math.random()<0.3+level*0.05;
  enemies.push({x:30+Math.random()*(W-60),y:-30,w:fast?22:32,h:fast?22:32,
    speed:(1.2+level*0.25)*(fast?1.8:1),hp:fast?1:2,
    color:fast?'#ff6600':['#8855ff','#ff5588','#55aaff'][Math.floor(Math.random()*3)],
    type:fast?'fast':'normal',dx:(Math.random()-0.5)*1.5,bullets:[],lastShot:0});
}

function spawnBoss(){
  bossActive=true;
  const b={x:W/2,y:-80,w:80,h:70,speed:1.2,hp:25+level*8,maxHp:25+level*8,
    color:'#ff0040',type:'boss',bullets:[],lastShot:0,dx:2};
  enemies.push(b);
}

function explode(x,y,color,n=10){
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2,s=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      r:1+Math.random()*2.5,color,life:40+Math.random()*20,maxLife:60});
  }
}

function update(){
  const now=Date.now();
  const spd=player.speed;
  if((keys.ArrowLeft||keys.a||touchLeft)&&player.x>player.w/2)player.x-=spd;
  if((keys.ArrowRight||keys.d||touchRight)&&player.x<W-player.w/2)player.x+=spd;

  const fr=300;
  if((keys[' ']||keys.ArrowUp||touchFire)&&now-lastShot>fr){
    bullets.push({x:player.x,y:player.y-player.h/2,vy:-13,color:ACCENT});
    lastShot=now;
  }

  bullets=bullets.filter(b=>{b.y+=b.vy;return b.y>-20;});

  enemies.forEach(e=>{
    if(e.type==='boss'){
      e.x+=e.dx;if(e.x>W-e.w/2||e.x<e.w/2)e.dx*=-1;
      if(e.y<110)e.y+=e.speed;
      if(now-e.lastShot>900){
        for(let i=-1;i<=1;i++)e.bullets.push({x:e.x+i*18,y:e.y+e.h/2,vy:4+level*0.3,color:'#ff0040'});
        e.lastShot=now;
      }
    }else{
      e.y+=e.speed;e.x+=e.dx;if(e.x>W-e.w/2||e.x<e.w/2)e.dx*=-1;
      if(e.type==='normal'&&level>=2&&now-e.lastShot>2200+Math.random()*800){
        e.bullets.push({x:e.x,y:e.y+e.h/2,vy:3,color:'#ff5588'});e.lastShot=now;
      }
    }
    (e.bullets||[]).forEach(eb=>{eb.y+=eb.vy;
      if(Math.abs(eb.x-player.x)<18&&Math.abs(eb.y-player.y)<26){hitPlayer();e.bullets=e.bullets.filter(b=>b!==eb);}
    });
    e.bullets=(e.bullets||[]).filter(eb=>eb.y<H+20);
  });

  enemies=enemies.filter(e=>{
    let alive=true;
    bullets=bullets.filter(b=>{
      if(Math.abs(b.x-e.x)<e.w/2+4&&Math.abs(b.y-e.y)<e.h/2+4){
        e.hp--;explode(b.x,b.y,ACCENT,5);
        if(e.hp<=0){
          explode(e.x,e.y,e.color,e.type==='boss'?25:12);
          score+=e.type==='boss'?600+level*100:e.type==='fast'?150:100;
          if(e.type==='boss'){bossActive=false;levelUp();}
          updateHUD();alive=false;
        }return false;
      }return true;
    });
    if(!alive)return false;
    if(Math.abs(e.x-player.x)<e.w/2+player.w/2-8&&Math.abs(e.y-player.y)<e.h/2+player.h/2-8){
      explode(e.x,e.y,e.color);hitPlayer();if(e.type!=='boss')return false;
    }
    return e.y<H+50;
  });

  enemyTimer++;
  if(enemyTimer>Math.max(28-level*2,10)){if(!bossActive)spawnEnemy();enemyTimer=0;}
  if(score>level*1200&&!bossActive&&level<10)spawnBoss();

  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;return p.life>0;});
}

function hitPlayer(){lives--;updateHUD();explode(player.x,player.y,ACCENT,18);if(lives<=0)gameOver();}
function levelUp(){level++;updateHUD();const l=document.getElementById('levelup');l.textContent='LEVEL '+level+'!';l.classList.add('show');setTimeout(()=>l.classList.remove('show'),1500);}
function updateHUD(){
  document.getElementById('scoreDisplay').textContent=score;
  document.getElementById('levelDisplay').textContent=level;
  document.getElementById('livesDisplay').textContent='❤️'.repeat(lives)+'🖤'.repeat(Math.max(0,3-lives));
}

function drawStars(){ctx.fillStyle='rgba(255,255,255,0.7)';stars.forEach(s=>{s.y+=s.s;if(s.y>H){s.y=-2;s.x=Math.random()*W;}ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});}

function drawPlayer(){
  const{x,y,w,h}=player;
  ctx.save();
  const g=ctx.createRadialGradient(x,y+h/2,2,x,y+h/2,22);
  g.addColorStop(0,ACCENT);g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y+h/2,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1a2e';
  ctx.beginPath();ctx.moveTo(x,y-h/2);ctx.lineTo(x+w/2,y+h/2);ctx.lineTo(x-w/2,y+h/2);ctx.closePath();ctx.fill();
  ctx.fillStyle=ACCENT;ctx.globalAlpha=0.8;
  ctx.beginPath();ctx.ellipse(x,y,7,13,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.restore();
}

function loop(){
  if(state!=='playing')return;
  ctx.fillStyle='rgba(0,0,8,0.82)';ctx.fillRect(0,0,W,H);
  drawStars();
  particles.forEach(p=>{ctx.save();ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.shadowBlur=5;ctx.shadowColor=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();});
  enemies.forEach(e=>{
    (e.bullets||[]).forEach(eb=>{ctx.save();ctx.fillStyle=eb.color;ctx.shadowBlur=7;ctx.shadowColor=eb.color;ctx.fillRect(eb.x-2,eb.y,4,14);ctx.restore();});
    ctx.save();ctx.translate(e.x,e.y);
    if(e.type==='boss'){
      ctx.fillStyle='#ff0040';ctx.shadowBlur=20;ctx.shadowColor='#ff0040';
      ctx.beginPath();ctx.moveTo(0,-e.h/2);ctx.lineTo(e.w/2,e.h/2);ctx.lineTo(0,e.h/3);ctx.lineTo(-e.w/2,e.h/2);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(-e.w/2,e.h/2+6,e.w,5);
      ctx.fillStyle='#ff0040';ctx.fillRect(-e.w/2,e.h/2+6,e.w*(e.hp/e.maxHp),5);
    }else{
      ctx.fillStyle=e.color;ctx.shadowBlur=10;ctx.shadowColor=e.color;
      ctx.beginPath();ctx.moveTo(0,e.h/2);ctx.lineTo(e.w/2,-e.h/2);ctx.lineTo(-e.w/2,-e.h/2);ctx.closePath();ctx.fill();
    }
    ctx.restore();
  });
  bullets.forEach(b=>{ctx.save();const g=ctx.createLinearGradient(b.x,b.y+16,b.x,b.y-16);g.addColorStop(0,'transparent');g.addColorStop(1,b.color);ctx.fillStyle=g;ctx.shadowBlur=8;ctx.shadowColor=b.color;ctx.fillRect(b.x-2,b.y-16,4,16);ctx.restore();});
  drawPlayer();update();
  raf=requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{keys[e.key]=true;});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
document.getElementById('leftBtn').addEventListener('touchstart',e=>{e.preventDefault();touchLeft=true;},{passive:false});
document.getElementById('leftBtn').addEventListener('touchend',e=>{e.preventDefault();touchLeft=false;},{passive:false});
document.getElementById('rightBtn').addEventListener('touchstart',e=>{e.preventDefault();touchRight=true;},{passive:false});
document.getElementById('rightBtn').addEventListener('touchend',e=>{e.preventDefault();touchRight=false;},{passive:false});
document.getElementById('fire-btn').addEventListener('touchstart',e=>{e.preventDefault();touchFire=true;},{passive:false});
document.getElementById('fire-btn').addEventListener('touchend',e=>{e.preventDefault();touchFire=false;},{passive:false});
let tStartX=0;
canvas.addEventListener('touchstart',e=>{tStartX=e.touches[0].clientX;touchFire=true;});
canvas.addEventListener('touchmove',e=>{const dx=e.touches[0].clientX-tStartX;player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x+dx*0.8));tStartX=e.touches[0].clientX;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',()=>touchFire=false);

function startGame(){score=0;level=1;lives=3;init();updateHUD();
  ['startScreen','gameoverScreen'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('hud').style.display='flex';
  document.getElementById('controls').style.display='flex';
  state='playing';cancelAnimationFrame(raf);loop();}

function gameOver(){state='gameover';cancelAnimationFrame(raf);
  document.getElementById('hud').style.display='none';
  document.getElementById('controls').style.display='none';
  document.getElementById('finalScore').textContent=score;
  if(score>bestScore){bestScore=score;localStorage.setItem('best_'+PROD_ID,bestScore);
    document.getElementById('bestMsg').textContent='🏆 {{NEW_BEST_LBL}}!';
    document.getElementById('bestScore').textContent=bestScore;
  }else{document.getElementById('bestMsg').textContent='{{BEST_LBL}}: '+bestScore;}
  document.getElementById('gameoverScreen').classList.add('active');}

function showStart(){state='start';cancelAnimationFrame(raf);
  document.getElementById('hud').style.display='none';
  document.getElementById('controls').style.display='none';
  ['startScreen'].forEach(id=>document.getElementById(id).classList.add('active'));
  document.getElementById('gameoverScreen').classList.remove('active');}
</script>
</body>
</html>
