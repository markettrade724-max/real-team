<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mischief Masterpiece</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js">
</script>
<style>
:root {
  --acc: #f472b6;
  --acc-rgb: 244,114,182;
  --bg: #020210;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Segoe UI', Tajawal, sans-serif;
  color: #f1f5f9;
  user-select: none;
  -webkit-user-select: none;
}
#wrap {
  position: relative;
  width: 100%;
  max-width: 420px;
  height: 100dvh;
  margin: 0 auto;
  overflow: hidden;
  background: radial-gradient(ellipse at center, #0a0a1a 0%, #000 100%);
}
#wrap canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100% !important;
  height: 100% !important;
}
/* ── شاشات العرض ── */
.scr {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  text-align: center;
  padding: 28px;
  background: radial-gradient(ellipse at center, rgba(244,114,182,0.15) 0%, rgba(0,0,0,0.9) 100%);
  backdrop-filter: blur(10px);
  z-index: 50;
}
.scr.on { display: flex; }
.g-title {
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--acc);
  letter-spacing: -1px;
  text-shadow: 0 0 30px var(--acc), 0 0 60px rgba(244,114,182,0.5);
  animation: titlePulse 2s ease-in-out infinite;
}
@keyframes titlePulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}
.g-desc { color: #94a3b8; font-size: 0.9rem; line-height: 1.6; max-width: 300px; }
.btn {
  padding: 14px 0;
  border-radius: 14px;
  font-size: 1rem;
  font-weight: 700;
  border: none;
  cursor: pointer;
  width: 100%;
  max-width: 300px;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: inherit;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn:active { transform: scale(0.96); }
.btn-p {
  background: var(--acc);
  color: #000;
  box-shadow: 0 0 30px rgba(244,114,182,0.5);
}
.btn-p:hover { box-shadow: 0 0 50px rgba(244,114,182,0.8); transform: translateY(-2px); }
/* ── HUD ── */
#hud {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: none;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 20;
}
.hud-bl { display: flex; flex-direction: column; }
.hud-l { font-size: 0.6rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.12em; }
.hud-v { font-size: 1rem; font-weight: 900; color: var(--acc); font-family: monospace; }
#hpWrap { display: flex; align-items: center; gap: 6px; }
#hpBar {
  width: 80px;
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: inset 0 1px 4px rgba(0,0,0,0.6);
}
#hpFill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, #ef4444, #f97316);
  transition: width 0.3s ease;
}
/* ── عناصر التحكم باللمس ── */
#fireBtn {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: rgba(244,114,182,0.2);
  border: 3px solid rgba(244,114,182,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 20;
  cursor: pointer;
  transition: all 0.2s ease;
  animation: firePulse 1.5s ease-in-out infinite;
  backdrop-filter: blur(8px);
}
@keyframes firePulse {
  0%, 100% { box-shadow: 0 0 20px rgba(244,114,182,0.4); }
  50% { box-shadow: 0 0 40px rgba(244,114,182,0.8); }
}
#fireBtn.on {
  background: rgba(244,114,182,0.5);
  border-color: #fff;
}
#fireBtn svg { width: 32px; height: 32px; fill: var(--acc); }
#movePad {
  position: absolute;
  bottom: 20px;
  left: 20px;
  width: 110px;
  height: 70px;
  border-radius: 16px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.15);
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  z-index: 20;
  backdrop-filter: blur(10px);
}
.mpBtn {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s ease;
}
.mpBtn.on {
  background: rgba(244,114,182,0.35);
  border-color: var(--acc);
  box-shadow: 0 0 20px rgba(244,114,182,0.4);
}
.mpBtn svg { width: 22px; height: 22px; fill: #cbd5e1; }
/* ── شارة المرحلة ── */
#lvFlash {
  position: absolute;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(244,114,182,0.2);
  border: 1px solid rgba(244,114,182,0.5);
  color: var(--acc);
  padding: 6px 22px;
  border-radius: 100px;
  font-weight: 900;
  font-size: 0.9rem;
  font-family: monospace;
  letter-spacing: 0.1em;
  display: none;
  z-index: 25;
  white-space: nowrap;
  text-shadow: 0 0 12px var(--acc);
}
</style>
</head>
<body>
<div id="wrap">
  <div class="scr on" id="sStart">
    <div class="g-title">Mischief Masterpiece</div>
    <div class="g-desc">Crazy non-stop action arcade game — compete amid chaotic hilarity!</div>
    <button class="btn btn-p" onclick="startGame()">▶ Play Now</button>
  </div>

  <div id="hud">
    <div class="hud-bl"><div class="hud-l">Score</div><div class="hud-v" id="hudScore">0</div></div>
    <div class="hud-bl" style="align-items:center"><div class="hud-l">Level</div><div class="hud-v" id="hudLevel">1</div></div>
    <div class="hud-bl" style="align-items:flex-end"><div class="hud-l">HP</div><div id="hpWrap"><div id="hpBar"><div id="hpFill" style="width:100%"></div></div></div></div>
  </div>

  <div id="lvFlash">LEVEL 1</div>

  <div id="fireBtn"><svg viewBox="0 0 24 24"><polygon points="12,2 22,22 12,17 2,22"/></svg></div>
  <div id="movePad">
    <div class="mpBtn" id="mpL"><svg viewBox="0 0 24 24"><polygon points="15,4 5,12 15,20"/></svg></div>
    <div class="mpBtn" id="mpR"><svg viewBox="0 0 24 24"><polygon points="9,4 19,12 9,20"/></svg></div>
  </div>

  <div class="scr" id="sEnd">
    <div style="font-size:3.5rem">💥</div>
    <div class="g-title" style="font-size:1.8rem">Game Over</div>
    <div id="finalScore" style="font-family:monospace;font-size:1.3rem;color:var(--acc)"></div>
    <button class="btn btn-p" onclick="startGame()">Try Again</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// الإعدادات العامة
// ═══════════════════════════════════════════
const CFG = {
  pid: 'mischief-masterpiece',
  lang: 'en',
  acc: '#f472b6',
  accN: parseInt('#f472b6'.replace('#',''), 16),
  accRGB: [244,114,182].map(Number),
  iaps: [{"id":"no-ads","type":"remove_ads","price":1.99,"emoji":"🚫","name":{"ar":"إزالة الإعلانات","en":"Remove Ads","fr":"Sans pub","es":"Sin anuncios","de":"Werbefrei","zh":"去广告"}},{"id":"theme-pack","type":"cosmetic","price":1.49,"emoji":"🎨","name":{"ar":"حزمة الثيمات","en":"Themes Pack","fr":"Pack thèmes","es":"Pack temas","de":"Theme-Paket","zh":"主题包"}},{"id":"full-unlock","type":"unlock","price":2.99,"emoji":"⭐","name":{"ar":"فتح كل المحتوى","en":"Unlock All","fr":"Tout débloquer","es":"Desbloquear todo","de":"Alles freischalten","zh":"解锁全部"}}],
  lvls: [{"enemyCount":8,"enemySpeed":1.3,"enemyHealth":1,"bulletSpeed":6,"spawnInterval":90},{"enemyCount":11,"enemySpeed":1.6,"enemyHealth":1,"bulletSpeed":6,"spawnInterval":80},{"enemyCount":14,"enemySpeed":1.9,"enemyHealth":2,"bulletSpeed":6,"spawnInterval":70},{"enemyCount":17,"enemySpeed":2.2,"enemyHealth":2,"bulletSpeed":6,"spawnInterval":60},{"enemyCount":20,"enemySpeed":2.5,"enemyHealth":3,"bulletSpeed":6,"spawnInterval":50}] || []
};

// مستويات افتراضية قوية
if (!Array.isArray(CFG.lvls) || CFG.lvls.length === 0) {
  CFG.lvls = [
    { enemyCount: 6,  enemySpeed: 1.0, enemyHealth: 1 },
    { enemyCount: 8,  enemySpeed: 1.3, enemyHealth: 1 },
    { enemyCount: 10, enemySpeed: 1.6, enemyHealth: 2 },
    { enemyCount: 12, enemySpeed: 1.9, enemyHealth: 2 },
    { enemyCount: 15, enemySpeed: 2.3, enemyHealth: 3 },
  ];
}

function getLevelData(idx) {
  const def = CFG.lvls && CFG.lvls[idx] ? CFG.lvls[idx] : {};
  return {
    enemyCount:  typeof def.enemyCount  === 'number' && def.enemyCount > 0  ? def.enemyCount  : 6,
    enemySpeed:  typeof def.enemySpeed  === 'number' && def.enemySpeed > 0  ? def.enemySpeed  : 1.2,
    enemyHealth: typeof def.enemyHealth === 'number' && def.enemyHealth > 0 ? def.enemyHealth : 1,
  };
}

const SK = 'rt_' + CFG.pid;
const S  = () => JSON.parse(localStorage.getItem(SK) || '{}');
const isMobile = () => 'ontouchstart' in window && matchMedia('(pointer: coarse)').matches;

const GW = Math.min(window.innerWidth, 420);
const GH = window.innerHeight;

// ═══════════════════════════════════════════
// المتغيرات العالمية للتحكم
// ═══════════════════════════════════════════
window.K = { L: false, R: false, F: false };
let gameScene = null;

// ═══════════════════════════════════════════
// مشهد التحضير
// ═══════════════════════════════════════════
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }

  create() {
    // نجوم
    const g = this.make.graphics({ add: false });
    g.fillStyle(0x030310); g.fillRect(0, 0, 512, 512);
    for (let i = 0; i < 350; i++) {
      g.fillStyle(0xffffff, Math.random() * 0.7);
      g.fillRect(Math.random() * 512 | 0, Math.random() * 512 | 0, 1, 1);
    }
    g.generateTexture('stars', 512, 512); g.destroy();

    // اللاعب
    const pg = this.make.graphics({ add: false });
    pg.fillStyle(CFG.accN, 0.3); pg.fillEllipse(18, 48, 24, 16);
    pg.fillStyle(0xd0d8f0, 1); pg.fillTriangle(18, 0, 34, 40, 2, 40);
    pg.fillStyle(CFG.accN, 0.9); pg.fillEllipse(18, 18, 14, 22);
    pg.fillStyle(0xffffff, 0.6); pg.fillEllipse(15, 14, 5, 8);
    pg.generateTexture('player', 36, 52); pg.destroy();

    // أعداء متنوعون
    const variants = [
      { col: 0xff4444, sc: 1.0 },  // أحمر
      { col: 0xff8800, sc: 1.1 },  // برتقالي
      { col: 0x44ff44, sc: 0.9 },  // أخضر
      { col: 0xcc44ff, sc: 1.3 },  // بنفسجي
    ];
    variants.forEach((v, i) => {
      const eg = this.make.graphics({ add: false });
      eg.fillStyle(v.col, 1);
      eg.fillEllipse(14, 11, 22 * v.sc, 18 * v.sc);
      eg.fillStyle(0xffffff, 0.8); eg.fillCircle(10, 8, 5 * v.sc);
      eg.fillStyle(0x000000, 0.7); eg.fillCircle(11, 7, 2 * v.sc);
      eg.generateTexture('enemy_' + i, 28, 22); eg.destroy();
    });

    // رصاصة
    const bg = this.make.graphics({ add: false });
    bg.fillStyle(CFG.accN, 1); bg.fillRect(0, 0, 4, 20);
    bg.fillStyle(0xffffff, 0.9); bg.fillRect(1, 0, 2, 3);
    bg.generateTexture('bullet', 4, 20); bg.destroy();

    // جزيئات
    const px = this.make.graphics({ add: false });
    px.fillStyle(0xffffff); px.fillRect(0, 0, 4, 4);
    px.generateTexture('px', 4, 4); px.destroy();

    this.scene.start('Game');
  }
}

// ═══════════════════════════════════════════
// مشهد اللعبة الأساسي
// ═══════════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    this.score = 0;
    this.hp = 3;
    this.maxHp = 3;
    this.levelIndex = 0;
    this.active = false;
    this.invincible = 0;
    this.killed = 0;
    this.lastFire = 0;
    this.fireRate = 200; // ميلي ثانية بين كل رصاصة

    // الخلفية
    this.bg1 = this.add.tileSprite(GW/2, GH/2, GW, GH, 'stars').setDepth(0);
    this.bg2 = this.add.tileSprite(GW/2, GH/2, GW, GH, 'stars')
      .setAlpha(0.4).setTilePosition(300, 200).setDepth(0);

    // اللاعب
    this.player = this.physics.add.image(GW/2, GH - 80, 'player')
      .setDepth(5).setCollideWorldBounds(true);
    this.player.body.setSize(24, 40).setOffset(6, 6);

    // المجموعات الفيزيائية
    this.bullets = this.physics.add.group({ defaultKey: 'bullet' });
    this.enemies = this.physics.add.group();

    // لوحة المفاتيح
    this.cursors = this.input.keyboard?.createCursorKeys();

    // إطلاق بالنقر
    this.input.on('pointerdown', (pointer) => {
      if (this.active) this.fireBullet();
    });

    // نظام الجزيئات
    this.explosionFx = this.add.particles(0, 0, 'px', {
      speed: { min: 60, max: 250 },
      angle: { min: 0, max: 360 },
      scale: { start: 1.2, end: 0 },
      alpha: { start: 1, end: 0 },
      tint: [0xff6600, 0xffcc00, 0xff3300, 0xffffff],
      lifespan: 500,
      blendMode: 'ADD',
      emitting: false,
    }).setDepth(8);

    this.hitFx = this.add.particles(0, 0, 'px', {
      speed: { min: 20, max: 80 },
      angle: { min: 0, max: 360 },
      scale: { start: 0.7, end: 0 },
      alpha: { start: 0.8, end: 0 },
      tint: [CFG.accN, 0xffffff],
      lifespan: 250,
      blendMode: 'ADD',
      emitting: false,
    }).setDepth(8);

    gameScene = this;
    this._updateHUD();
  }

  // ═══════════════════════════════════════════
  // بدء مستوى جديد
  // ═══════════════════════════════════════════
  startLevel() {
    this.active = true;
    this.killed = 0;
    this.enemies.clear(true, true);
    this.bullets.clear(true, true);

    const lv = getLevelData(this.levelIndex);
    const count = lv.enemyCount;
    const speed = lv.enemySpeed;

    console.log(`🚀 Level ${this.levelIndex + 1}: ${count} enemies`);

    // إنشاء الأعداء
    for (let i = 0; i < count; i++) {
      const x = Phaser.Math.Between(30, GW - 30);
      const y = -20 - Math.random() * 60;
      const variant = Phaser.Math.Between(0, 3); // 4 أنواع
      const enemy = this.enemies.create(x, y, 'enemy_' + variant);
      enemy.setDepth(4);
      enemy.body.setSize(22, 16).setOffset(3, 3);
      enemy.body.velocity.y = speed * 30;
      enemy._health = lv.enemyHealth;
      enemy._variant = variant;
      enemy._scoreValue = (variant + 1) * 10;
    }

    // عرض شارة المستوى
    const flash = document.getElementById('lvFlash');
    flash.textContent = 'Level ' + (this.levelIndex + 1);
    flash.style.display = 'block';
    setTimeout(() => flash.style.display = 'none', 1500);

    this._updateHUD();
  }

  // ═══════════════════════════════════════════
  // إطلاق رصاصة
  // ═══════════════════════════════════════════
  fireBullet() {
    if (!this.active || !this.player) return;
    const bullet = this.bullets.create(this.player.x, this.player.y - 30, 'bullet');
    bullet.setDepth(6);
    bullet.body.velocity.y = -650;
    // تأثير صوتي بصري خفيف
    this.hitFx.setPosition(this.player.x, this.player.y - 30).explode(3);
  }

  // ═══════════════════════════════════════════
  // حلقة التحديث
  // ═══════════════════════════════════════════
  update(time, delta) {
    if (!this.active) return;

    // تحريك الخلفية
    this.bg1.tilePositionY -= 1.0;
    this.bg2.tilePositionY -= 0.5;

    // التحكم باللاعب
    const left  = this.cursors?.left.isDown  || (window.K && window.K.L);
    const right = this.cursors?.right.isDown || (window.K && window.K.R);
    if (left)  this.player.body.velocity.x = -320;
    else if (right) this.player.body.velocity.x = 320;
    else this.player.body.velocity.x = 0;

    // الحصانة المؤقتة
    if (this.invincible > 0) {
      this.invincible -= delta / 1000;
      this.player.setAlpha(0.4 + 0.6 * Math.abs(Math.sin(time * 0.015)));
    } else {
      this.player.setAlpha(1);
    }

    // إطلاق النار (مسافة أو زر اللمس)
    const firePressed = this.cursors?.space?.isDown || (window.K && window.K.F);
    if (firePressed && time - this.lastFire > this.fireRate) {
      this.fireBullet();
      this.lastFire = time;
    }

    // تنظيف الرصاصات خارج الشاشة
    this.bullets.getChildren().forEach(b => {
      if (b.y < -20 || b.y > GH + 20) b.destroy();
    });

    // تحديث الأعداء
    this.enemies.getChildren().forEach(enemy => {
      if (!enemy.active) return;
      // حركة تذبذب بسيطة
      enemy.x += Math.sin(time * 0.003 + enemy.y * 0.01) * 1.2;
      // إذا تجاوز العدو الشاشة
      if (enemy.y > GH + 40) {
        if (this.invincible <= 0) this.damagePlayer(1);
        enemy.destroy();
      }
    });

    // اصطدام الرصاصات بالأعداء
    this.physics.overlap(this.bullets, this.enemies, (bullet, enemy) => {
      bullet.destroy();
      enemy._health--;

      // تأثير إصابة
      this.hitFx.setPosition(enemy.x, enemy.y).explode(6);

      if (enemy._health <= 0) {
        // تأثير انفجار
        this.explosionFx.setPosition(enemy.x, enemy.y).explode(12);
        this.cameras.main.shake(80, 0.005);

        this.score += enemy._scoreValue || 10;
        this.killed++;
        enemy.destroy();
      }
      this._updateHUD();
    });

    // التحقق من انتهاء المستوى
    if (this.killed >= this.enemies.getLength() && this.enemies.getLength() === 0) {
      this.active = false;
      this.time.delayedCall(600, () => {
        this.levelIndex++;
        if (this.levelIndex >= (CFG.lvls.length || 5)) {
          this.endGame(true);
        } else {
          this.startLevel();
        }
      });
    }
  }

  // ═══════════════════════════════════════════
  // ضرر اللاعب
  // ═══════════════════════════════════════════
  damagePlayer(amount) {
    if (this.invincible > 0) return;
    this.hp -= amount;
    this.invincible = 1.5;
    this.cameras.main.shake(180, 0.012);
    this.explosionFx.setPosition(this.player.x, this.player.y).explode(6);
    this._updateHUD();
    if (this.hp <= 0) {
      this.active = false;
      this.time.delayedCall(500, () => this.endGame(false));
    }
  }

  // ═══════════════════════════════════════════
  // نهاية اللعبة
  // ═══════════════════════════════════════════
  endGame(won) {
    this.active = false;
    this.enemies.clear(true, true);
    this.bullets.clear(true, true);

    document.getElementById('hud').style.display = 'none';
    document.getElementById('fireBtn').style.display = 'none';
    document.getElementById('movePad').style.display = 'none';

    const endEl = document.getElementById('sEnd');
    endEl.querySelector('.g-title').textContent = won ? 'You Win!' : 'Game Over';
    document.getElementById('finalScore').textContent = 'Score: ' + this.score;
    endEl.classList.add('on');
  }

  // ═══════════════════════════════════════════
  // إعادة التعيين
  // ═══════════════════════════════════════════
  resetGame() {
    this.score = 0;
    this.hp = this.maxHp;
    this.levelIndex = 0;
    this.active = false;
    this.invincible = 0;
    this.killed = 0;
    this.enemies.clear(true, true);
    this.bullets.clear(true, true);
    this.player.setPosition(GW/2, GH - 80).setAlpha(1);
    this._updateHUD();
  }

  // ═══════════════════════════════════════════
  // تحديث واجهة المستخدم
  // ═══════════════════════════════════════════
  _updateHUD() {
    document.getElementById('hudScore').textContent = this.score;
    document.getElementById('hudLevel').textContent = this.levelIndex + 1;
    const pct = Math.max(0, (this.hp / this.maxHp) * 100);
    document.getElementById('hpFill').style.width = pct + '%';
  }
}

// ═══════════════════════════════════════════
// تشغيل Phaser
// ═══════════════════════════════════════════
new Phaser.Game({
  type: Phaser.AUTO,
  width: GW,
  height: GH,
  backgroundColor: 0x000000,
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: 0 },
      debug: false,
    },
  },
  scene: [BootScene, GameScene],
  parent: 'wrap',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
});

// ═══════════════════════════════════════════
// دوال الواجهة
// ═══════════════════════════════════════════
function startGame() {
  document.getElementById('sStart').classList.remove('on');
  document.getElementById('sEnd').classList.remove('on');
  document.getElementById('hud').style.display = 'flex';

  if (isMobile()) {
    document.getElementById('fireBtn').style.display = 'flex';
    document.getElementById('movePad').style.display = 'flex';
  }

  if (gameScene) {
    gameScene.resetGame();
    gameScene.startLevel();
  }
}

// ═══════════════════════════════════════════
// ربط أزرار التحكم باللمس
// ═══════════════════════════════════════════
document.getElementById('fireBtn')?.addEventListener('pointerdown', () => {
  window.K.F = true;
  document.getElementById('fireBtn').classList.add('on');
});
document.getElementById('fireBtn')?.addEventListener('pointerup', () => {
  window.K.F = false;
  document.getElementById('fireBtn').classList.remove('on');
});
document.getElementById('mpL')?.addEventListener('pointerdown', () => {
  window.K.L = true;
  document.getElementById('mpL').classList.add('on');
});
document.getElementById('mpL')?.addEventListener('pointerup', () => {
  window.K.L = false;
  document.getElementById('mpL').classList.remove('on');
});
document.getElementById('mpR')?.addEventListener('pointerdown', () => {
  window.K.R = true;
  document.getElementById('mpR').classList.add('on');
});
document.getElementById('mpR')?.addEventListener('pointerup', () => {
  window.K.R = false;
  document.getElementById('mpR').classList.remove('on');
});
</script>
</body>
</html>
