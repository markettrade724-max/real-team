<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>رحلة الزمن</title>
<style>
:root{--acc:#818cf8;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#000;
  font-family:'Segoe UI',Tajawal,sans-serif;color:#f1f5f9;}
#wrap{position:relative;width:100%;max-width:420px;height:100vh;margin:0 auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:10px;}

.grid{display:grid;gap:8px;justify-content:center;width:100%;max-width:340px;
  grid-template-columns:repeat(3,1fr);}
.card{aspect-ratio:1;font-size:3rem;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.07);border-radius:12px;cursor:pointer;
  transition:transform .2s,background .2s;user-select:none;}
.card.flipped{background:rgba(129,140,248,.25);transform:scale(1.05);}
.card.matched{opacity:.4;pointer-events:none;}

.hud{display:flex;justify-content:space-between;width:100%;max-width:340px;font-size:.85rem;}
.hud span{font-family:monospace;color:var(--acc);}
.btn{background:var(--acc);color:#000;border:none;padding:12px 28px;border-radius:10px;
  font-weight:700;cursor:pointer;font-family:inherit;font-size:.9rem;}
.btn:active{transform:scale(.95);}
</style>
</head>
<body>
<div id="wrap">
  <div class="hud">
    <span id="moves">حركات: 0</span>
    <span id="pairs">أزواج: 0/4</span>
    <span id="hintBtn" style="cursor:pointer;" title="تلميح">💡 2</span>
  </div>
  <div class="grid" id="grid"></div>
  <button class="btn" onclick="restart()" id="restartBtn">لعبة جديدة</button>
  <div id="winMsg" style="color:var(--acc);font-weight:900;font-size:1.2rem;display:none;">أحسنت!</div>
</div>
<script>
const EMOJIS = ["⏳","🕰️","📜","🗝️","🧭","⚙️","🔭","⚛️","🗿","🚀","🌌","💎"].slice(0, 4);
const TOTAL_PAIRS = 4;
let moves = 0, found = 0, hintsLeft = 2, lock = false, first = null, second = null;
const movesEl = document.getElementById('moves'), pairsEl = document.getElementById('pairs');
const grid = document.getElementById('grid'), winMsg = document.getElementById('winMsg');
const hintBtn = document.getElementById('hintBtn');
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let cards = shuffle([...EMOJIS,...EMOJIS].map((e,i)=>({emoji:e,id:i,matched:false,flipped:false})));
function render(){
  grid.innerHTML='';
  cards.forEach((c,i)=>{
    const d=document.createElement('div'); d.className='card'+(c.matched?' matched':c.flipped?' flipped':'');
    d.textContent=c.flipped||c.matched?c.emoji:'';
    d.addEventListener('click',()=>flip(i));
    grid.appendChild(d);
  });
  pairsEl.textContent=`أزواج: ${found}/${TOTAL_PAIRS}`;
}
function flip(i){
  if(lock||cards[i].matched||cards[i].flipped||i===first)return;
  cards[i].flipped=true;render();
  if(first===null){first=i;return;}
  second=i;moves++;movesEl.textContent=`حركات: ${moves}`;
  if(cards[first].emoji===cards[second].emoji){
    cards[first].matched=cards[second].matched=true;found++;
    if(found===TOTAL_PAIRS){winMsg.style.display='block';}
    first=second=null;render();
  }else{
    lock=true;
    setTimeout(()=>{cards[first].flipped=cards[second].flipped=false;first=second=null;lock=false;render();},800);
  }
}
hintBtn.addEventListener('click',()=>{
  if(lock||hintsLeft<=0)return;
  const unflipped=cards.reduce((a,c,i)=>(!c.flipped&&!c.matched?a.concat(i):a),[]);
  if(unflipped.length<2)return;
  const i1=unflipped[Math.floor(Math.random()*unflipped.length)];
  const pair=cards.findIndex((c,idx)=>idx!==i1&&c.emoji===cards[i1].emoji&&!c.flipped&&!c.matched);
  if(pair>-1){[cards[i1].flipped,cards[pair].flipped]=[true,true];hintsLeft--;hintBtn.textContent=`💡 ${hintsLeft}`;render();
    setTimeout(()=>{cards[i1].flipped=cards[pair].flipped=false;render();},1200);
  }
});
function restart(){cards=shuffle([...EMOJIS,...EMOJIS].map((e,i)=>({emoji:e,id:i,matched:false,flipped:false})));moves=found=0;hintsLeft=2;first=second=null;lock=false;winMsg.style.display='none';hintBtn.textContent=`💡 ${hintsLeft}`;render();}
render();
</script>
</body>
</html>
