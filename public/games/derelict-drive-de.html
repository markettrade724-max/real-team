<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Derelict Drive</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>
:root{--acc:#facc15;--acc-rgb:250,204,21;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',Tajawal,sans-serif;color:#f1f5f9;user-select:none;-webkit-user-select:none;}
#wrap{position:relative;width:100%;max-width:420px;height:100dvh;margin:0 auto;overflow:hidden;background:radial-gradient(ellipse at center,#0a0a1a 0%,#000 100%);}
#wrap canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;}
/* شاشات */
.scr{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:28px;background:radial-gradient(ellipse at center,rgba(250,204,21,0.15) 0%,rgba(0,0,0,0.9) 100%);backdrop-filter:blur(10px);z-index:50;}
.scr.on{display:flex;}
.g-emoji{font-size:5rem;line-height:1;}
.g-title{font-size:2rem;font-weight:900;color:var(--acc);text-shadow:0 0 30px var(--acc);}
.g-desc{color:#94a3b8;font-size:0.9rem;line-height:1.6;max-width:300px;}
.stat-row{display:flex;gap:24px;justify-content:center;}
.stat .v{font-size:1.6rem;font-weight:900;color:var(--acc);font-family:monospace;}
.stat .l{font-size:0.65rem;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;}
.btn{padding:13px 0;border-radius:12px;font-size:0.95rem;font-weight:700;border:none;cursor:pointer;width:100%;max-width:300px;transition:transform .12s;display:flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;}
.btn:active{transform:scale(.96);}
.btn-p{background:var(--acc);color:#000;box-shadow:0 0 28px rgba(250,204,21,0.35);}
.btn-s{background:rgba(255,255,255,0.07);color:#f1f5f9;border:1px solid rgba(255,255,255,0.1);}
/* HUD */
#hud{position:absolute;top:0;left:0;right:0;display:none;justify-content:space-between;align-items:center;padding:8px 14px;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06);z-index:20;}
.hi{display:flex;flex-direction:column;align-items:center;}
.hi .l{font-size:0.58rem;color:#64748b;text-transform:uppercase;letter-spacing:0.1em;}
.hi .v{font-size:1rem;font-weight:900;color:var(--acc);font-family:monospace;}
/* النيترو */
#nbar{position:absolute;left:14px;right:14px;bottom:78px;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;display:none;z-index:20;}
#nfill{height:100%;width:100%;border-radius:3px;background:linear-gradient(90deg,#60a5fa,#a78bfa);transition:width 0.08s;}
/* عناصر التحكم */
#ctrl{position:absolute;bottom:0;left:0;right:0;display:none;gap:8px;padding:8px 14px 16px;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);z-index:20;}
.cb{flex:1;height:52px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:10px;font-size:1.4rem;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;}
.cb:active,.cb.pressed{background:rgba(255,255,255,0.22);}
.cb-n{flex:0.85;background:rgba(129,140,248,0.15);border-color:rgba(129,140,248,0.4);font-size:0.68rem;font-weight:900;color:#a78bfa;letter-spacing:0.05em;}
/* العد التنازلي */
#cd{position:absolute;inset:0;background:rgba(0,0,0,0.82);display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:45;}
#cd.on{display:flex;}
#cdN{font-size:9rem;font-weight:900;color:var(--acc);line-height:1;text-shadow:0 0 80px var(--acc);}
#cdS{color:#94a3b8;font-size:1rem;letter-spacing:0.08em;text-transform:uppercase;}
/* فلاش اللفة */
#lapFlash{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(250,204,21,0.15);border:1px solid rgba(250,204,21,0.4);color:var(--acc);padding:6px 20px;border-radius:100px;font-weight:900;font-size:0.9rem;font-family:monospace;letter-spacing:0.1em;display:none;z-index:25;white-space:nowrap;}
</style>
</head>
<body>
<div id="wrap">
  <!-- شاشة البداية -->
  <div class="scr on" id="sStart">
    <div class="g-emoji">🚗</div>
    <div class="g-title">Derelict Drive</div>
    <div class="g-desc">Escape haunted ruins in your decaying car. Fuel, fear, survive.</div>
    <div class="stat-row">
      <div class="stat"><div class="v" id="bestDisp">--:--</div><div class="l">Beste Zeit</div></div>
      <div class="stat"><div class="v">{{TOTAL_LAPS}}</div><div class="l">Runden</div></div>
      <div class="stat"><div class="v">{{MAX_SPEED}}</div><div class="l">km/h</div></div>
    </div>
    <button class="btn btn-p" onclick="startGame()">🏁 Spielen</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hi"><div class="l">Runde</div><div class="v" id="hLap">1/{{TOTAL_LAPS}}</div></div>
    <div class="hi"><div class="l">Position</div><div class="v" id="hPos">P1</div></div>
    <div class="hi"><div class="l">Zeit</div><div class="v" id="hTime">0:00</div></div>
    <div class="hi"><div class="l">Geschwindigkeit</div><div class="v" id="hSpd">0</div></div>
  </div>

  <!-- شريط النيترو -->
  <div id="nbar"><div id="nfill"></div></div>

  <!-- فلاش اللفة -->
  <div id="lapFlash">LAP 1/{{TOTAL_LAPS}}</div>

  <!-- أزرار التحكم -->
  <div id="ctrl">
    <div class="cb" id="bL">◀</div>
    <div class="cb cb-n" id="bN">⚡ Nitro</div>
    <div class="cb" id="bR">▶</div>
  </div>

  <!-- العد التنازلي -->
  <div id="cd">
    <div id="cdN">3</div>
    <div id="cdS">Bereit</div>
  </div>

  <!-- شاشة النهاية -->
  <div class="scr" id="sEnd">
    <div class="g-emoji">🏁</div>
    <div class="g-title" id="endTitle">Rennen beendet</div>
    <div class="stat-row">
      <div class="stat"><div class="v" id="endTime">0:00</div><div class="l">Zeit</div></div>
      <div class="stat"><div class="v" id="endPos">P1</div><div class="l">Position</div></div>
    </div>
    <button class="btn btn-p" onclick="startGame()">🔄 Nochmal</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════════
const CFG = {
  pid: 'derelict-drive',
  laps: Number('{{TOTAL_LAPS}}') || 3,
  maxSpd: Number('{{MAX_SPEED}}') || 280,
  oppN: Number('{{OPPONENT_COUNT}}') || 3,
  acc: '#facc15',
  accHex: parseInt('#facc15'.replace('#',''), 16),
};

const SK = 'rt_' + CFG.pid;
const S = () => JSON.parse(localStorage.getItem(SK) || '{}');
const sv = d => localStorage.setItem(SK, JSON.stringify({...S(), ...d}));
const fmt = ms => { const s = Math.floor(ms/1000); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };
const isMob = () => 'ontouchstart' in window;

const GW = Math.min(window.innerWidth, 420);
const GH = window.innerHeight;

// نقاط المسار البيضاوي (48 نقطة)
const WAYPOINTS = [];
const cx = GW/2, cy = GH/2;
const rx = GW*0.36, ry = GH*0.36;
for (let i=0; i<48; i++) {
  const a = (i/48)*Math.PI*2 - Math.PI/2;
  WAYPOINTS.push({ x: cx + Math.cos(a)*rx, y: cy + Math.sin(a)*ry });
}
const TRACK_W = Math.round(GW*0.19);

// المتغيرات العامة
window.K = { L:false, R:false, N:false };
let raceScene = null;

// ═══════════════════════════════════════════
// PHASER SCENES
// ═══════════════════════════════════════════
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }
  create() {
    // نسيج الجسيمات
    const g = this.make.graphics({add:false});
    g.fillStyle(0xffffff); g.fillCircle(4,4,4);
    g.generateTexture('px',8,8); g.destroy();

    // نسيج السيارة (اللاعب)
    const pg = this.make.graphics({add:false});
    pg.fillStyle(0x000000,0.4); pg.fillEllipse(14,24,20,12);
    pg.fillStyle(CFG.accHex,1); pg.fillRoundedRect(0,0,28,44,5);
    pg.fillStyle(0x000000,0.45); pg.fillRoundedRect(4,8,20,14,3);
    pg.fillStyle(0x111111); pg.fillRect(-5,8,7,12); pg.fillRect(26,8,7,12); pg.fillRect(-5,26,7,12); pg.fillRect(26,26,7,12);
    pg.fillStyle(0xfff176); pg.fillRect(3,38,8,5); pg.fillRect(17,38,8,5);
    pg.fillStyle(0xffffff,0.5); pg.fillRect(3,0,8,5); pg.fillRect(17,0,8,5);
    pg.generateTexture('pcar',28,44); pg.destroy();

    // سيارات الخصوم (ألوان مختلفة)
    [0xff3333,0x3399ff,0x33cc66,0xcc44ff].forEach((col,i) => {
      const cg = this.make.graphics({add:false});
      cg.fillStyle(0x000000,0.4); cg.fillEllipse(14,24,20,12);
      cg.fillStyle(col,1); cg.fillRoundedRect(0,0,28,44,5);
      cg.fillStyle(0x000000,0.45); cg.fillRoundedRect(4,8,20,14,3);
      cg.fillStyle(0x111111); cg.fillRect(-5,8,7,12); cg.fillRect(26,8,7,12); cg.fillRect(-5,26,7,12); cg.fillRect(26,26,7,12);
      cg.fillStyle(0xff5555); cg.fillRect(3,38,8,5); cg.fillRect(17,38,8,5);
      cg.generateTexture('ocar'+i,28,44); cg.destroy();
    });

    // نسيج علامات الانزلاق
    const sg = this.make.graphics({add:false});
    sg.fillStyle(0x000000,0.4); sg.fillRect(0,0,5,16);
    sg.generateTexture('skid',5,16); sg.destroy();

    this.scene.start('Race');
  }
}

class RaceScene extends Phaser.Scene {
  constructor() { super('Race'); }

  create() {
    this.racing = false; this.finished = false;
    this.lapCount = 0; this.elapsed = 0;
    this.playerWp = 0; this.nitro = 100;
    this.nitroOn = false; this.lastCrash = 0;

    this._drawTrack();
    this._createCars();
    this._createParticles();
    this.cursors = this.input.keyboard?.createCursorKeys();

    raceScene = this;
  }

  _drawTrack() {
    const g = this.add.graphics();
    // العشب
    g.fillStyle(0x1a3d1a); g.fillRect(0,0,GW,GH);
    for(let i=0;i<300;i++) { g.fillStyle(Phaser.Math.Between(0x15301a,0x235c25),0.3); g.fillRect(Phaser.Math.Between(0,GW),Phaser.Math.Between(0,GH),3,7); }
    // الأسفلت
    g.lineStyle(TRACK_W+18,0x374151); g.beginPath(); WAYPOINTS.forEach((p,i)=>i===0?g.moveTo(p.x,p.y):g.lineTo(p.x,p.y)); g.closePath(); g.strokePath();
    g.lineStyle(TRACK_W,0x1e2740); g.beginPath(); WAYPOINTS.forEach((p,i)=>i===0?g.moveTo(p.x,p.y):g.lineTo(p.x,p.y)); g.closePath(); g.strokePath();
    g.lineStyle(TRACK_W-4,0x252f47); g.beginPath(); WAYPOINTS.forEach((p,i)=>i===0?g.moveTo(p.x,p.y):g.lineTo(p.x,p.y)); g.closePath(); g.strokePath();
    // خطوط المسار
    for(let i=0;i<WAYPOINTS.length;i+=3) {
      const j=(i+1)%WAYPOINTS.length;
      g.lineStyle(2,0xffffff,0.12); g.beginPath(); g.moveTo(WAYPOINTS[i].x,WAYPOINTS[i].y); g.lineTo(WAYPOINTS[j].x,WAYPOINTS[j].y); g.strokePath();
    }
    // حواجز
    const outer = WAYPOINTS.map(p=>({x:GW/2+(p.x-GW/2)*1.16,y:GH/2+(p.y-GH/2)*1.16}));
    const inner = WAYPOINTS.map(p=>({x:GW/2+(p.x-GW/2)*0.84,y:GH/2+(p.y-GH/2)*0.84}));
    [outer,inner].forEach(pts => {
      for(let i=0;i<pts.length;i+=2) { g.fillStyle(0xff3333,0.7); g.fillCircle(pts[i].x,pts[i].y,5); g.fillStyle(0x111111,0.5); g.fillCircle(pts[i].x,pts[i].y,3); }
      g.lineStyle(3,0xff4444,0.6); g.beginPath(); pts.forEach((p,i)=>i===0?g.moveTo(p.x,p.y):g.lineTo(p.x,p.y)); g.closePath(); g.strokePath();
    });
    // خط البداية/النهاية
    const s0=WAYPOINTS[0], s1=WAYPOINTS[1];
    const ang=Math.atan2(s1.y-s0.y,s1.x-s0.x);
    const nx=Math.cos(ang+Math.PI/2), ny=Math.sin(ang+Math.PI/2);
    const hw=TRACK_W/2, sq=9;
    for(let i=0;i<8;i++) for(let j=0;j<3;j++) {
      g.fillStyle((i+j)%2===0?0xffffff:0x000000);
      g.fillRect(s0.x+nx*(hw-sq*(j+1))-sq/2+Math.cos(ang)*(i*sq-sq*3.5), s0.y+ny*(hw-sq*(j+1))-sq/2+Math.sin(ang)*(i*sq-sq*3.5), sq, sq);
    }
    // طبقة علامات الانزلاق
    this.skidLayer = this.add.group();
  }

  _createCars() {
    const startAng = Phaser.Math.Angle.Between(WAYPOINTS[0].x,WAYPOINTS[0].y,WAYPOINTS[1].x,WAYPOINTS[1].y)*Phaser.Math.RAD_TO_DEG+90;
    this.car = this.physics.add.image(WAYPOINTS[0].x,WAYPOINTS[0].y,'pcar').setAngle(startAng).setDamping(true).setDrag(0.88).setMaxVelocity(CFG.maxSpd*0.65).setDepth(6);
    this.opponents = [];
    for(let i=0;i<Math.min(CFG.oppN,4);i++) {
      const wi = Math.floor(((i+1)/(CFG.oppN+1))*WAYPOINTS.length);
      const o = this.physics.add.image(WAYPOINTS[wi].x,WAYPOINTS[wi].y,'ocar'+i).setAngle(startAng).setDamping(true).setDrag(0.88).setMaxVelocity(CFG.maxSpd*0.55).setDepth(5);
      this.opponents.push({ sprite:o, wpIdx:wi, lap:0, baseSpeed:220+i*12+Math.random()*20 });
    }
  }

  _createParticles() {
    this.exhaustFx = this.add.particles(0,0,'px',{speed:{min:10,max:35},angle:{min:165,max:195},scale:{start:0.35,end:0},alpha:{start:0.55,end:0},tint:[0x888888,0x666666,0x555555],lifespan:450,frequency:35,blendMode:'NORMAL',emitting:false}).setDepth(3);
    this.nitroFx = this.add.particles(0,0,'px',{speed:{min:80,max:180},angle:{min:155,max:205},scale:{start:0.6,end:0},alpha:{start:0.95,end:0},tint:[0x60a5fa,0xa78bfa,0xffffff],lifespan:220,frequency:10,blendMode:'ADD',emitting:false}).setDepth(4);
    this.crashFx = this.add.particles(0,0,'px',{speed:{min:100,max:280},angle:{min:0,max:360},scale:{start:0.7,end:0},alpha:{start:1,end:0},tint:[0xff6600,0xffcc00,0xff3300],lifespan:450,blendMode:'ADD',emitting:false}).setDepth(7);
  }

  startRace() {
    this.racing=true; this.finished=false; this.elapsed=0; this.lapCount=0; this.nitro=100; this.nitroOn=false; this.playerWp=0;
    this.exhaustFx.start();
  }

  resetPositions() {
    const ang = Phaser.Math.Angle.Between(WAYPOINTS[0].x,WAYPOINTS[0].y,WAYPOINTS[1].x,WAYPOINTS[1].y)*Phaser.Math.RAD_TO_DEG+90;
    this.car.setPosition(WAYPOINTS[0].x,WAYPOINTS[0].y).setAngle(ang); this.car.body.velocity.set(0,0); this.playerWp=0;
    this.opponents.forEach((o,i)=>{
      const wi = Math.floor(((i+1)/(CFG.oppN+1))*WAYPOINTS.length);
      o.sprite.setPosition(WAYPOINTS[wi].x,WAYPOINTS[wi].y).setAngle(ang); o.sprite.body.velocity.set(0,0); o.wpIdx=wi; o.lap=0;
    });
    if(this.skidLayer) this.skidLayer.clear(true,true);
    this.exhaustFx.stop(); this.nitroFx.stop();
  }

  update(time, delta) {
    if(!this.racing||this.finished) return;
    const dt = delta/1000;
    this.elapsed += dt;

    const L = this.cursors?.left.isDown || window.K.L;
    const R = this.cursors?.right.isDown || window.K.R;
    const N = this.cursors?.space?.isDown || window.K.N;

    // نيترو
    if(N && this.nitro>8) { this.nitroOn=true; this.nitro=Math.max(0,this.nitro-dt*36); }
    else { this.nitroOn=false; this.nitro=Math.min(100,this.nitro+dt*9); }

    // توجيه السيارة
    const turnRate = this.nitroOn ? 2.8 : 3.3;
    if(L) this.car.setAngle(this.car.angle - turnRate);
    if(R) this.car.setAngle(this.car.angle + turnRate);

    // تسارع
    const ang = Phaser.Math.DegToRad(this.car.angle-90);
    const accel = this.nitroOn ? 560 : 360;
    this.car.body.acceleration.set(Math.cos(ang)*accel, Math.sin(ang)*accel);

    // عوادم ونيترو
    const bx = this.car.x - Math.cos(ang)*20, by = this.car.y - Math.sin(ang)*20;
    this.exhaustFx.setPosition(bx, by).setAngle(this.car.angle+90);
    this.nitroFx.setPosition(bx, by).setAngle(this.car.angle+90);
    if(this.nitroOn) this.nitroFx.start(); else this.nitroFx.stop();

    // علامات الانزلاق
    const spd = this.car.body.speed;
    if(spd>90 && (L||R) && Math.random()<0.25) {
      const sk = this.add.image(this.car.x, this.car.y, 'skid').setAngle(this.car.angle).setAlpha(0.4).setDepth(1);
      this.skidLayer.add(sk);
      if(this.skidLayer.getLength()>80) { const old=this.skidLayer.getChildren()[0]; this.tweens.add({targets:old,alpha:0,duration:600,onComplete:()=>this.skidLayer.remove(old,true,true)}); }
    }

    // حدود المسار
    const dx=this.car.x-GW/2, dy=this.car.y-GH/2;
    const d = (dx*dx)/(rx*rx)+(dy*dy)/(ry*ry);
    if(d>1.14||d<0.72) {
      this.car.body.velocity.scale(0.65);
      this.car.x+=(GW/2-this.car.x)*0.05; this.car.y+=(GH/2-this.car.y)*0.05;
      if(time-this.lastCrash>700) { this.cameras.main.shake(220,0.009); this.crashFx.setPosition(this.car.x,this.car.y).explode(12); this.lastCrash=time; }
    }

    // اللفات
    const wp = WAYPOINTS[this.playerWp];
    if(Math.hypot(this.car.x-wp.x, this.car.y-wp.y) < TRACK_W*0.6) {
      this.playerWp = (this.playerWp+1)%WAYPOINTS.length;
      if(this.playerWp===0) {
        this.lapCount++;
        this._showLapFlash();
        if(this.lapCount>=CFG.laps) { this._finish(); return; }
        this.cameras.main.flash(200,250,204,21,true);
      }
    }

    // الخصوم AI
    let ahead = 0;
    this.opponents.forEach(o => {
      const twp = WAYPOINTS[o.wpIdx];
      const ta = Math.atan2(twp.y-o.sprite.y, twp.x-o.sprite.x);
      const oa = Phaser.Math.DegToRad(o.sprite.angle-90);
      let da = ta-oa; while(da>Math.PI) da-=Math.PI*2; while(da<-Math.PI) da+=Math.PI*2;
      o.sprite.setAngle(o.sprite.angle + Math.sign(da)*2.8);
      const na = Phaser.Math.DegToRad(o.sprite.angle-90);
      o.sprite.body.acceleration.set(Math.cos(na)*o.baseSpeed, Math.sin(na)*o.baseSpeed);
      if(Phaser.Math.Distance.Between(o.sprite.x,o.sprite.y,twp.x,twp.y)<TRACK_W*0.6) o.wpIdx=(o.wpIdx+1)%WAYPOINTS.length;
      if(o.wpIdx===0) o.lap++;
      const oppProgress = o.lap*1000+o.wpIdx;
      const playerProgress = this.lapCount*1000+this.playerWp;
      if(oppProgress>playerProgress) ahead++;
    });

    // تحديث HUD
    const dispSpd = Math.round(spd*(CFG.maxSpd/(CFG.maxSpd*0.65)));
    document.getElementById('hLap').textContent = (this.lapCount+1)+'/'+CFG.laps;
    document.getElementById('hPos').textContent = 'P'+(ahead+1);
    document.getElementById('hTime').textContent = fmt(this.elapsed*1000);
    document.getElementById('hSpd').textContent = Math.min(dispSpd,CFG.maxSpd);
    document.getElementById('nfill').style.width = this.nitro+'%';
  }

  _showLapFlash() {
    const el = document.getElementById('lapFlash');
    el.textContent = 'LAP '+(this.lapCount+1)+'/'+CFG.laps;
    el.style.display='block';
    setTimeout(()=>el.style.display='none',1200);
  }

  _finish() {
    this.finished=true; this.racing=false;
    this.exhaustFx.stop(); this.nitroFx.stop();
    this.cameras.main.shake(350,0.012);
    const pos = this.opponents.filter(o=>(o.lap*1000+o.wpIdx)>(CFG.laps*1000)).length+1;
    setTimeout(()=>_showEnd(this.elapsed,pos),900);
  }
}

// ═══════════════════════════════════════════
// INIT PHASER
// ═══════════════════════════════════════════
new Phaser.Game({
  type: Phaser.AUTO, width: GW, height: GH, backgroundColor: 0x000000,
  physics: { default:'arcade', arcade: { gravity:{y:0}, debug:false } },
  scene: [BootScene, RaceScene], parent: 'wrap',
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
});

// ═══════════════════════════════════════════
// GAME FLOW
// ═══════════════════════════════════════════
function startGame() {
  document.getElementById('sStart').classList.remove('on');
  document.getElementById('sEnd').classList.remove('on');
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('nbar').style.display = 'block';
  if(isMob()) document.getElementById('ctrl').style.display = 'flex';
  if(raceScene) raceScene.resetPositions();

  const cd = document.getElementById('cd');
  const cdN = document.getElementById('cdN');
  cd.classList.add('on');
  let n=3; cdN.textContent=n;
  const t = setInterval(()=>{
    n--;
    if(n<=0) { cdN.textContent='Los!'; clearInterval(t); setTimeout(()=>{ cd.classList.remove('on'); if(raceScene) raceScene.startRace(); },380); }
    else cdN.textContent=n;
  },900);
}

function _showEnd(elapsed, pos) {
  document.getElementById('hud').style.display='none';
  document.getElementById('nbar').style.display='none';
  document.getElementById('ctrl').style.display='none';
  document.getElementById('endTime').textContent = fmt(elapsed*1000);
  document.getElementById('endPos').textContent = 'P'+pos;
  document.getElementById('endTitle').textContent = pos===1 ? 'Du hast gewonnen!' : 'Viel Glück beim nächsten Mal';
  const cur = S();
  if(pos===1 && (!cur.bestTime || elapsed<cur.bestTime)) sv({bestTime:elapsed});
  document.getElementById('sEnd').classList.add('on');
}

// ═══════════════════════════════════════════
// TOUCH CONTROLS
// ═══════════════════════════════════════════
function bindButton(id, key) {
  const el = document.getElementById(id);
  if(!el) return;
  const on = e => { e.preventDefault(); window.K[key]=true; el.classList.add('on'); };
  const off = e => { e.preventDefault(); window.K[key]=false; el.classList.remove('on'); };
  el.addEventListener('pointerdown', on, {passive:false});
  el.addEventListener('pointerup', off, {passive:false});
  el.addEventListener('pointercancel', off, {passive:false});
  el.addEventListener('pointerleave', off, {passive:false});
}
bindButton('bL','L'); bindButton('bR','R'); bindButton('bN','N');

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
(function() {
  const cur = S();
  if(cur.bestTime) document.getElementById('bestDisp').textContent = fmt(cur.bestTime*1000);
})();
</script>
