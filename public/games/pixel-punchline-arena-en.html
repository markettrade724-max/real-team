<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pixel Punchline</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>
:root {
  --acc: #f472b6;
  --acc-rgb: 244,114,182;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Segoe UI', Tajawal, sans-serif;
  color: #f1f5f9;
  user-select: none;
  -webkit-user-select: none;
}

#wrap {
  position: relative;
  width: 100%;
  max-width: 420px;
  height: 100dvh;
  margin: 0 auto;
  overflow: hidden;
  background: radial-gradient(ellipse at center, #0a0a1a 0%, #000 100%);
}

#wrap canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100% !important;
  height: 100% !important;
}

/* ── SCREENS ── */
.scr {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  text-align: center;
  padding: 28px;
  background: radial-gradient(ellipse at center, rgba(244,114,182,0.15) 0%, rgba(0,0,0,0.9) 100%);
  backdrop-filter: blur(10px);
  z-index: 50;
}
.scr.on { display: flex; }

.g-title {
  font-size: 2rem;
  font-weight: 900;
  color: var(--acc);
  letter-spacing: -1px;
  text-shadow: 0 0 30px var(--acc), 0 0 60px rgba(244,114,182,0.5);
  animation: titlePulse 2s ease-in-out infinite;
}

@keyframes titlePulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

.g-desc {
  color: #64748b;
  font-size: 0.88rem;
  line-height: 1.6;
  max-width: 300px;
}

.btn {
  padding: 13px 0;
  border-radius: 12px;
  font-size: 0.95rem;
  font-weight: 700;
  border: none;
  cursor: pointer;
  width: 100%;
  max-width: 300px;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  font-family: inherit;
  position: relative;
  overflow: hidden;
}
.btn:active { transform: scale(0.96); }
.btn-p {
  background: var(--acc);
  color: #000;
  box-shadow: 0 0 28px rgba(244,114,182,0.5);
}
.btn-p:hover {
  box-shadow: 0 0 40px rgba(244,114,182,0.8);
  transform: translateY(-2px);
}
.btn-s {
  background: rgba(255,255,255,0.07);
  color: #f1f5f9;
  border: 1px solid rgba(255,255,255,0.1);
}

/* ── HUD ── */
#hud {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: none;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  z-index: 20;
}
.hud-bl { display: flex; flex-direction: column; }
.hud-l {
  font-size: 0.52rem;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.hud-v {
  font-size: 0.95rem;
  font-weight: 900;
  color: var(--acc);
  font-family: monospace;
}

#hpWrap { display: flex; align-items: center; gap: 6px; }
#hpBar {
  width: 80px;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
}
#hpFill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, #ef4444, #f97316);
  transition: width 0.3s ease;
}

/* ── LEVEL FLASH ── */
#lvFlash {
  position: absolute;
  top: 54px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(244,114,182,0.15);
  border: 1px solid rgba(244,114,182,0.4);
  color: var(--acc);
  padding: 5px 18px;
  border-radius: 100px;
  font-weight: 900;
  font-size: 0.85rem;
  font-family: monospace;
  letter-spacing: 0.1em;
  display: none;
  z-index: 25;
  white-space: nowrap;
  text-shadow: 0 0 10px var(--acc);
  animation: levelFlashIn 0.3s ease;
}

@keyframes levelFlashIn {
  from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
  to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

/* ── FIRE BUTTON ── */
#fireBtn {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 68px;
  height: 68px;
  border-radius: 50%;
  background: rgba(244,114,182,0.15);
  border: 2px solid rgba(244,114,182,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 20;
  cursor: pointer;
  transition: all 0.15s ease;
  animation: fireBtnPulse 2s ease-in-out infinite;
}

@keyframes fireBtnPulse {
  0%, 100% { box-shadow: 0 0 15px rgba(244,114,182,0.3); }
  50% { box-shadow: 0 0 30px rgba(244,114,182,0.6); }
}

#fireBtn.on {
  background: rgba(244,114,182,0.45);
  border-color: var(--acc);
  box-shadow: 0 0 40px rgba(244,114,182,0.8);
}
#fireBtn svg { width: 28px; height: 28px; fill: var(--acc); }

/* ── MOVE PAD ── */
#movePad {
  position: absolute;
  bottom: 20px;
  left: 20px;
  width: 100px;
  height: 68px;
  border-radius: 14px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 0 8px;
  z-index: 20;
  backdrop-filter: blur(4px);
}
.mpBtn {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s ease;
}
.mpBtn.on {
  background: rgba(244,114,182,0.3);
  border-color: var(--acc);
  box-shadow: 0 0 15px rgba(244,114,182,0.4);
}
.mpBtn svg { width: 18px; height: 18px; fill: #94a3b8; }

/* ── COMBO DISPLAY ── */
#comboDisp {
  position: absolute;
  top: 50%;
  right: 16px;
  transform: translateY(-50%);
  font-family: monospace;
  font-weight: 900;
  font-size: 1.4rem;
  color: var(--acc);
  display: none;
  z-index: 15;
  text-shadow: 0 0 15px var(--acc);
  animation: comboPop 0.3s ease;
}

@keyframes comboPop {
  from { transform: translateY(-50%) scale(0.5); opacity: 0; }
  to { transform: translateY(-50%) scale(1); opacity: 1; }
}
</style>
</head>
<body>
<div id="wrap">

  <!-- START SCREEN -->
  <div class="scr on" id="sStart">
    <div class="g-title">Pixel Punchline</div>
    <div class="g-desc">Craft hilarious short videos using AI. Compete in daily Trend Wars!</div>
    <button class="btn btn-p" onclick="startGame()">▶ Play Now</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-bl">
      <div class="hud-l">Score</div>
      <div class="hud-v" id="hudScore">0</div>
    </div>
    <div class="hud-bl" style="align-items:center">
      <div class="hud-l">Level</div>
      <div class="hud-v" id="hudLevel">1</div>
    </div>
    <div class="hud-bl" style="align-items:flex-end">
      <div class="hud-l">HP</div>
      <div id="hpWrap"><div id="hpBar"><div id="hpFill" style="width:100%"></div></div></div>
    </div>
  </div>

  <!-- LEVEL FLASH -->
  <div id="lvFlash">LEVEL 1</div>

  <!-- COMBO DISPLAY -->
  <div id="comboDisp"></div>

  <!-- FIRE BUTTON -->
  <div id="fireBtn">
    <svg viewBox="0 0 24 24"><polygon points="12,2 22,22 12,17 2,22"/></svg>
  </div>

  <!-- MOVE PAD -->
  <div id="movePad">
    <div class="mpBtn" id="mpL"><svg viewBox="0 0 24 24"><polygon points="15,4 5,12 15,20"/></svg></div>
    <div class="mpBtn" id="mpR"><svg viewBox="0 0 24 24"><polygon points="9,4 19,12 9,20"/></svg></div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div class="scr" id="sEnd">
    <div style="font-size:3rem">💥</div>
    <div class="g-title" style="font-size:1.6rem">Game Over</div>
    <div id="endScore" style="font-family:monospace;font-size:1.2rem;color:var(--acc)"></div>
    <button class="btn btn-p" onclick="startGame()">Try Again</button>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────
const CFG = {
  pid: 'pixel-punchline-arena',
  lang: 'en',
  acc: '#f472b6',
  accN: parseInt('#f472b6'.replace('#',''), 16),
  accRGB: [244,114,182].map(Number),
  iaps: [{"id":"no-ads","type":"remove_ads","price":1.99,"emoji":"🚫","name":{"ar":"إزالة الإعلانات","en":"Remove Ads","fr":"Sans pub","es":"Sin anuncios","de":"Werbefrei","zh":"去广告"}},{"id":"hint-pack","type":"consumable","price":0.99,"emoji":"💡","name":{"ar":"10 تلميحات","en":"10 Hints","fr":"10 indices","es":"10 pistas","de":"10 Hinweise","zh":"10个提示"}},{"id":"theme-pack","type":"cosmetic","price":1.49,"emoji":"🎨","name":{"ar":"حزمة الثيمات","en":"Themes Pack","fr":"Pack thèmes","es":"Pack temas","de":"Theme-Paket","zh":"主题包"}},{"id":"full-unlock","type":"unlock","price":2.99,"emoji":"⭐","name":{"ar":"فتح كل المحتوى","en":"Unlock All","fr":"Tout débloquer","es":"Desbloquear todo","de":"Alles freischalten","zh":"解锁全部"}}],
  lvls: [{"enemyCount":8,"enemySpeed":1.3,"enemyHealth":1,"bulletSpeed":6,"spawnInterval":90},{"enemyCount":11,"enemySpeed":1.6,"enemyHealth":1,"bulletSpeed":6,"spawnInterval":80},{"enemyCount":14,"enemySpeed":1.9,"enemyHealth":2,"bulletSpeed":6,"spawnInterval":70},{"enemyCount":17,"enemySpeed":2.2,"enemyHealth":2,"bulletSpeed":6,"spawnInterval":60},{"enemyCount":20,"enemySpeed":2.5,"enemyHealth":3,"bulletSpeed":6,"spawnInterval":50}] || []
};

// ضمان وجود مستويات افتراضية
if (!Array.isArray(CFG.lvls) || CFG.lvls.length === 0) {
  CFG.lvls = [
    { enemyCount: 8,  enemySpeed: 1.3, enemyHealth: 1 },
    { enemyCount: 11, enemySpeed: 1.6, enemyHealth: 1 },
    { enemyCount: 14, enemySpeed: 1.9, enemyHealth: 2 },
    { enemyCount: 17, enemySpeed: 2.2, enemyHealth: 2 },
    { enemyCount: 20, enemySpeed: 2.5, enemyHealth: 3 },
  ];
}

// دالة مساعدة لقراءة بيانات المستوى مع قيم افتراضية
function getLevelData(index) {
  const defaultLevel = { enemyCount: 8, enemySpeed: 1.3, enemyHealth: 1 };
  const lv = (CFG.lvls && CFG.lvls[index]) ? CFG.lvls[index] : defaultLevel;
  return {
    enemyCount:  typeof lv.enemyCount  === 'number' && lv.enemyCount > 0  ? lv.enemyCount  : 8,
    enemySpeed:  typeof lv.enemySpeed  === 'number' && lv.enemySpeed > 0  ? lv.enemySpeed  : 1.3,
    enemyHealth: typeof lv.enemyHealth === 'number' && lv.enemyHealth > 0 ? lv.enemyHealth : 1,
  };
}

const SK = 'rt_' + CFG.pid;
const S  = () => JSON.parse(localStorage.getItem(SK) || '{}');
const mob = () => 'ontouchstart' in window && matchMedia('(pointer: coarse)').matches;

const GW = Math.min(window.innerWidth, 420);
const GH = window.innerHeight;

// ─── ENEMY TYPES (تنوع بصري) ─────────────────────────────────
const ENEMY_VARIANTS = [
  { emoji: '👾', color: 0xff4444, scale: 1.0, speedMod: 1.0,  healthMod: 1, points: 10 },
  { emoji: '🤖', color: 0xff8800, scale: 1.2, speedMod: 0.8,  healthMod: 2, points: 20 },
  { emoji: '👽', color: 0x44ff44, scale: 0.9, speedMod: 1.3,  healthMod: 1, points: 15 },
  { emoji: '💀', color: 0xcc44ff, scale: 1.4, speedMod: 0.6,  healthMod: 3, points: 30 },
  { emoji: '🦠', color: 0x22aaff, scale: 0.8, speedMod: 1.5,  healthMod: 1, points: 12 },
];

// ─── PHASER: BOOT ──────────────────────────────────────────
class Boot extends Phaser.Scene {
  constructor() { super('Boot'); }
  create() {
    // نجوم
    const g = this.make.graphics({ add: false });
    g.fillStyle(0x030310); g.fillRect(0, 0, 512, 512);
    for (let i = 0; i < 300; i++) {
      g.fillStyle(0xffffff, Math.random() * 0.9);
      const s = Math.random() < 0.05 ? 2 : 1;
      g.fillRect(Math.random() * 512 | 0, Math.random() * 512 | 0, s, s);
    }
    g.generateTexture('stars', 512, 512); g.destroy();

    // لاعب
    const pg = this.make.graphics({ add: false });
    pg.fillStyle(CFG.accN, 0.25); pg.fillEllipse(18, 46, 22, 14);
    pg.fillStyle(0xd0d8f0, 1); pg.fillTriangle(18, 2, 32, 38, 4, 38);
    pg.fillStyle(CFG.accN, 0.85); pg.fillEllipse(18, 19, 12, 18);
    pg.fillStyle(0xffffff, 0.5); pg.fillEllipse(16, 16, 4, 6);
    pg.generateTexture('player', 36, 50); pg.destroy();

    // أعداء متعددين
    ENEMY_VARIANTS.forEach((v, i) => {
      const eg = this.make.graphics({ add: false });
      // جسم
      eg.fillStyle(v.color, 1);
      eg.fillEllipse(14, 11, 20 * v.scale, 16 * v.scale);
      // عين
      eg.fillStyle(0xffffff, 0.9);
      eg.fillCircle(11, 9, 4 * v.scale);
      eg.fillStyle(0x000000, 0.8);
      eg.fillCircle(12, 8, 2 * v.scale);
      eg.generateTexture('enemy_' + i, 28, 22); eg.destroy();
    });

    // رصاصة
    const bg = this.make.graphics({ add: false });
    bg.fillStyle(CFG.accN, 1); bg.fillRect(0, 0, 4, 18);
    bg.fillStyle(0xffffff, 0.8); bg.fillRect(1, 0, 2, 2);
    bg.generateTexture('bullet', 4, 18); bg.destroy();

    // جزيئات
    const pg2 = this.make.graphics({ add: false });
    pg2.fillStyle(0xffffff); pg2.fillRect(0, 0, 3, 3);
    pg2.generateTexture('px', 3, 3); pg2.destroy();

    this.scene.start('Game');
  }
}

// ─── PHASER: GAME ──────────────────────────────────────────
class Game extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    this.lvIdx = 0; this.score = 0; this.hp = 3; this.active = false;
    this.invincible = 0; this.killed = 0; this.combo = 0;

    this.bg1 = this.add.tileSprite(GW/2, GH/2, GW, GH, 'stars').setDepth(0);
    this.bg2 = this.add.tileSprite(GW/2, GH/2, GW, GH, 'stars')
      .setAlpha(0.4).setTilePosition(200, 300).setDepth(0);

    this.player = this.physics.add.image(GW/2, GH - 90, 'player')
      .setDepth(6).setCollideWorldBounds(true);
    this.player.body.setSize(24, 36).setOffset(6, 8);

    this.bullets = this.physics.add.group();
    this.enemies = this.physics.add.group();

    this.cursors = this.input.keyboard?.createCursorKeys();

    // إطلاق نار بالنقر
    this.input.on('pointerdown', () => this._fireBullet());

    // نظام جزيئات
    this.explosionParticles = this.add.particles(0, 0, 'px', {
      speed: { min: 50, max: 200 },
      angle: { min: 0, max: 360 },
      scale: { start: 1.2, end: 0 },
      alpha: { start: 1, end: 0 },
      tint: [0xff6600, 0xffcc00, 0xff3300, 0xffffff],
      lifespan: 500,
      blendMode: 'ADD',
      emitting: false,
    }).setDepth(8);

    this.hitParticles = this.add.particles(0, 0, 'px', {
      speed: { min: 30, max: 100 },
      angle: { min: 0, max: 360 },
      scale: { start: 0.8, end: 0 },
      alpha: { start: 0.9, end: 0 },
      tint: [CFG.accN, 0xffffff],
      lifespan: 300,
      blendMode: 'ADD',
      emitting: false,
    }).setDepth(8);

    window._gs = this;
  }

  startLevel() {
    this.active = true; this.killed = 0; this.combo = 0;
    this.enemies.clear(true, true); this.bullets.clear(true, true);

    const lv = getLevelData(this.lvIdx);
    console.log(`→ Level ${this.lvIdx+1}: ${lv.enemyCount} enemies`);

    const cnt = lv.enemyCount;
    const spd = lv.enemySpeed;

    for (let i = 0; i < cnt; i++) {
      const variant = i % ENEMY_VARIANTS.length;
      const x = 30 + Math.random() * (GW - 60);
      const y = -20 - Math.random() * 80;
      const e = this.physics.add.image(x, y, 'enemy_' + variant).setDepth(5);
      e.body.setSize(20, 16).setOffset(4, 3);
      e.body.velocity.y = spd * 25 * ENEMY_VARIANTS[variant].speedMod;
      e._variant = variant;
      e._health = lv.enemyHealth * ENEMY_VARIANTS[variant].healthMod;
      this.enemies.add(e);
    }

    this._showLevelFlash();
    this._updateHUD();
  }

  _fireBullet() {
    if (!this.player || !this.active) return;
    const b = this.physics.add.image(this.player.x, this.player.y - 28, 'bullet').setDepth(7);
    b.body.velocity.y = -600;
    this.bullets.add(b);
  }

  _showLevelFlash() {
    const el = document.getElementById('lvFlash');
    el.textContent = 'Level ' + (this.lvIdx + 1);
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 1400);
  }

  _showCombo() {
    if (this.combo < 3) return;
    const el = document.getElementById('comboDisp');
    el.textContent = this.combo + 'x';
    el.style.display = 'block';
    clearTimeout(this._comboTimer);
    this._comboTimer = setTimeout(() => el.style.display = 'none', 600);
  }

  update(time, delta) {
    if (!this.active) return;

    this.bg1.tilePositionY -= 1.2;
    this.bg2.tilePositionY -= 0.6;

    const L = this.cursors?.left.isDown || (window.K && window.K.L);
    const R = this.cursors?.right.isDown || (window.K && window.K.R);
    this.player.body.velocity.x = L ? -300 : R ? 300 : 0;

    if (this.invincible > 0) {
      this.invincible -= delta / 1000;
      this.player.setAlpha(0.4 + 0.6 * Math.abs(Math.sin(time * 0.015)));
    } else {
      this.player.setAlpha(1);
    }

    // إطلاق نار
    if (this.cursors?.space.isDown || (window.K && window.K.F)) {
      if (!this._lastFire || time - this._lastFire > 180) {
        this._fireBullet();
        this._lastFire = time;
      }
    }

    // تحديث الأعداء
    this.enemies.getChildren().forEach(e => {
      if (!e.active) return;
      e.x += Math.sin(time * 0.002 + e.y * 0.01) * 1.5;
      if (e.y > GH + 40) {
        if (this.invincible <= 0) this._damagePlayer(1);
        e.destroy();
      }
    });

    // اصطدام الرصاص بالأعداء
    this.physics.overlap(this.bullets, this.enemies, (bullet, enemy) => {
      bullet.destroy();
      enemy._health--;

      this.hitParticles.setPosition(enemy.x, enemy.y).explode(8);

      if (enemy._health <= 0) {
        const variant = enemy._variant || 0;
        this.explosionParticles.setPosition(enemy.x, enemy.y).explode(15);
        this.cameras.main.shake(80, 0.004);

        this.score += ENEMY_VARIANTS[variant].points * (this.lvIdx + 1);
        this.combo++;
        this._showCombo();
        enemy.destroy();
        this.killed++;
      }
      this._updateHUD();
    });

    // هل انتهى المستوى؟
    if (this.killed >= this.enemies.getLength() && this.enemies.getLength() === 0) {
      this.active = false;
      this.time.delayedCall(700, () => {
        this.lvIdx++;
        if (this.lvIdx >= CFG.lvls.length) {
          _endGame(true, this.score);
          return;
        }
        this.startLevel();
      });
    }
  }

  _damagePlayer(amt) {
    if (this.invincible > 0) return;
    this.hp -= amt;
    this.invincible = 1.8;
    this.combo = 0;
    this.cameras.main.shake(200, 0.015);
    this.explosionParticles.setPosition(this.player.x, this.player.y).explode(8);
    this._updateHUD();
    if (this.hp <= 0) {
      this.active = false;
      this.time.delayedCall(500, () => _endGame(false, this.score));
    }
  }

  _updateHUD() {
    document.getElementById('hudScore').textContent = this.score;
    document.getElementById('hudLevel').textContent = this.lvIdx + 1;
    const pct = Math.max(0, (this.hp / 3) * 100);
    document.getElementById('hpFill').style.width = pct + '%';
    document.getElementById('hpFill').style.background =
      pct > 60 ? 'linear-gradient(90deg,#22cc44,#44ff66)' :
      pct > 30 ? 'linear-gradient(90deg,#f97316,#fbbf24)' :
                 'linear-gradient(90deg,#ef4444,#ff6666)';
  }

  resetGame() {
    this.lvIdx = 0; this.score = 0; this.hp = 3; this.combo = 0;
    this.active = false; this.invincible = 0; this.killed = 0;
    this.enemies.clear(true, true); this.bullets.clear(true, true);
    this.player.setPosition(GW/2, GH - 90).setAlpha(1);
    this._updateHUD();
    document.getElementById('comboDisp').style.display = 'none';
  }
}

// ─── START PHASER ─────────────────────────────────────────
new Phaser.Game({
  type: Phaser.AUTO,
  width: GW,
  height: GH,
  backgroundColor: 0x000000,
  physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
  scene: [Boot, Game],
  parent: 'wrap',
  render: { transparent: false, antialias: true },
});

// ─── GAME FLOW ────────────────────────────────────────────
function startGame() {
  document.getElementById('sStart').classList.remove('on');
  document.getElementById('sEnd').classList.remove('on');
  document.getElementById('hud').style.display = 'flex';
  if (mob()) {
    document.getElementById('fireBtn').style.display = 'flex';
    document.getElementById('movePad').style.display = 'flex';
  }
  const sc = window._gs;
  if (sc) { sc.resetGame(); sc.startLevel(); }
}

function _endGame(win, score) {
  document.getElementById('hud').style.display = 'none';
  document.getElementById('fireBtn').style.display = 'none';
  document.getElementById('movePad').style.display = 'none';
  document.getElementById('comboDisp').style.display = 'none';

  const endScr = document.getElementById('sEnd');
  endScr.querySelector('.g-title').textContent = win ? 'You Win!' : 'Game Over';
  document.getElementById('endScore').textContent = 'Score: ' + score;
  endScr.classList.add('on');
}

// ─── TOUCH CONTROLS ──────────────────────────────────────
window.K = window.K || { F: false, L: false, R: false };

document.getElementById('fireBtn')?.addEventListener('pointerdown', () => {
  window.K.F = true;
  document.getElementById('fireBtn').classList.add('on');
});
document.getElementById('fireBtn')?.addEventListener('pointerup', () => {
  window.K.F = false;
  document.getElementById('fireBtn').classList.remove('on');
});
document.getElementById('mpL')?.addEventListener('pointerdown', () => { window.K.L = true; document.getElementById('mpL').classList.add('on'); });
document.getElementById('mpL')?.addEventListener('pointerup', () => { window.K.L = false; document.getElementById('mpL').classList.remove('on'); });
document.getElementById('mpR')?.addEventListener('pointerdown', () => { window.K.R = true; document.getElementById('mpR').classList.add('on'); });
document.getElementById('mpR')?.addEventListener('pointerup', () => { window.K.R = false; document.getElementById('mpR').classList.remove('on'); });
</script>
</body>
</html>
