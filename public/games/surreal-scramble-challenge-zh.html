<!DOCTYPE html>
<html lang="zh" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>超现实乱斗</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --accent: #818cf8;
    --accent-rgb: 129,140,248;
    --bg: #08050f;
    --surface: #110d1a;
    --text: #f0eaff;
    --text2: #7c6a9a;
    --glow: 0 0 20px rgba(var(--accent-rgb),.6);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── HEADER ── */
  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .5rem .9rem;
    background: linear-gradient(180deg, rgba(var(--accent-rgb),.12) 0%, transparent 100%);
    border-bottom: 1px solid rgba(var(--accent-rgb),.2);
    position: relative; z-index: 10;
  }

  #back-btn {
    background: none; border: 1px solid rgba(var(--accent-rgb),.35);
    color: var(--accent); padding: .25rem .7rem;
    border-radius: 4px; cursor: pointer;
    font-family: inherit; font-size: .72rem; letter-spacing: .04em;
    transition: all .2s;
  }
  #back-btn:hover { background: rgba(var(--accent-rgb),.12); }

  #game-title {
    font-family: 'Exo 2', sans-serif; font-weight: 900;
    font-size: clamp(.8rem, 3vw, 1rem);
    color: var(--accent); text-shadow: var(--glow);
    letter-spacing: .06em; text-transform: uppercase;
  }

  /* ── TOP STATS ── */
  #top-stats {
    display: flex; gap: .8rem; align-items: center; justify-content: center;
    padding: .35rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid rgba(var(--accent-rgb),.1);
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem;
  }

  .stat { display: flex; align-items: center; gap: .35rem; }
  .stat-l { color: var(--text2); font-size: .65rem; text-transform: uppercase; }
  .stat-v { color: var(--accent); font-weight: 700; font-size: .85rem; min-width: 3rem; }

  /* ── CANVAS AREA ── */
  #canvas-wrap {
    flex: 1; position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    touch-action: none;
  }

  #game-canvas { display: block; touch-action: none; }

  /* Speed lines effect */
  #canvas-wrap::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg,
      rgba(var(--accent-rgb),.04) 0%, transparent 20%,
      transparent 80%, rgba(var(--accent-rgb),.04) 100%);
    pointer-events: none; z-index: 5;
  }

  /* ── JUMP BUTTON ── */
  #controls {
    padding: .7rem 1rem;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
    border-top: 1px solid rgba(var(--accent-rgb),.1);
    gap: 1rem;
    position: relative; z-index: 10;
  }

  #btn-jump {
    flex: 1;
    height: 3.5rem;
    background: rgba(var(--accent-rgb),.12);
    border: 2px solid var(--accent);
    border-radius: 12px;
    color: var(--accent);
    font-family: 'Exo 2', sans-serif;
    font-weight: 900; font-size: 1.1rem;
    letter-spacing: .06em; text-transform: uppercase;
    cursor: pointer; transition: all .12s;
    box-shadow: var(--glow);
  }
  #btn-jump:active { background: rgba(var(--accent-rgb),.35); transform: scale(.96); }

  #btn-slide {
    width: 5rem; height: 3.5rem;
    background: rgba(100,100,180,.1);
    border: 2px solid #5566bb;
    border-radius: 12px;
    color: #7788ee;
    font-family: 'Exo 2', sans-serif;
    font-weight: 700; font-size: .75rem;
    letter-spacing: .04em; text-transform: uppercase;
    cursor: pointer; transition: all .12s;
  }
  #btn-slide:active { background: rgba(100,100,180,.3); transform: scale(.96); }

  /* ── OVERLAYS ── */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 20;
    background: rgba(8,5,15,.9);
    backdrop-filter: blur(10px);
    gap: 1rem; padding: 2rem; text-align: center;
  }
  .overlay.hidden { display: none; }

  .overlay-icon { font-size: 3.5rem; filter: drop-shadow(var(--glow)); }
  .overlay-title {
    font-family: 'Exo 2', sans-serif; font-weight: 900;
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    color: var(--accent); text-shadow: var(--glow);
    text-transform: uppercase; letter-spacing: .06em;
  }
  .overlay-subtitle { color: var(--text2); font-size: .85rem; line-height: 1.6; max-width: 280px; }

  .score-row {
    display: flex; gap: 2rem;
    font-family: 'Share Tech Mono', monospace;
  }
  .score-block { display: flex; flex-direction: column; align-items: center; gap: .2rem; }
  .score-block .label { font-size: .65rem; color: var(--text2); text-transform: uppercase; }
  .score-block .value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }

  .overlay-btn {
    padding: .7rem 2.4rem;
    background: var(--accent); border: none; border-radius: 10px;
    color: #000; font-family: 'Exo 2', sans-serif;
    font-weight: 900; font-size: .85rem;
    letter-spacing: .06em; text-transform: uppercase;
    cursor: pointer; transition: all .2s; box-shadow: var(--glow);
  }
  .overlay-btn:hover { transform: translateY(-2px); }

  #best-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem; color: var(--text2);
  }
  #best-badge span { color: var(--accent); }

  /* ── AD BAR ── */
  #ad-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: .3rem .9rem;
    background: rgba(var(--accent-rgb),.04);
    border-top: 1px solid rgba(var(--accent-rgb),.08);
    font-size: .62rem; color: var(--text2);
    position: relative; z-index: 10;
  }
  #ad-remove { color: var(--accent); cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <button id="back-btn" onclick="history.back()">← {{BACK_LABEL}}</button>
  <div id="game-title">🤪 超现实乱斗</div>
  <div style="font-family:'Share Tech Mono';font-size:.72rem;color:var(--accent)">×<span id="hdr-mult">1</span></div>
</div>

<!-- STATS -->
<div id="top-stats">
  <div class="stat">
    <span class="stat-l">分数</span>
    <span class="stat-v" id="score-val">0</span>
  </div>
  <div class="stat">
    <span class="stat-l">最高分</span>
    <span class="stat-v" id="best-val">0</span>
  </div>
  <div class="stat">
    <span class="stat-l">{{COINS_LBL}}</span>
    <span class="stat-v" id="coins-val">0</span>
  </div>
  <div class="stat">
    <span class="stat-l">{{DIST_LBL}}</span>
    <span class="stat-v" id="dist-val">0m</span>
  </div>
</div>

<!-- CANVAS -->
<div id="canvas-wrap">
  <canvas id="game-canvas"></canvas>

  <!-- START -->
  <div class="overlay" id="overlay-start">
    <div class="overlay-icon">🤪</div>
    <div class="overlay-title">超现实乱斗</div>
    <div class="overlay-subtitle">在《超现实乱斗》中，每天释放你最狂野的创造力，这里有一个疯狂的AI大师用荒谬的提示挑战你。在全球范围内竞争，创作最滑稽古怪的内容来赢得投票，并加冕自己为离奇之王。</div>
    <div id="best-badge">最高分: <span id="start-best">0</span></div>
    <button class="overlay-btn" id="btn-start">▶ 开始游戏</button>
  </div>

  <!-- GAME OVER -->
  <div class="overlay hidden" id="overlay-over">
    <div class="overlay-icon">💨</div>
    <div class="overlay-title">{{OVER_TITLE}}</div>
    <div class="score-row">
      <div class="score-block">
        <span class="label">分数</span>
        <span class="value" id="final-score">0</span>
      </div>
      <div class="score-block">
        <span class="label">{{DIST_LBL}}</span>
        <span class="value" id="final-dist">0m</span>
      </div>
      <div class="score-block">
        <span class="label">{{COINS_LBL}}</span>
        <span class="value" id="final-coins">0</span>
      </div>
    </div>
    <div id="best-badge2">🏆 最高分: <span id="over-best">0</span></div>
    <button class="overlay-btn" id="btn-restart">↺ 新游戏</button>
  </div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <button id="btn-slide">⬇ {{SLIDE_LBL}}</button>
  <button id="btn-jump">⬆ {{JUMP_LBL}}</button>
</div>

<!-- AD BAR -->
<div id="ad-bar">
  <span>广告支持我们的团队</span>
  <span id="ad-remove">去除广告 $1.99</span>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────
const CONFIG = {
  emoji: '🤪',
  accent: '#818cf8',
  levels: [{"startSpeed":5,"speedIncrement":0.001}],
  iaps: [{"id":"no-ads","type":"remove_ads","price":1.99,"emoji":"🚫","name":{"ar":"إزالة الإعلانات","en":"Remove Ads","fr":"Sans pub","es":"Sin anuncios","de":"Werbefrei","zh":"去广告"}},{"id":"hint-pack","type":"consumable","price":0.99,"emoji":"💡","name":{"ar":"10 تلميحات","en":"10 Hints","fr":"10 indices","es":"10 pistas","de":"10 Hinweise","zh":"10个提示"}},{"id":"theme-pack","type":"cosmetic","price":1.49,"emoji":"🎨","name":{"ar":"حزمة الثيمات","en":"Themes Pack","fr":"Pack thèmes","es":"Pack temas","de":"Theme-Paket","zh":"主题包"}},{"id":"full-unlock","type":"unlock","price":2.99,"emoji":"⭐","name":{"ar":"فتح كل المحتوى","en":"Unlock All","fr":"Tout débloquer","es":"Desbloquear todo","de":"Alles freischalten","zh":"解锁全部"}}],
  collectibles: ["⭐","💎","🔮","💡","🌟"],
  groundY: 0.72, // fraction of canvas height
};

// ─── CANVAS ──────────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let W, H, groundY;

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  W = canvas.width  = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
  groundY = H * CONFIG.groundY;
}
window.addEventListener('resize', resizeCanvas);

// ─── STATE ───────────────────────────────────────────────────
const S = {
  running: false,
  score: 0, dist: 0, coins: 0, best: 0,
  speed: 5, speedIncrement: .001,
  multiplier: 1,
  player: null,
  obstacles: [], collectibles: [], particles: [], bgElements: [],
  spawnTimer: 0, coinTimer: 0, bgTimer: 0,
  frameCount: 0,
};

// ─── PLAYER ──────────────────────────────────────────────────
function createPlayer() {
  return {
    x: W * .15,
    y: groundY,
    vy: 0, onGround: true,
    sliding: false, slideTimer: 0,
    w: 36, h: 36,
    jumpForce: -14,
    gravity: 0.7,
    trailX: [], trailY: [],
  };
}

function playerJump() {
  const p = S.player;
  if (!p.onGround) return;
  p.vy = p.jumpForce;
  p.onGround = false;
  spawnParticles(p.x, p.y + p.h/2, CONFIG.accent, 8);
}

function playerSlide() {
  const p = S.player;
  if (!p.onGround) return;
  p.sliding = true;
  p.slideTimer = 40;
}

function updatePlayer() {
  const p = S.player;

  // Trail
  p.trailX.unshift(p.x);
  p.trailY.unshift(p.y);
  if (p.trailX.length > 8) { p.trailX.pop(); p.trailY.pop(); }

  // Physics
  if (!p.onGround) {
    p.vy += p.gravity;
    p.y += p.vy;
    if (p.y >= groundY) {
      p.y = groundY;
      p.vy = 0;
      p.onGround = true;
    }
  }

  // Slide
  if (p.sliding) {
    p.slideTimer--;
    if (p.slideTimer <= 0) p.sliding = false;
  }
}

function drawPlayer() {
  const p = S.player;
  const h = p.sliding ? p.h * .5 : p.h;

  // Trail
  for (let i = 0; i < p.trailX.length; i++) {
    ctx.save();
    ctx.globalAlpha = (1 - i / p.trailX.length) * .25;
    ctx.font = `${p.w * .8}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(CONFIG.emoji, p.trailX[i], p.trailY[i] - h/2);
    ctx.restore();
  }

  // Glow
  ctx.save();
  ctx.shadowBlur = 20;
  ctx.shadowColor = CONFIG.accent;
  ctx.font = `${p.w}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (p.sliding) {
    ctx.translate(p.x, p.y - h/2);
    ctx.rotate(-.4);
    ctx.fillText(CONFIG.emoji, 0, 0);
  } else {
    ctx.fillText(CONFIG.emoji, p.x, p.y - h/2);
  }
  ctx.restore();
}

// ─── OBSTACLES ───────────────────────────────────────────────
const OBSTACLE_TYPES = [
  { h:.5, w:28, icon:'🌵', type:'ground' },
  { h:.3, w:32, icon:'🪨', type:'ground' },
  { h:.6, w:24, icon:'🔥', type:'ground' },
  { h:.0, w:30, icon:'🦅', type:'air',   yOffset:-.45 },
  { h:.0, w:30, icon:'🦇', type:'air',   yOffset:-.35 },
  { h:.0, w:28, icon:'⚡', type:'air',   yOffset:-.55 },
];

function spawnObstacle() {
  const t = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
  const y = t.type === 'air' ? groundY + H * (t.yOffset || -.4) : groundY;
  S.obstacles.push({
    x: W + 40, y,
    w: t.w, h: H * (t.h || .3),
    icon: t.icon, type: t.type,
  });
}

function updateObstacles() {
  S.spawnTimer++;
  const interval = Math.max(45, 90 - Math.floor(S.frameCount / 300));
  if (S.spawnTimer >= interval) {
    spawnTimer = 0;
    S.spawnTimer = 0;
    spawnObstacle();
    if (Math.random() < .25) setTimeout(spawnObstacle, 250);
  }

  S.obstacles = S.obstacles.filter(o => {
    o.x -= S.speed;
    if (o.x < -50) return false;

    ctx.save();
    ctx.shadowBlur = 12; ctx.shadowColor = '#ff3860';
    ctx.font = `${o.w}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const oy = o.type === 'air' ? o.y : o.y - o.h/2;
    ctx.fillText(o.icon, o.x, oy - (o.type === 'ground' ? o.h/2 : 0));
    ctx.restore();

    // Collision
    const p = S.player;
    const ph = p.sliding ? p.h*.5 : p.h;
    const px1 = p.x - p.w*.35, px2 = p.x + p.w*.35;
    const py1 = p.y - ph, py2 = p.y;
    const ox1 = o.x - o.w*.35, ox2 = o.x + o.w*.35;
    const oy1 = oy - o.h, oy2 = oy;
    if (px2 > ox1 && px1 < ox2 && py2 > oy1 && py1 < oy2) {
      endGame(); return false;
    }
    return true;
  });
}

// ─── COLLECTIBLES ────────────────────────────────────────────
function spawnCoin() {
  const cols = CONFIG.collectibles;
  const icon = cols && cols.length ? cols[Math.floor(Math.random() * cols.length)] : '⭐';
  const pattern = Math.random();
  const coins = [];
  if (pattern < .5) {
    // Line on ground
    for (let i = 0; i < 5; i++) coins.push({ x: W + 40 + i * 40, y: groundY - 50, icon });
  } else {
    // Arc in air
    for (let i = 0; i < 5; i++) {
      const t = i / 4;
      coins.push({ x: W + 40 + i * 45, y: groundY - 60 - Math.sin(t * Math.PI) * 80, icon });
    }
  }
  coins.forEach(c => S.collectibles.push({ ...c, r: 14, collected: false }));
}

function updateCollectibles() {
  S.coinTimer++;
  if (S.coinTimer >= 70) { S.coinTimer = 0; spawnCoin(); }

  S.collectibles = S.collectibles.filter(c => {
    c.x -= S.speed;
    if (c.x < -30) return false;
    if (c.collected) return false;

    ctx.save();
    ctx.font = '22px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.globalAlpha = 1;
    ctx.fillText(c.icon, c.x, c.y);
    ctx.restore();

    const p = S.player;
    const ph = p.sliding ? p.h*.5 : p.h;
    if (Math.abs(c.x - p.x) < p.w*.6 && Math.abs(c.y - (p.y - ph/2)) < ph) {
      c.collected = true;
      S.coins++;
      S.score += 10 * S.multiplier;
      spawnParticles(c.x, c.y, CONFIG.accent, 5);
      document.getElementById('coins-val').textContent = S.coins;
      return false;
    }
    return true;
  });
}

// ─── PARTICLES ───────────────────────────────────────────────
function spawnParticles(x, y, color, count = 6) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 4;
    S.particles.push({
      x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
      life: 1, decay: .05 + Math.random()*.05,
      size: 3 + Math.random()*4, color,
    });
  }
}

function updateParticles() {
  S.particles = S.particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += .2;
    p.life -= p.decay;
    if (p.life <= 0) return false;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 8; ctx.shadowColor = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    return true;
  });
}

// ─── BACKGROUND ──────────────────────────────────────────────
const BG = { stars:[], layers:[] };

function initBg() {
  BG.stars = [];
  for (let i = 0; i < 60; i++) {
    BG.stars.push({ x: Math.random()*800, y: Math.random()*400, s: Math.random()*2, spd: .3 + Math.random()*.7 });
  }
}

function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#08050f');
  grad.addColorStop(.7, '#0d0a18');
  grad.addColorStop(1, '#150f20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  BG.stars.forEach(s => {
    s.x -= s.spd;
    if (s.x < 0) { s.x = W; s.y = Math.random() * H * .7; }
    ctx.globalAlpha = .4 + Math.random()*.3;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Ground
  const gGrad = ctx.createLinearGradient(0, groundY, 0, H);
  gGrad.addColorStop(0, CONFIG.accent + '30');
  gGrad.addColorStop(1, CONFIG.accent + '08');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Ground line
  ctx.save();
  ctx.shadowBlur = 15; ctx.shadowColor = CONFIG.accent;
  ctx.strokeStyle = CONFIG.accent + '80';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke();
  ctx.restore();

  // Speed lines
  if (S.running && S.speed > 8) {
    ctx.save();
    ctx.globalAlpha = (S.speed - 8) / 20 * .15;
    ctx.strokeStyle = CONFIG.accent;
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const y = groundY * (.1 + Math.random()*.6);
      const len = 30 + Math.random() * 80;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(len, y); ctx.stroke();
    }
    ctx.restore();
  }
}

// ─── HUD ──────────────────────────────────────────────────────
function drawHud() {
  // Distance on canvas
  ctx.save();
  ctx.font = 'bold 13px "Share Tech Mono", monospace';
  ctx.fillStyle = 'rgba(255,255,255,.3)';
  ctx.textAlign = 'end';
  ctx.fillText(Math.floor(S.dist) + 'm', W - 10, 20);
  ctx.restore();
}

// ─── SCORE / SPEED ───────────────────────────────────────────
function updateScore() {
  S.score += S.speed * .05;
  S.dist += S.speed * .02;
  S.speed += S.speedIncrement;
  S.frameCount++;

  // Multiplier
  S.multiplier = 1 + Math.floor(S.dist / 200);
  document.getElementById('hdr-mult').textContent = S.multiplier;
  document.getElementById('score-val').textContent = Math.floor(S.score);
  document.getElementById('dist-val').textContent  = Math.floor(S.dist) + 'm';
}

// ─── GAME LOOP ────────────────────────────────────────────────
let raf;
function gameLoop() {
  if (!S.running) return;
  raf = requestAnimationFrame(gameLoop);

  drawBackground();
  updateScore();
  updateObstacles();
  updateCollectibles();
  updatePlayer();
  drawPlayer();
  updateParticles();
  drawHud();
}

// ─── GAME STATES ─────────────────────────────────────────────
function startGame() {
  cancelAnimationFrame(raf);
  Object.assign(S, {
    running: true, score: 0, dist: 0, coins: 0,
    speed: 5, frameCount: 0, multiplier: 1,
    obstacles: [], collectibles: [], particles: [],
    spawnTimer: 0, coinTimer: 0,
  });
  S.player = createPlayer();
  resizeCanvas();
  hideAllOverlays();
  document.getElementById('score-val').textContent = '0';
  document.getElementById('coins-val').textContent = '0';
  document.getElementById('dist-val').textContent  = '0m';
  document.getElementById('hdr-mult').textContent  = '1';
  gameLoop();
}

function endGame() {
  S.running = false;
  cancelAnimationFrame(raf);
  if (S.score > S.best) S.best = Math.floor(S.score);
  document.getElementById('best-val').textContent   = S.best;
  document.getElementById('final-score').textContent = Math.floor(S.score);
  document.getElementById('final-dist').textContent  = Math.floor(S.dist) + 'm';
  document.getElementById('final-coins').textContent = S.coins;
  document.getElementById('over-best').textContent   = S.best;
  showOverlay('overlay-over');
}

function showOverlay(id) {
  document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function hideAllOverlays() {
  document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
}

// ─── CONTROLS ────────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-restart').addEventListener('click', startGame);
document.getElementById('btn-jump').addEventListener('pointerdown', e => { e.preventDefault(); if (S.running) playerJump(); else startGame(); });
document.getElementById('btn-slide').addEventListener('pointerdown', e => { e.preventDefault(); if (S.running) playerSlide(); });

// Tap on canvas = jump
canvas.addEventListener('pointerdown', e => {
  if (!S.running) return;
  const rect = canvas.getBoundingClientRect();
  const tx = e.clientX - rect.left;
  if (tx < W * .4) playerSlide();
  else playerJump();
});

// Keyboard
window.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'z') { e.preventDefault(); if (S.running) playerJump(); else startGame(); }
  if (e.key === 'ArrowDown' || e.key === 's') { e.preventDefault(); if (S.running) playerSlide(); }
});

// ─── INIT ─────────────────────────────────────────────────────
resizeCanvas();
initBg();
const saved = localStorage.getItem('runner_best_surreal-scramble-challenge');
if (saved) { S.best = parseInt(saved) || 0; }
document.getElementById('best-val').textContent  = S.best;
document.getElementById('start-best').textContent = S.best;
showOverlay('overlay-start');

window.addEventListener('beforeunload', () => {
  localStorage.setItem('runner_best_surreal-scramble-challenge', S.best);
});
</script>
</body>
</html>
