<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>لكمة البكسل</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>
:root{--acc:#f472b6;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#000;
  font-family:'Segoe UI',Tajawal,sans-serif;color:#f1f5f9;}
#wrap{position:relative;width:100%;max-width:420px;height:100dvh;
  margin:0 auto;overflow:hidden;}
#wrap canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;}

/* SCREENS */
.scr{position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;text-align:center;
  padding:28px;background:linear-gradient(180deg,#060610,#0d0d2a);z-index:50;}
.scr.on{display:flex;}
.g-emoji{font-size:5rem;filter:drop-shadow(0 0 30px var(--acc));}
.g-title{font-size:2rem;font-weight:900;color:var(--acc);letter-spacing:-1px;}
.g-desc{color:#64748b;font-size:.88rem;line-height:1.6;max-width:300px;}
.stat-row{display:flex;gap:24px;}
.stat .v{font-size:1.6rem;font-weight:900;color:var(--acc);font-family:monospace;}
.stat .l{font-size:.6rem;color:#64748b;text-transform:uppercase;letter-spacing:.1em;}
.btn{padding:13px 0;border-radius:12px;font-size:.95rem;font-weight:700;border:none;
  cursor:pointer;width:100%;max-width:300px;transition:transform .12s;
  display:flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;}
.btn:active{transform:scale(.96);}
.btn-p{background:var(--acc);color:#000;box-shadow:0 0 28px rgba(244,114,182,.4);}
.btn-s{background:rgba(255,255,255,.07);color:#f1f5f9;border:1px solid rgba(255,255,255,.1);}
a.lnk{color:#64748b;font-size:.82rem;text-decoration:none;}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;display:none;
  justify-content:space-between;padding:8px 14px;
  background:rgba(0,0,0,.7);backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.06);z-index:20;}
.hi .l{font-size:.55rem;color:#64748b;text-transform:uppercase;letter-spacing:.1em;}
.hi .v{font-size:.95rem;font-weight:900;color:var(--acc);font-family:monospace;}
#hudLives{font-size:1.1rem;letter-spacing:2px;}

/* LEVEL FLASH */
#lvFlash{position:absolute;top:50px;left:50%;transform:translateX(-50%);
  background:rgba(244,114,182,.12);border:1px solid rgba(244,114,182,.4);
  color:var(--acc);padding:5px 18px;border-radius:100px;
  font-weight:900;font-size:.85rem;font-family:monospace;
  letter-spacing:.1em;display:none;z-index:25;white-space:nowrap;}

/* MOBILE FIRE BUTTON */
#fireBtn{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  width:72px;height:72px;border-radius:50%;
  background:rgba(244,114,182,.18);border:2px solid rgba(244,114,182,.5);
  display:none;align-items:center;justify-content:center;
  font-size:1.8rem;z-index:20;user-select:none;-webkit-user-select:none;}
#fireBtn.on{background:rgba(244,114,182,.45);}

/* SHOP */
#shopOv{position:absolute;inset:0;background:rgba(0,0,0,.95);display:none;
  flex-direction:column;align-items:center;gap:12px;justify-content:center;
  z-index:60;padding:24px;}
#shopOv.on{display:flex;}
.si{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:14px 18px;display:flex;align-items:center;
  justify-content:space-between;width:100%;max-width:340px;gap:12px;}
.si-n{font-weight:700;font-size:.9rem;}
.si-d{color:#64748b;font-size:.74rem;margin:2px 0;}
.si-p{color:var(--acc);font-size:.76rem;font-family:monospace;}
.bb{background:var(--acc);color:#000;padding:8px 14px;border-radius:8px;
  border:none;font-weight:700;font-size:.76rem;cursor:pointer;white-space:nowrap;}
.bb.own{background:rgba(255,255,255,.08);color:#64748b;}

/* AD */
#ad{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;
  justify-content:space-between;padding:8px 14px;
  background:rgba(255,255,255,.04);border-top:1px solid rgba(255,255,255,.07);
  font-size:.72rem;color:#64748b;z-index:10;}
</style>
</head>
<body>
<div id="wrap">

  <!-- START -->
  <div class="scr on" id="sStart">
    <div class="g-emoji">💥</div>
    <div class="g-title">لكمة البكسل</div>
    <div class="g-desc">صمم مقاطع فيديو قصيرة مضحكة وتنافس في حروب التريند اليومية!</div>
    <div class="stat-row">
      <div class="stat"><div class="v" id="bestDisp">0</div><div class="l">أفضل نتيجة</div></div>
      <div class="stat"><div class="v">5</div><div class="l">المستوى</div></div>
      <div class="stat"><div class="v">3</div><div class="l">الأرواح</div></div>
    </div>
    <button class="btn btn-p" onclick="startGame()">🚀 ابدأ اللعبة</button>
    <button class="btn btn-s" onclick="openShop()">🛒 المتجر</button>
    <a class="lnk" href="/">← الرئيسية</a>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hi"><div class="l">النقاط</div><div class="v" id="hudScore">0</div></div>
    <div class="hi"><div class="l">المستوى</div><div class="v" id="hudLevel">1</div></div>
    <div class="hi"><div class="l">الأرواح</div><div class="v" id="hudLives">❤️❤️❤️</div></div>
  </div>

  <!-- LEVEL FLASH -->
  <div id="lvFlash">LEVEL 1</div>

  <!-- FIRE BUTTON (mobile) -->
  <div id="fireBtn" id="fireBtn">🔥</div>

  <!-- END -->
  <div class="scr" id="sEnd">
    <div class="g-emoji" id="endEmoji">💥</div>
    <div class="g-title" id="endTitle">انتهت اللعبة</div>
    <div class="stat-row">
      <div class="stat"><div class="v" id="endScore">0</div><div class="l">النقاط</div></div>
      <div class="stat"><div class="v" id="endLevel">1</div><div class="l">المستوى</div></div>
    </div>
    <div id="newBest" style="color:var(--acc);font-weight:700;font-size:.88rem;display:none">⭐ رقم قياسي جديد</div>
    <button class="btn btn-p" onclick="startGame()">🔄 حاول مجدداً</button>
    <button class="btn btn-s" onclick="goHome()">🏠 الرئيسية</button>
  </div>

  <!-- WIN -->
  <div class="scr" id="sWin">
    <div class="g-emoji">🏆</div>
    <div class="g-title" style="color:#4ade80">أحسنت!</div>
    <div class="stat-row">
      <div class="stat"><div class="v" id="winScore">0</div><div class="l">النقاط</div></div>
    </div>
    <div id="newBest2" style="color:var(--acc);font-weight:700;font-size:.88rem;display:none">⭐ رقم قياسي جديد</div>
    <button class="btn btn-p" onclick="startGame()">🔄 مرة أخرى</button>
    <button class="btn btn-s" onclick="goHome()">🏠 الرئيسية</button>
  </div>

  <!-- SHOP -->
  <div id="shopOv">
    <h2 style="font-size:1.5rem;font-weight:900">🛒 المتجر</h2>
    <div id="shopList" style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px;max-height:55vh;overflow-y:auto"></div>
    <button class="btn btn-s" style="max-width:200px" onclick="closeShop()">✕ رجوع</button>
  </div>

  <!-- AD -->
  <div id="ad">
    <span>📢 الإعلانات تدعم الفريق</span>
    <button class="bb" onclick="buyRemoveAds()">إزالة $1.99</button>
  </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────
const CFG = {
  pid:  'pixel-punchline-arena',
  lang: 'ar',
  acc:  '#f472b6',
  accN: parseInt('#f472b6'.replace('#',''), 16),
  iaps: [{"id":"no-ads","type":"remove_ads","price":1.99,"emoji":"🚫","name":{"ar":"إزالة الإعلانات","en":"Remove Ads","fr":"Sans pub","es":"Sin anuncios","de":"Werbefrei","zh":"去广告"}},{"id":"hint-pack","type":"consumable","price":0.99,"emoji":"💡","name":{"ar":"10 تلميحات","en":"10 Hints","fr":"10 indices","es":"10 pistas","de":"10 Hinweise","zh":"10个提示"}},{"id":"theme-pack","type":"cosmetic","price":1.49,"emoji":"🎨","name":{"ar":"حزمة الثيمات","en":"Themes Pack","fr":"Pack thèmes","es":"Pack temas","de":"Theme-Paket","zh":"主题包"}},{"id":"full-unlock","type":"unlock","price":2.99,"emoji":"⭐","name":{"ar":"فتح كل المحتوى","en":"Unlock All","fr":"Tout débloquer","es":"Desbloquear todo","de":"Alles freischalten","zh":"解锁全部"}}],
  lvls: [{"enemyCount":8,"enemySpeed":1.3,"enemyHealth":1,"bulletSpeed":6,"spawnInterval":90},{"enemyCount":11,"enemySpeed":1.6,"enemyHealth":1,"bulletSpeed":6,"spawnInterval":80},{"enemyCount":14,"enemySpeed":1.9,"enemyHealth":2,"bulletSpeed":6,"spawnInterval":70},{"enemyCount":17,"enemySpeed":2.2,"enemyHealth":2,"bulletSpeed":6,"spawnInterval":60},{"enemyCount":20,"enemySpeed":2.5,"enemyHealth":3,"bulletSpeed":6,"spawnInterval":50}],
  emjs: ["👾","🤖","👽","🦠","💀"],
};

// ─── SAVE ──────────────────────────────────────────────────────
const SK = 'rt_' + CFG.pid;
const S  = () => JSON.parse(localStorage.getItem(SK) || '{}');
const sv = d  => localStorage.setItem(SK, JSON.stringify({...S(),...d}));
const mob = () => 'ontouchstart' in window;

// Game dimensions
const GW = Math.min(window.innerWidth, 420);
const GH = window.innerHeight;
const HUD_H = 44;

// ─── PHASER SCENES ─────────────────────────────────────────────

// ── Boot: generate all textures procedurally ──────────────────
class Boot extends Phaser.Scene {
  constructor(){ super('Boot'); }
  create(){
    this._makePixel();
    this._makePlayer();
    this._makeBullet();
    this._makeEnemies();
    this._makeExplosion();
    this._makeBackground();
    this._makeShield();
    this.scene.start('Game');
  }

  _makePixel(){
    const g = this.make.graphics({add:false});
    g.fillStyle(0xffffff); g.fillRect(0,0,4,4);
    g.generateTexture('px', 4, 4); g.destroy();
  }

  _makePlayer(){
    const g = this.make.graphics({add:false});
    const w=36, h=44;
    // Engine glow
    g.fillStyle(CFG.accN, 0.3);
    g.fillEllipse(w/2, h+6, 24, 14);
    // Body
    g.fillStyle(0xe2e8f0);
    g.fillTriangle(w/2, 0, 2, h-8, w-2, h-8);
    // Cockpit
    g.fillStyle(CFG.accN, 0.9);
    g.fillEllipse(w/2, h*0.38, 14, 18);
    // Wings
    g.fillStyle(0x94a3b8);
    g.fillTriangle(2, h-8, w/2-4, h*0.45, 0, h);
    g.fillTriangle(w-2, h-8, w/2+4, h*0.45, w, h);
    // Engine
    g.fillStyle(0x475569);
    g.fillRect(w/2-5, h-10, 10, 12);
    // Thruster
    g.fillStyle(CFG.accN);
    g.fillEllipse(w/2, h+2, 10, 8);
    g.generateTexture('player', w, h); g.destroy();
  }

  _makeBullet(){
    const g = this.make.graphics({add:false});
    g.fillStyle(CFG.accN);
    g.fillRect(0, 0, 4, 16);
    g.fillStyle(0xffffff, 0.6);
    g.fillRect(1, 0, 2, 8);
    g.generateTexture('bullet', 4, 16); g.destroy();

    // Enemy bullet
    const g2 = this.make.graphics({add:false});
    g2.fillStyle(0xff4444);
    g2.fillRect(0, 0, 4, 12);
    g2.generateTexture('ebullet', 4, 12); g2.destroy();
  }

  _makeEnemies(){
    const emjs = CFG.emjs.length ? CFG.emjs : ['👾','🤖','👽','🦠','💀'];
    // We create up to 5 enemy textures from emoji
    emjs.slice(0, 5).forEach((e, i) => {
      const g = this.make.graphics({add:false});
      // Glow
      g.fillStyle(0xff3333, 0.15);
      g.fillCircle(20, 20, 22);
      g.generateTexture('enemy_bg' + i, 40, 40); g.destroy();
    });
    // Store emojis for runtime drawing
    window._gameEmojis = emjs;
  }

  _makeExplosion(){
    // Simple ring texture
    const g = this.make.graphics({add:false});
    g.lineStyle(3, 0xffa500, 1);
    g.strokeCircle(20, 20, 18);
    g.generateTexture('ring', 40, 40); g.destroy();
  }

  _makeBackground(){
    // Star field texture (512x512 tiling)
    const g = this.make.graphics({add:false});
    g.fillStyle(0x050510); g.fillRect(0,0,512,512);
    for(let i=0;i<200;i++){
      const a = Math.random();
      g.fillStyle(0xffffff, a * 0.7);
      const s = Math.random() < 0.05 ? 2 : 1;
      g.fillRect(
        Math.random()*512, Math.random()*512, s, s
      );
    }
    g.generateTexture('stars', 512, 512); g.destroy();
  }

  _makeShield(){
    const g = this.make.graphics({add:false});
    g.lineStyle(2, CFG.accN, 0.6);
    g.strokeEllipse(22, 22, 44, 52);
    g.generateTexture('shield', 44, 52); g.destroy();
  }
}

// ── Game Scene ────────────────────────────────────────────────
class Game extends Phaser.Scene {
  constructor(){ super('Game'); }

  create(){
    this.lvIdx   = 0;
    this.score   = 0;
    this.lives   = 3;
    this.active  = false;
    this.fireCD  = 0;
    this.eBulletCD = 0;
    this.invincible = 0;
    this.killed  = 0;

    this._buildBg();
    this._buildParticles();
    this._buildPlayer();
    this._buildGroups();
    this._buildInput();

    window._gameScene = this;
  }

  _buildBg(){
    this.bg1 = this.add.tileSprite(GW/2, GH/2, GW, GH, 'stars').setDepth(0);
    this.bg2 = this.add.tileSprite(GW/2, GH/2, GW, GH, 'stars').setDepth(0)
                   .setAlpha(0.4).setTilePosition(256, 128);
  }

  _buildParticles(){
    // Thruster
    this.thruster = this.add.particles(0, 0, 'px', {
      speed: { min: 30, max: 80 },
      angle: { min: 80, max: 100 },
      scale: { start: 0.5, end: 0 },
      alpha: { start: 0.9, end: 0 },
      tint:  [CFG.accN, 0xffffff, 0xffaa00],
      lifespan: 280, frequency: 18,
      blendMode: 'ADD', emitting: false,
    }).setDepth(3);

    // Explosion
    this.explodeFx = this.add.particles(0, 0, 'px', {
      speed: { min: 60, max: 220 },
      angle: { min: 0, max: 360 },
      scale: { start: 0.8, end: 0 },
      alpha: { start: 1, end: 0 },
      tint:  [0xff6600, 0xffcc00, 0xff3300, 0xffffff],
      lifespan: 500, blendMode: 'ADD', emitting: false,
    }).setDepth(8);

    // Hit flash
    this.hitFx = this.add.particles(0, 0, 'px', {
      speed: { min: 40, max: 120 },
      angle: { min: 0, max: 360 },
      scale: { start: 0.6, end: 0 },
      alpha: { start: 1, end: 0 },
      tint:  [CFG.accN, 0xffffff],
      lifespan: 260, blendMode: 'ADD', emitting: false,
    }).setDepth(8);
  }

  _buildPlayer(){
    this.player = this.physics.add.image(GW/2, GH - 80, 'player')
      .setDepth(5).setCollideWorldBounds(true);
    this.player.body.setSize(24, 32).setOffset(6, 8);
    this.shield = this.add.image(GW/2, GH - 80, 'shield')
      .setDepth(4).setAlpha(0).setScale(1.1);
  }

  _buildGroups(){
    this.bullets  = this.physics.add.group();
    this.eBullets = this.physics.add.group();
    this.enemies  = this.physics.add.group();
  }

  _buildInput(){
    this.cursors = this.input.keyboard?.createCursorKeys();
    this.wasd    = this.input.keyboard?.addKeys('W,A,S,D,SPACE');
    // Touch drag
    this._tx = GW/2;
    this.input.on('pointermove', p => {
      if(p.isDown) this._tx = Phaser.Math.Clamp(p.x, 20, GW-20);
    });
    this.input.on('pointerdown', p => { this._tx = p.x; this._firing = true; });
    this.input.on('pointerup',   () => { this._firing = false; });
  }

  startLevel(){
    this.active  = true;
    this.killed  = 0;
    this.fireCD  = 0;
    this.eBulletCD = 120;
    this.enemies.clear(true, true);
    this.bullets.clear(true, true);
    this.eBullets.clear(true, true);

    const lv = CFG.lvls[this.lvIdx] || CFG.lvls[CFG.lvls.length-1];
    this._spawnWave(lv);
    this._flashLevel();
    this._updateHUD();
    this.thruster.start();
  }

  _spawnWave(lv){
    const cnt   = lv.enemyCount || 8;
    const emjs  = window._gameEmojis;
    const cols  = Math.min(cnt, 5);
    const rows  = Math.ceil(cnt / cols);
    const spX   = (GW - cols * 56) / 2 + 28;

    let n = 0;
    for(let r=0; r<rows && n<cnt; r++){
      for(let c=0; c<cols && n<cnt; c++){
        const x = spX + c * 56;
        const y = HUD_H + 30 + r * 52;
        const ei = n % emjs.length;
        const e = this.add.text(x, y, emjs[ei], {
          fontSize: '28px'
        }).setOrigin(0.5).setDepth(5);
        // Add physics body manually
        this.physics.add.existing(e);
        e.body.setSize(28, 28).setOffset(-14, -14);
        e.body.velocity.y = lv.enemySpeed * 28 || 30;
        e.hp = lv.enemyHealth || 1;
        e.spd = lv.enemySpeed || 1.3;
        e.shootRate = lv.spawnInterval || 90;
        e.shootT = Math.random() * e.shootRate;
        this.enemies.add(e);
        n++;
      }
    }
  }

  _flashLevel(){
    const el = document.getElementById('lvFlash');
    el.textContent = 'المستوى ' + (this.lvIdx + 1);
    el.style.display = 'block';
    setTimeout(() => el.style.display='none', 1400);
  }

  _updateHUD(){
    document.getElementById('hudScore').textContent = this.score;
    document.getElementById('hudLevel').textContent = this.lvIdx + 1;
    document.getElementById('hudLives').textContent = '❤️'.repeat(Math.max(0, this.lives));
  }

  update(time, delta){
    if(!this.active) return;
    const dt = delta / 1000;

    // Scroll bg
    this.bg1.tilePositionY -= 1.2;
    this.bg2.tilePositionY -= 0.6;

    // Player movement
    const spd = 300;
    if(this.cursors?.left.isDown  || this.wasd?.A.isDown || window.K?.L)
      this.player.body.velocity.x = -spd;
    else if(this.cursors?.right.isDown || this.wasd?.D.isDown || window.K?.R)
      this.player.body.velocity.x = spd;
    else {
      // Smooth follow touch
      const dx = this._tx - this.player.x;
      this.player.body.velocity.x = dx * 8;
    }
    this.player.body.velocity.y = 0;

    // Sync shield
    this.shield.setPosition(this.player.x, this.player.y);
    if(this.invincible > 0){
      this.invincible -= dt;
      this.shield.setAlpha(0.5 + 0.5 * Math.sin(time * 0.02));
      this.player.setAlpha(0.6 + 0.4 * Math.sin(time * 0.03));
    } else {
      this.shield.setAlpha(0);
      this.player.setAlpha(1);
    }

    // Thruster pos
    this.thruster.setPosition(this.player.x, this.player.y + 22);

    // Fire
    this.fireCD -= dt;
    const firing = this.cursors?.space?.isDown || this.wasd?.SPACE?.isDown
                || window.K?.F || this._firing;
    if(firing && this.fireCD <= 0){
      this._fireBullet();
      this.fireCD = 0.18;
    }

    // Enemy movement & shooting
    this.eBulletCD -= dt;
    let allDead = true;
    this.enemies.getChildren().forEach(e => {
      if(!e.active) return;
      allDead = false;
      // Oscillate
      e.x += Math.sin(time * 0.002 + e.y * 0.04) * 1.2;
      e.x  = Phaser.Math.Clamp(e.x, 20, GW - 20);
      // Reached bottom?
      if(e.y > GH - 60){
        this._loseLife();
        e.destroy();
        return;
      }
      // Shoot
      e.shootT -= dt;
      if(e.shootT <= 0){
        e.shootT = e.shootRate * 0.016 * (0.7 + Math.random() * 0.6);
        this._enemyFire(e.x, e.y);
      }
    });

    // Cleanup off-screen bullets
    this.bullets.getChildren().forEach(b => {
      if(b.y < -20) b.destroy();
    });
    this.eBullets.getChildren().forEach(b => {
      if(b.y > GH + 20) b.destroy();
    });

    // Bullet ↔ enemy
    this.physics.overlap(this.bullets, this.enemies, (b, e) => {
      this.hitFx.setPosition(e.x, e.y).explode(6);
      b.destroy();
      e.hp--;
      if(e.hp <= 0){
        this.explodeFx.setPosition(e.x, e.y).explode(18);
        this.cameras.main.shake(80, 0.004);
        e.destroy();
        this.score += 10 * (this.lvIdx + 1);
        this.killed++;
        this._updateHUD();
      }
    });

    // Enemy bullet ↔ player
    if(this.invincible <= 0){
      this.physics.overlap(this.eBullets, this.player, (b) => {
        b.destroy();
        this._loseLife();
      });
    }

    // Wave cleared?
    if(allDead && this.enemies.getLength() === 0){
      this.active = false;
      this.thruster.stop();
      setTimeout(() => this._nextLevel(), 800);
    }
  }

  _fireBullet(){
    const b = this.physics.add.image(this.player.x, this.player.y - 24, 'bullet')
      .setDepth(6);
    b.body.velocity.y = -520;
    this.bullets.add(b);
    this.hitFx.setPosition(this.player.x, this.player.y - 30).explode(3);
  }

  _enemyFire(x, y){
    const b = this.physics.add.image(x, y + 14, 'ebullet').setDepth(6);
    b.body.velocity.y = 260;
    this.eBullets.add(b);
  }

  _loseLife(){
    if(this.invincible > 0) return;
    this.lives--;
    this.invincible = 2.2;
    this.cameras.main.shake(220, 0.012);
    this.explodeFx.setPosition(this.player.x, this.player.y).explode(20);
    this._updateHUD();
    if(this.lives <= 0){
      this.active = false;
      this.thruster.stop();
      setTimeout(() => _endGame(false, this.score, this.lvIdx + 1), 600);
    }
  }

  _nextLevel(){
    this.lvIdx++;
    if(this.lvIdx >= CFG.lvls.length){
      _endGame(true, this.score, this.lvIdx);
    } else {
      this.startLevel();
    }
  }

  resetGame(){
    this.lvIdx  = 0;
    this.score  = 0;
    this.lives  = 3;
    this.active = false;
    this.invincible = 0;
    this._firing = false;
    this._tx = GW / 2;
    this.enemies.clear(true, true);
    this.bullets.clear(true, true);
    this.eBullets.clear(true, true);
    this.player.setPosition(GW/2, GH - 80).setAlpha(1);
    this.thruster.stop();
    this._updateHUD();
  }
}

// ─── GAME FLOW ─────────────────────────────────────────────────
function startGame(){
  ['sStart','sEnd','sWin'].forEach(id =>
    document.getElementById(id).classList.remove('on')
  );
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('ad').style.display  = S().adsRemoved ? 'none' : 'flex';
  if(mob()){
    document.getElementById('fireBtn').style.display = 'flex';
  }

  const sc = window._gameScene;
  if(sc){ sc.resetGame(); sc.startLevel(); }
}

function _endGame(win, score, level){
  document.getElementById('hud').style.display = 'none';
  document.getElementById('fireBtn').style.display = 'none';

  const cur = S();
  const isNew = score > (cur.best || 0);
  if(isNew) sv({ best: score });

  if(win){
    document.getElementById('winScore').textContent = score;
    document.getElementById('newBest2').style.display = isNew ? 'block' : 'none';
    document.getElementById('sWin').classList.add('on');
  } else {
    document.getElementById('endScore').textContent = score;
    document.getElementById('endLevel').textContent = level;
    document.getElementById('newBest').style.display = isNew ? 'block' : 'none';
    document.getElementById('sEnd').classList.add('on');
  }
  document.getElementById('ad').style.display = S().adsRemoved ? 'none' : 'flex';
}

function goHome(){
  ['sEnd','sWin'].forEach(id =>
    document.getElementById(id).classList.remove('on')
  );
  document.getElementById('hud').style.display = 'none';
  document.getElementById('fireBtn').style.display = 'none';
  document.getElementById('ad').style.display = S().adsRemoved ? 'none' : 'flex';
  document.getElementById('sStart').classList.add('on');
  const cur = S();
  if(cur.best) document.getElementById('bestDisp').textContent = cur.best;
}

fb.addEventListener('touchstart', e => { e.preventDefault(); fb.classList.add('on'); window.K.F = true; }, {passive:false});

// ─── SHOP ──────────────────────────────────────────────────────
function openShop(){
  const cur = S(), list = document.getElementById('shopList');
  list.innerHTML = '';
  CFG.iaps.forEach(item => {
    const owned = !!cur['own_' + item.id];
    const name  = (item.name && (item.name[CFG.lang] || item.name.en)) || item.id;
    const desc  = (item.desc && (item.desc[CFG.lang] || item.desc.en)) || '';
    const d = document.createElement('div'); d.className = 'si';
    d.innerHTML =
      `<div><div class="si-n">${name}</div><div class="si-d">${desc}</div><div class="si-p">${item.price||'$0.99'}</div></div>` +
      `<button class="bb${owned?' own':''}"${owned?' disabled':''} onclick="buy('${item.id}')">` +
      `${owned ? '✓' : 'المتجر'}</button>`;
    list.appendChild(d);
  });
  if(!cur.adsRemoved){
    const d = document.createElement('div'); d.className = 'si';
    d.innerHTML =
      `<div><div class="si-n">🚫 الإعلانات تدعم الفريق</div><div class="si-p">إزالة $1.99</div></div>` +
      `<button class="bb" onclick="buyRemoveAds()">المتجر</button>`;
    list.appendChild(d);
  }
  document.getElementById('shopOv').classList.add('on');
}
function closeShop()    { document.getElementById('shopOv').classList.remove('on'); }
function buy(id)        { sv({ ['own_' + id]: true }); openShop(); }
function buyRemoveAds() {
  sv({ adsRemoved: true });
  document.getElementById('ad').style.display = 'none';
  if(document.getElementById('shopOv').classList.contains('on')) openShop();
}

(function(){
  const cur = S();
  if(cur.adsRemoved) document.getElementById('ad').style.display = 'none';
  if(cur.best) document.getElementById('bestDisp').textContent = cur.best;
})();
