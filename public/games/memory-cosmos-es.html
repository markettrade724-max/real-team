<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Memoria Cosmos</title>
<style>
:root{--acc:#818cf8;--acc-rgb:129,140,248;--bg:#0a0a14;--surface:#12121f;--text:#f1f5f9;--text2:#7a7a8a;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Segoe UI',Tajawal,sans-serif;color:var(--text);user-select:none;-webkit-user-select:none;}
#app{display:flex;flex-direction:column;width:100%;max-width:420px;height:100dvh;margin:0 auto;overflow:hidden;}
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(0,0,0,0.5);border-bottom:1px solid rgba(255,255,255,0.06);z-index:10;}
#back-btn{background:none;border:1px solid rgba(255,255,255,0.2);color:var(--text2);padding:4px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:0.7rem;}
#game-title{font-weight:900;font-size:1rem;color:var(--acc);text-shadow:0 0 20px rgba(var(--acc-rgb),0.5);}
#hud{display:flex;justify-content:center;gap:20px;padding:8px 16px;background:var(--surface);border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.75rem;font-weight:700;}
.hud-item{display:flex;align-items:center;gap:6px;}
.hud-label{color:var(--text2);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;}
.hud-val{color:var(--acc);font-family:monospace;font-size:0.9rem;}
#main-area{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;}
.grid{display:grid;gap:8px;justify-content:center;width:100%;max-width:360px;}
.card{aspect-ratio:1;font-size:3rem;display:flex;align-items:center;justify-content:center;background:var(--surface);border-radius:12px;cursor:pointer;transition:transform 0.2s,background 0.2s;border:1px solid rgba(255,255,255,0.05);}
.card.flipped{background:rgba(var(--acc-rgb),0.2);transform:scale(1.05);border-color:var(--acc);}
.card.matched{opacity:0.4;pointer-events:none;background:rgba(var(--acc-rgb),0.1);}
.btn{padding:0.7rem 2rem;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:0.85rem;background:var(--acc);color:#000;box-shadow:0 0 20px rgba(var(--acc-rgb),0.3);}
.btn:active{transform:scale(0.96);}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;background:rgba(10,10,20,0.9);backdrop-filter:blur(10px);z-index:20;}
.overlay.hidden{display:none;}
.overlay-title{font-size:2rem;font-weight:900;color:var(--acc);}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <button id="back-btn" onclick="history.back()">← Volver</button>
    <div id="game-title">🌌 Memoria Cosmos</div>
    <div style="width:50px"></div>
  </div>
  <div id="hud">
    <div class="hud-item"><span class="hud-label">Movimientos</span><span class="hud-val" id="movesVal">0</span></div>
    <div class="hud-item"><span class="hud-label">Pares</span><span class="hud-val" id="pairsVal">0/4</span></div>
    <div class="hud-item"><span class="hud-label">Pista</span><span class="hud-val" id="hintVal">💡 2</span></div>
  </div>
  <div id="main-area"></div>
  <div class="overlay" id="overlayStart">
    <div style="font-size:4rem">🌌</div>
    <div class="overlay-title">Memoria Cosmos</div>
    <p style="color:var(--text2)">Desafía tu memoria entre las estrellas</p>
    <button class="btn" id="btnStart">Jugar</button>
  </div>
  <div class="overlay hidden" id="overlayWin">
    <div style="font-size:4rem">🏆</div>
    <div class="overlay-title">¡Ganaste!</div>
    <button class="btn" id="btnRestart">Jugar de nuevo</button>
  </div>
</div>

<script>
const CFG = {
  pid: 'memory-cosmos',
  lang: 'es',
  acc: '#818cf8',
  iaps: [{"id":"no-ads","type":"remove_ads","price":1.99,"emoji":"🚫","name":{"ar":"إزالة الإعلانات","en":"Remove Ads","fr":"Sans pub","es":"Sin anuncios","de":"Werbefrei","zh":"去广告"}},{"id":"hint-pack","type":"consumable","price":0.99,"emoji":"💡","name":{"ar":"10 تلميحات","en":"10 Hints","fr":"10 indices","es":"10 pistas","de":"10 Hinweise","zh":"10个提示"}},{"id":"theme-neon","type":"cosmetic","price":1.49,"emoji":"🌈","name":{"ar":"ثيم النيون","en":"Neon Theme","fr":"Thème néon","es":"Tema neón","de":"Neon-Theme","zh":"霓虹主题"}},{"id":"full-unlock","type":"unlock","price":2.99,"emoji":"⭐","name":{"ar":"فتح كل المحتوى","en":"Unlock All","fr":"Tout débloquer","es":"Desbloquear todo","de":"Alles freischalten","zh":"解锁全部"}}] || [],
  emojis: ["🌌","⭐","🪐","☄️","🌠","🌙","🔭","✨","🛸","💫","🌟","🚀"] || ['⭐','🌟','💫','✨','🎯','🔮','💎','🌈','🎨','🎭'],
  lvls: [{"number":1,"name":{"ar":"١","en":"1"},"difficulty":"easy","pairs":4,"timeLimit":60},{"number":2,"name":{"ar":"٢","en":"2"},"difficulty":"medium","pairs":6,"timeLimit":50},{"number":3,"name":{"ar":"٣","en":"3"},"difficulty":"medium","pairs":8,"timeLimit":45},{"number":4,"name":{"ar":"٤","en":"4"},"difficulty":"hard","pairs":10,"timeLimit":40},{"number":5,"name":{"ar":"٥","en":"5"},"difficulty":"expert","pairs":12,"timeLimit":35}] || [{pairs:4,cols:4,hints:2},{pairs:6,cols:4,hints:1},{pairs:8,cols:5,hints:1},{pairs:10,cols:5,hints:0},{pairs:12,cols:6,hints:0}]
};

function getLvl(idx) {
  const lvls = CFG.lvls;
  if (Array.isArray(lvls) && lvls.length > 0) {
    return lvls[Math.min(idx, lvls.length - 1)];
  }
  return { pairs: 4, cols: 4, hints: 2 };
}

let G = { level: 0, moves: 0, found: 0, lock: false, first: null, second: null, cards: [], hintsLeft: 0 };

function startGame() {
  const lv = getLvl(G.level);
  const pairs = lv.pairs || 4;
  const cols = lv.cols || 4;
  G.hintsLeft = lv.hints ?? 2; // ✅ إصلاح 1: ?? بدلاً من || لدعم القيمة 0
  G.moves = 0; G.found = 0; G.lock = false; G.first = null; G.second = null;
  
  const icons = CFG.emojis.slice(0, pairs);
  G.cards = shuffle([...icons, ...icons].map((e,i)=>({emoji:e, id:i, matched:false, flipped:false})));
  
  document.getElementById('movesVal').textContent = '0';
  document.getElementById('pairsVal').textContent = `0/${pairs}`;
  document.getElementById('hintVal').textContent = `💡 ${G.hintsLeft}`;
  document.getElementById('overlayStart').classList.add('hidden');
  document.getElementById('overlayWin').classList.add('hidden');
  
  renderBoard(cols);
}

function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function renderBoard(cols) {
  const root = document.getElementById('main-area');
  root.innerHTML = `<div class="grid" style="grid-template-columns:repeat(${cols},1fr)" id="gameGrid"></div>`;
  const grid = document.getElementById('gameGrid');
  G.cards.forEach((c,i)=>{
    const div = document.createElement('div');
    div.className = 'card' + (c.flipped?' flipped':'') + (c.matched?' matched':'');
    div.textContent = c.flipped||c.matched ? c.emoji : '';
    div.addEventListener('click', ()=>flipCard(i));
    grid.appendChild(div);
  });
}

function flipCard(i) {
  if(G.lock || G.cards[i].matched || G.cards[i].flipped || i===G.first) return;
  G.cards[i].flipped = true;
  renderBoard(getLvl(G.level).cols||4);
  
  if(G.first === null) { G.first = i; return; }
  G.second = i; G.moves++;
  document.getElementById('movesVal').textContent = G.moves;
  
  if(G.cards[G.first].emoji === G.cards[G.second].emoji) {
    G.cards[G.first].matched = G.cards[G.second].matched = true;
    G.found++; G.first = G.second = null;
    renderBoard(getLvl(G.level).cols || 4); // ✅ إصلاح 2: تحديث الشكل فور التطابق
    document.getElementById('pairsVal').textContent = `${G.found}/${getLvl(G.level).pairs}`;
    if(G.found === getLvl(G.level).pairs) {
      if(G.level < (CFG.lvls.length||5)-1) { G.level++; setTimeout(startGame, 600); }
      else { document.getElementById('overlayWin').classList.remove('hidden'); }
    }
  } else {
    G.lock = true;
    setTimeout(()=>{ G.cards[G.first].flipped = G.cards[G.second].flipped = false; G.first = G.second = null; G.lock = false; renderBoard(getLvl(G.level).cols||4); }, 600);
  }
}

document.getElementById('hintVal').addEventListener('click', ()=>{
  if(G.lock || G.hintsLeft<=0) return;
  const unflipped = G.cards.reduce((a,c,i)=>!c.flipped&&!c.matched?a.concat(i):a,[]);
  if(unflipped.length<2) return;
  const i1 = unflipped[Math.floor(Math.random()*unflipped.length)];
  const pair = G.cards.findIndex((c,idx)=>idx!==i1&&c.emoji===G.cards[i1].emoji&&!c.flipped&&!c.matched);
  if(pair>-1) {
    G.cards[i1].flipped = G.cards[pair].flipped = true; G.hintsLeft--;
    document.getElementById('hintVal').textContent = `💡 ${G.hintsLeft}`;
    renderBoard(getLvl(G.level).cols||4);
    setTimeout(()=>{ G.cards[i1].flipped = G.cards[pair].flipped = false; renderBoard(getLvl(G.level).cols||4); }, 800);
  }
});

document.getElementById('btnStart').addEventListener('click', startGame);
document.getElementById('btnRestart').addEventListener('click', ()=>{ G.level=0; startGame(); });
</script>
</body>
</html>
