<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sauce Shooter Showdown</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>
:root{--acc:#f59e0b;--acc-rgb:245,158,11;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',Tajawal,sans-serif;color:#f1f5f9;user-select:none;-webkit-user-select:none;}
#wrap{position:relative;width:100%;max-width:420px;height:100dvh;margin:0 auto;overflow:hidden;background:radial-gradient(ellipse at center,#0a0a1a 0%,#000 100%);}
#wrap canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;}
.scr{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:28px;background:radial-gradient(ellipse at center,rgba(245,158,11,0.15) 0%,rgba(0,0,0,0.9) 100%);backdrop-filter:blur(10px);z-index:50;}
.scr.on{display:flex;}
.g-title{font-size:2.2rem;font-weight:900;color:var(--acc);text-shadow:0 0 30px var(--acc);animation:titlePulse 2s ease-in-out infinite;}
@keyframes titlePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.g-desc{color:#94a3b8;font-size:.9rem;line-height:1.6;max-width:300px;}
.btn{padding:14px 0;border-radius:14px;font-size:1rem;font-weight:700;border:none;cursor:pointer;width:100%;max-width:300px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;text-transform:uppercase;letter-spacing:.05em;}
.btn:active{transform:scale(.96);}
.btn-p{background:var(--acc);color:#000;box-shadow:0 0 30px rgba(245,158,11,0.5);}
#hud{position:absolute;top:0;left:0;right:0;display:none;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.08);z-index:20;}
.hud-bl{display:flex;flex-direction:column;}
.hud-l{font-size:.6rem;color:#64748b;text-transform:uppercase;letter-spacing:.12em;}
.hud-v{font-size:1rem;font-weight:900;color:var(--acc);font-family:monospace;}
#hpBar{width:80px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;}
#hpFill{height:100%;border-radius:4px;background:linear-gradient(90deg,#ef4444,#f97316);transition:width .3s;}
#fireBtn{position:absolute;bottom:20px;right:20px;width:72px;height:72px;border-radius:50%;background:rgba(245,158,11,0.2);border:3px solid rgba(245,158,11,0.5);display:none;align-items:center;justify-content:center;z-index:20;cursor:pointer;animation:firePulse 1.5s ease-in-out infinite;backdrop-filter:blur(8px);}
@keyframes firePulse{0%,100%{box-shadow:0 0 20px rgba(245,158,11,0.4)}50%{box-shadow:0 0 40px rgba(245,158,11,0.8)}}
#fireBtn.on{background:rgba(245,158,11,0.5);border-color:#fff;}
#fireBtn svg{width:32px;height:32px;fill:var(--acc);}
#movePad{position:absolute;bottom:20px;left:20px;width:110px;height:70px;border-radius:16px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);display:none;align-items:center;justify-content:space-between;padding:0 10px;z-index:20;backdrop-filter:blur(10px);}
.mpBtn{width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.mpBtn.on{background:rgba(245,158,11,0.35);border-color:var(--acc);box-shadow:0 0 20px rgba(245,158,11,0.4);}
.mpBtn svg{width:22px;height:22px;fill:#cbd5e1;}
#lvFlash{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(245,158,11,0.2);border:1px solid rgba(245,158,11,0.5);color:var(--acc);padding:6px 22px;border-radius:100px;font-weight:900;font-size:.9rem;font-family:monospace;letter-spacing:.1em;display:none;z-index:25;text-shadow:0 0 12px var(--acc);}
</style>
</head>
<body>
<div id="wrap">
  <div class="scr on" id="sStart"><div class="g-title">Sauce Shooter Showdown</div><div class="g-desc">Epic food battles! Shoot ingredients, craft dishes, dominate the kitchen.</div><button class="btn btn-p" onclick="startGame()">▶ Jugar</button></div>
  <div id="hud"><div class="hud-bl"><div class="hud-l">Puntos</div><div class="hud-v" id="hudScore">0</div></div><div class="hud-bl" style="align-items:center"><div class="hud-l">Nivel</div><div class="hud-v" id="hudLevel">1</div></div><div class="hud-bl" style="align-items:flex-end"><div class="hud-l">HP</div><div id="hpWrap"><div id="hpBar"><div id="hpFill" style="width:100%"></div></div></div></div></div>
  <div id="lvFlash">LEVEL 1</div>
  <div id="fireBtn"><svg viewBox="0 0 24 24"><polygon points="12,2 22,22 12,17 2,22"/></svg></div>
  <div id="movePad"><div class="mpBtn" id="mpL"><svg viewBox="0 0 24 24"><polygon points="15,4 5,12 15,20"/></svg></div><div class="mpBtn" id="mpR"><svg viewBox="0 0 24 24"><polygon points="9,4 19,12 9,20"/></svg></div></div>
  <div class="scr" id="sEnd"><div style="font-size:3.5rem">💥</div><div class="g-title" style="font-size:1.8rem">Game Over</div><div id="finalScore" style="font-family:monospace;font-size:1.3rem;color:var(--acc)"></div><button class="btn btn-p" onclick="startGame()">Intentar de nuevo</button></div>
</div>
<script>
const CFG={pid:'sauce-shooter-showdown',lang:'es',acc:'#f59e0b',accN:parseInt('#f59e0b'.replace('#',''),16),accRGB:[245,158,11].map(Number),iaps:[{"id":"no-ads","type":"remove_ads","price":1.99,"emoji":"🚫","name":{"ar":"إزالة الإعلانات","en":"Remove Ads","fr":"Sans pub","es":"Sin anuncios","de":"Werbefrei","zh":"去广告"}},{"id":"full-unlock","type":"unlock","price":2.99,"emoji":"⭐","name":{"ar":"فتح كل المحتوى","en":"Unlock All","fr":"Tout débloquer","es":"Desbloquear todo","de":"Alles freischalten","zh":"解锁全部"}}],lvls:[{"enemyCount":8,"enemySpeed":1.1,"enemyHealth":1,"enemyTypes":[0,1],"bossLevel":false,"spawnPattern":"waves","name":{"ar":"البداية","en":"First Contact"}},{"enemyCount":14,"enemySpeed":1.5,"enemyHealth":2,"enemyTypes":[0,1,2],"bossLevel":false,"spawnPattern":"zigzag","name":{"ar":"المقاومة","en":"Resistance"}},{"enemyCount":20,"enemySpeed":1.9,"enemyHealth":3,"enemyTypes":[1,2,3],"bossLevel":false,"spawnPattern":"storm","name":{"ar":"العاصفة","en":"The Storm"}},{"enemyCount":8,"enemySpeed":1.3,"enemyHealth":8,"enemyTypes":[3],"bossLevel":true,"spawnPattern":"boss","name":{"ar":"الحارس","en":"The Guardian"}},{"enemyCount":30,"enemySpeed":2.3,"enemyHealth":5,"enemyTypes":[0,1,2,3],"bossLevel":false,"spawnPattern":"chaos","name":{"ar":"الفوضى العظمى","en":"Grand Chaos"}}]||[]};
if(!Array.isArray(CFG.lvls)||CFG.lvls.length===0){CFG.lvls=[{enemyCount:8,enemySpeed:1.3,enemyHealth:1},{enemyCount:12,enemySpeed:1.7,enemyHealth:2,enemyTypes:[0,1]},{enemyCount:16,enemySpeed:2.2,enemyHealth:3,enemyTypes:[1,2]},{enemyCount:12,enemySpeed:1.5,enemyHealth:5,enemyTypes:[2,3],bossLevel:true},{enemyCount:25,enemySpeed:2.8,enemyHealth:4,enemyTypes:[0,1,2,3]}]}
function getLevelData(idx){const d=CFG.lvls[idx]||{};return{enemyCount:d.enemyCount||8,enemySpeed:d.enemySpeed||1.3,enemyHealth:d.enemyHealth||1,enemyTypes:d.enemyTypes||[0,1],bossLevel:d.bossLevel||false}}
const SK='rt_'+CFG.pid,S=()=>JSON.parse(localStorage.getItem(SK)||'{}'),isMob=()=>'ontouchstart' in window&&matchMedia('(pointer: coarse)').matches;
const GW=Math.min(window.innerWidth,420),GH=window.innerHeight;
window.K={L:!1,R:!1,F:!1};let gameScene=null;
const ENEMY_VARIANTS=[{emoji:'👾',col:0xff4444,scl:1.0,spd:1.1,pts:10},{emoji:'🤖',col:0xff8800,scl:1.25,spd:0.85,pts:20},{emoji:'👽',col:0x44ff44,scl:0.95,spd:1.3,pts:15},{emoji:'💀',col:0xcc44ff,scl:1.5,spd:0.7,pts:35,isBoss:!0}];
class BootScene extends Phaser.Scene{constructor(){super('Boot')}create(){const g=this.make.graphics({add:!1});g.fillStyle(0x030310);g.fillRect(0,0,512,512);for(let i=0;i<350;i++){g.fillStyle(0xffffff,Math.random()*0.7);g.fillRect(Math.random()*512|0,Math.random()*512|0,1,1)}g.generateTexture('stars',512,512);g.destroy();const pg=this.make.graphics({add:!1});pg.fillStyle(CFG.accN,0.3);pg.fillEllipse(18,48,24,16);pg.fillStyle(0xd0d8f0,1);pg.fillTriangle(18,0,34,40,2,40);pg.fillStyle(CFG.accN,0.9);pg.fillEllipse(18,18,14,22);pg.fillStyle(0xffffff,0.6);pg.fillEllipse(15,14,5,8);pg.generateTexture('player',36,52);pg.destroy();ENEMY_VARIANTS.forEach((v,i)=>{const eg=this.make.graphics({add:!1});eg.fillStyle(v.col,1);eg.fillEllipse(14,11,22*v.scl,18*v.scl);eg.fillStyle(0xffffff,0.8);eg.fillCircle(10,8,5*v.scl);eg.fillStyle(0x000000,0.7);eg.fillCircle(11,7,2*v.scl);if(v.isBoss){eg.fillStyle(0xffcc00,0.9);eg.fillCircle(3,5,4);eg.fillCircle(25,5,4)}eg.generateTexture('enemy_'+i,28,22);eg.destroy()});const bg=this.make.graphics({add:!1});bg.fillStyle(CFG.accN,1);bg.fillRect(0,0,4,20);bg.fillStyle(0xffffff,0.9);bg.fillRect(1,0,2,3);bg.generateTexture('bullet',4,20);bg.destroy();const px=this.make.graphics({add:!1});px.fillStyle(0xffffff);px.fillRect(0,0,4,4);px.generateTexture('px',4,4);px.destroy();this.scene.start('Game')}}
class GameScene extends Phaser.Scene{constructor(){super('Game')}create(){this.score=0;this.hp=3;this.maxHp=3;this.levelIndex=0;this.active=!1;this.invincible=0;this.killed=0;this.lastFire=0;this.fireRate=200;this.bg1=this.add.tileSprite(GW/2,GH/2,GW,GH,'stars').setDepth(0);this.bg2=this.add.tileSprite(GW/2,GH/2,GW,GH,'stars').setAlpha(0.4).setTilePosition(300,200).setDepth(0);this.player=this.physics.add.image(GW/2,GH-80,'player').setDepth(5).setCollideWorldBounds(!0);this.player.body.setSize(24,40).setOffset(6,6);this.bullets=this.physics.add.group({defaultKey:'bullet'});this.enemies=this.physics.add.group();this.cursors=this.input.keyboard?.createCursorKeys();this.input.on('pointerdown',()=>{if(this.active)this.fireBullet()});this.explosionFx=this.add.particles(0,0,'px',{speed:{min:60,max:250},angle:{min:0,max:360},scale:{start:1.2,end:0},alpha:{start:1,end:0},tint:[0xff6600,0xffcc00,0xff3300,0xffffff],lifespan:500,blendMode:'ADD',emitting:!1}).setDepth(8);this.hitFx=this.add.particles(0,0,'px',{speed:{min:20,max:80},angle:{min:0,max:360},scale:{start:0.7,end:0},alpha:{start:0.8,end:0},tint:[CFG.accN,0xffffff],lifespan:250,blendMode:'ADD',emitting:!1}).setDepth(8);gameScene=this;this._updateHUD()}
startLevel(){this.active=!0;this.killed=0;this.enemies.clear(!0,!0);this.bullets.clear(!0,!0);const lv=getLevelData(this.levelIndex);const cnt=lv.enemyCount,spd=lv.enemySpeed,types=lv.enemyTypes;console.log('🚀 Level '+(this.levelIndex+1)+': '+cnt+' enemies');for(let i=0;i<cnt;i++){const x=Phaser.Math.Between(30,GW-30);const y=-20-Math.random()*60;const variant=types[Phaser.Math.Between(0,types.length-1)];const enemy=this.enemies.create(x,y,'enemy_'+variant);enemy.setDepth(4);enemy.body.setSize(22,16).setOffset(3,3);enemy.body.velocity.y=spd*30*ENEMY_VARIANTS[variant].spd;enemy._health=lv.enemyHealth*(ENEMY_VARIANTS[variant].isBoss?3:1);enemy._variant=variant;enemy._scoreValue=ENEMY_VARIANTS[variant].pts}const flash=document.getElementById('lvFlash');flash.textContent='Nivel '+(this.levelIndex+1);flash.style.display='block';setTimeout(()=>flash.style.display='none',1500);this._updateHUD()}
fireBullet(){if(!this.active||!this.player)return;const b=this.bullets.create(this.player.x,this.player.y-30,'bullet');b.setDepth(6);b.body.velocity.y=-650;this.hitFx.setPosition(this.player.x,this.player.y-30).explode(3)}
update(time,delta){if(!this.active)return;this.bg1.tilePositionY-=1.0;this.bg2.tilePositionY-=0.5;const L=this.cursors?.left.isDown||(window.K&&window.K.L);const R=this.cursors?.right.isDown||(window.K&&window.K.R);if(L)this.player.body.velocity.x=-320;else if(R)this.player.body.velocity.x=320;else this.player.body.velocity.x=0;if(this.invincible>0){this.invincible-=delta/1000;this.player.setAlpha(0.4+0.6*Math.abs(Math.sin(time*0.015)))}else this.player.setAlpha(1);const firePressed=this.cursors?.space?.isDown||(window.K&&window.K.F);if(firePressed&&time-this.lastFire>this.fireRate){this.fireBullet();this.lastFire=time}this.bullets.getChildren().forEach(b=>{if(b.y<-20||b.y>GH+20)b.destroy()});this.enemies.getChildren().forEach(enemy=>{if(!enemy.active)return;enemy.x+=Math.sin(time*0.003+enemy.y*0.01)*1.2;if(enemy.y>GH+40){if(this.invincible<=0)this.damagePlayer(1);enemy.destroy()}});this.physics.overlap(this.bullets,this.enemies,(bullet,enemy)=>{bullet.destroy();enemy._health--;this.hitFx.setPosition(enemy.x,enemy.y).explode(6);if(enemy._health<=0){this.explosionFx.setPosition(enemy.x,enemy.y).explode(12);this.cameras.main.shake(80,0.005);this.score+=enemy._scoreValue||10;this.killed++;enemy.destroy()}this._updateHUD()});if(this.killed>=this.enemies.getLength()&&this.enemies.getLength()===0){this.active=!1;this.time.delayedCall(600,()=>{this.levelIndex++;if(this.levelIndex>=(CFG.lvls.length||5)){this.endGame(!0)}else{this.startLevel()}})}}
damagePlayer(amt){if(this.invincible>0)return;this.hp-=amt;this.invincible=1.5;this.cameras.main.shake(180,0.012);this.explosionFx.setPosition(this.player.x,this.player.y).explode(6);this._updateHUD();if(this.hp<=0){this.active=!1;this.time.delayedCall(500,()=>this.endGame(!1))}}
endGame(won){this.active=!1;this.enemies.clear(!0,!0);this.bullets.clear(!0,!0);document.getElementById('hud').style.display='none';document.getElementById('fireBtn').style.display='none';document.getElementById('movePad').style.display='none';const e=document.getElementById('sEnd');e.querySelector('.g-title').textContent=won?'¡Ganaste!':'Game Over';document.getElementById('finalScore').textContent='Puntos: '+this.score;e.classList.add('on')}
resetGame(){this.score=0;this.hp=this.maxHp;this.levelIndex=0;this.active=!1;this.invincible=0;this.killed=0;this.enemies.clear(!0,!0);this.bullets.clear(!0,!0);this.player.setPosition(GW/2,GH-80).setAlpha(1);this._updateHUD()}
_updateHUD(){document.getElementById('hudScore').textContent=this.score;document.getElementById('hudLevel').textContent=this.levelIndex+1;document.getElementById('hpFill').style.width=(Math.max(0,this.hp/this.maxHp)*100)+'%'}}
new Phaser.Game({type:Phaser.AUTO,width:GW,height:GH,backgroundColor:0x000000,physics:{default:'arcade',arcade:{gravity:{y:0},debug:!1}},scene:[BootScene,GameScene],parent:'wrap',scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH}});
function startGame(){document.getElementById('sStart').classList.remove('on');document.getElementById('sEnd').classList.remove('on');document.getElementById('hud').style.display='flex';if(isMob()){document.getElementById('fireBtn').style.display='flex';document.getElementById('movePad').style.display='flex'}if(gameScene){gameScene.resetGame();gameScene.startLevel()}}
document.getElementById('fireBtn')?.addEventListener('pointerdown',()=>{window.K.F=!0;document.getElementById('fireBtn').classList.add('on')});
document.getElementById('fireBtn')?.addEventListener('pointerup',()=>{window.K.F=!1;document.getElementById('fireBtn').classList.remove('on')});
document.getElementById('mpL')?.addEventListener('pointerdown',()=>{window.K.L=!0;document.getElementById('mpL').classList.add('on')});
document.getElementById('mpL')?.addEventListener('pointerup',()=>{window.K.L=!1;document.getElementById('mpL').classList.remove('on')});
document.getElementById('mpR')?.addEventListener('pointerdown',()=>{window.K.R=!0;document.getElementById('mpR').classList.add('on')});
document.getElementById('mpR')?.addEventListener('pointerup',()=>{window.K.R=!1;document.getElementById('mpR').classList.remove('on')});
</script>
</body>
</html>
