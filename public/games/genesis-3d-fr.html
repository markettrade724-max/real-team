<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Genèse 3D</title>
  <style>
    :root { --acc: #4a90d9; --bg: #0a0a14; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      font-family: 'Segoe UI', Tajawal, sans-serif;
    }
    #header {
      background: rgba(0,0,0,0.6);
      padding: 8px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      color: white;
    }
    #back-btn {
      background: none; border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 4px 12px; border-radius: 6px;
      cursor: pointer; font-family: inherit;
    }
    #title { font-weight: bold; color: var(--acc); }
    #game-container { flex: 1; background: #000; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div id="header">
    <button id="back-btn" onclick="history.back()">← Retour</button>
    <span id="title">🚀 Genèse 3D</span>
    <div style="width:50px"></div>
  </div>
  <div id="game-container">
    <!-- ✅ إضافة allow="cross-origin-isolated" -->
    <iframe
      src="/games/godot/genesis-3d/index.html"
      allowfullscreen="true"
      allow="cross-origin-isolated"
    ></iframe>
  </div>
</body>
</html>
