<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Genèse 3D</title>
  <style>
    :root {
      --acc: #4a90d9;
      --bg: #0a0a14;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      font-family: 'Segoe UI', Tajawal, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }
    #header {
      background: rgba(0,0,0,0.6);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      color: white;
      z-index: 10;
    }
    #back-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }
    #title { font-weight: bold; color: var(--acc); }
    #game-container {
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="header">
    <button id="back-btn" onclick="history.back()">← Retour</button>
    <span id="title">🚀 Genèse 3D</span>
    <div style="width:50px"></div>
  </div>
  <div id="game-container">
    <canvas id="canvas"></canvas>
  </div>

  <script type="module">
    // استيراد محرك Godot من ملف اللعبة المُصدَّر
    import { Engine } from '/games/godot/genesis-3d/index.js';

    const canvas = document.getElementById('canvas');

    // تهيئة المحرك
    const engine = new Engine({
      canvas: canvas,
      executable: '/games/godot/genesis-3d/index',
      // اختياري: إضافة دوال للتحكم بالتركيز والرؤية
    });

    engine.startGame();
  </script>
</body>
</html>
