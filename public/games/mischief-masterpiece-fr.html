<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chef-d'œuvre du Chahut</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<style>
:root{--acc:#f472b6;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#000;
  font-family:'Segoe UI',Tajawal,sans-serif;color:#f1f5f9;}
#wrap{position:relative;width:100%;max-width:420px;height:100dvh;margin:0 auto;overflow:hidden;}
#wrap canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;}
.scr{position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;text-align:center;
  padding:28px;background:linear-gradient(180deg,#020209,#080820);z-index:50;}
.scr.on{display:flex;}
.g-title{font-size:2rem;font-weight:900;color:var(--acc);letter-spacing:-1px;
  text-shadow:0 0 30px var(--acc);}
.g-desc{color:#64748b;font-size:.88rem;line-height:1.6;max-width:300px;}
.btn{padding:13px 0;border-radius:12px;font-size:.95rem;font-weight:700;border:none;
  cursor:pointer;width:100%;max-width:300px;transition:transform .12s;
  display:flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;}
.btn:active{transform:scale(.96);}
.btn-p{background:var(--acc);color:#000;box-shadow:0 0 28px rgba(244,114,182,.4);}
.btn-s{background:rgba(255,255,255,.07);color:#f1f5f9;border:1px solid rgba(255,255,255,.1);}

#hud{position:absolute;top:0;left:0;right:0;display:none;
  justify-content:space-between;align-items:center;padding:8px 14px;
  background:rgba(0,0,0,.65);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,.06);z-index:20;}
.hud-bl{display:flex;flex-direction:column;}
.hud-l{font-size:.52rem;color:#64748b;text-transform:uppercase;letter-spacing:.1em;}
.hud-v{font-size:.95rem;font-weight:900;color:var(--acc);font-family:monospace;}
#hpWrap{display:flex;align-items:center;gap:6px;}
#hpBar{width:80px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
#hpFill{height:100%;border-radius:3px;background:linear-gradient(90deg,#ef4444,#f97316);transition:width .3s;}

#lvFlash{position:absolute;top:54px;left:50%;transform:translateX(-50%);
  background:rgba(244,114,182,.12);border:1px solid rgba(244,114,182,.4);
  color:var(--acc);padding:5px 18px;border-radius:100px;
  font-weight:900;font-size:.85rem;font-family:monospace;
  letter-spacing:.1em;display:none;z-index:25;white-space:nowrap;
  text-shadow:0 0 10px var(--acc);}

#fireBtn{position:absolute;bottom:20px;right:20px;
  width:68px;height:68px;border-radius:50%;
  background:rgba(244,114,182,.15);border:2px solid rgba(244,114,182,.5);
  display:none;align-items:center;justify-content:center;
  z-index:20;user-select:none;-webkit-user-select:none;cursor:pointer;}
#fireBtn svg{width:28px;height:28px;fill:var(--acc);}
#fireBtn.on{background:rgba(244,114,182,.45);}

#movePad{position:absolute;bottom:20px;left:20px;
  width:100px;height:68px;border-radius:14px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  display:none;align-items:center;justify-content:space-between;
  padding:0 8px;z-index:20;}
.mpBtn{width:42px;height:42px;border-radius:10px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;-webkit-user-select:none;}
.mpBtn svg{width:18px;height:18px;fill:#94a3b8;}
.mpBtn.on{background:rgba(255,255,255,.22);}
</style>
</head>
<body>
<div id="wrap">
  <div class="scr on" id="sStart">
    <div class="g-title">Chef-d'œuvre du Chahut</div>
    <div class="g-desc">Jeu d'arcade fou et sans arrêt — rivalisez au milieu d'une hilarité chaotique!</div>
    <button class="btn btn-p" onclick="startGame()">▶ Jouer</button>
  </div>

  <div id="hud">
    <div class="hud-bl">
      <div class="hud-l">Score</div>
      <div class="hud-v" id="hudScore">0</div>
    </div>
    <div class="hud-bl" style="align-items:center">
      <div class="hud-l">Niveau</div>
      <div class="hud-v" id="hudLevel">1</div>
    </div>
    <div class="hud-bl" style="align-items:flex-end">
      <div class="hud-l">HP</div>
      <div id="hpWrap"><div id="hpBar"><div id="hpFill" style="width:100%"></div></div></div>
    </div>
  </div>

  <div id="lvFlash">LEVEL 1</div>

  <div id="fireBtn">
    <svg viewBox="0 0 24 24"><polygon points="12,2 22,22 12,17 2,22"/></svg>
  </div>

  <div id="movePad">
    <div class="mpBtn" id="mpL"><svg viewBox="0 0 24 24"><polygon points="15,4 5,12 15,20"/></svg></div>
    <div class="mpBtn" id="mpR"><svg viewBox="0 0 24 24"><polygon points="9,4 19,12 9,20"/></svg></div>
  </div>

  <div class="scr" id="sEnd">
    <div style="font-size:3rem">💥</div>
    <div class="g-title" style="font-size:1.6rem">Game Over</div>
    <button class="btn btn-p" onclick="startGame()">Réessayer</button>
  </div>
</div>

<script>
const CFG = {
  pid: 'mischief-masterpiece',
  lang: 'fr',
  acc: '#f472b6',
  accN: parseInt('#f472b6'.replace('#',''), 16),
  accRGB: [244,114,182].map(Number),
  iaps: [{"id":"no-ads","type":"remove_ads","price":1.99,"emoji":"🚫","name":{"ar":"إزالة الإعلانات","en":"Remove Ads","fr":"Sans pub","es":"Sin anuncios","de":"Werbefrei","zh":"去广告"}},{"id":"theme-pack","type":"cosmetic","price":1.49,"emoji":"🎨","name":{"ar":"حزمة الثيمات","en":"Themes Pack","fr":"Pack thèmes","es":"Pack temas","de":"Theme-Paket","zh":"主题包"}},{"id":"full-unlock","type":"unlock","price":2.99,"emoji":"⭐","name":{"ar":"فتح كل المحتوى","en":"Unlock All","fr":"Tout débloquer","es":"Desbloquear todo","de":"Alles freischalten","zh":"解锁全部"}}],
  lvls: [{"enemyCount":8,"enemySpeed":1.3,"enemyHealth":1,"bulletSpeed":6,"spawnInterval":90},{"enemyCount":11,"enemySpeed":1.6,"enemyHealth":1,"bulletSpeed":6,"spawnInterval":80},{"enemyCount":14,"enemySpeed":1.9,"enemyHealth":2,"bulletSpeed":6,"spawnInterval":70},{"enemyCount":17,"enemySpeed":2.2,"enemyHealth":2,"bulletSpeed":6,"spawnInterval":60},{"enemyCount":20,"enemySpeed":2.5,"enemyHealth":3,"bulletSpeed":6,"spawnInterval":50}] || []
};
if (!CFG.lvls.length) {
  CFG.lvls = [
    { enemyCount:8,  enemySpeed:1.3, enemyHealth:1 },
    { enemyCount:11, enemySpeed:1.6, enemyHealth:1 },
    { enemyCount:14, enemySpeed:1.9, enemyHealth:2 },
    { enemyCount:17, enemySpeed:2.2, enemyHealth:2 },
    { enemyCount:20, enemySpeed:2.5, enemyHealth:3 },
  ];
}

const SK = 'rt_' + CFG.pid;
const S  = () => JSON.parse(localStorage.getItem(SK) || '{}');
const sv = d  => localStorage.setItem(SK, JSON.stringify({...S(),...d}));
const mob = () => 'ontouchstart' in window && matchMedia('(pointer: coarse)').matches;

const GW = Math.min(window.innerWidth, 420);
const GH = window.innerHeight;

class Boot extends Phaser.Scene {
  constructor(){ super('Boot'); }
  create(){
    const g = this.make.graphics({add:false});
    g.fillStyle(0x030310); g.fillRect(0,0,512,512);
    for(let i=0;i<200;i++){ g.fillStyle(0xffffff, Math.random()*.7); g.fillRect(Math.random()*512|0, Math.random()*512|0, 1, 1); }
    g.generateTexture('stars',512,512); g.destroy();

    const pg = this.make.graphics({add:false});
    pg.fillStyle(CFG.accN,.25); pg.fillEllipse(18, 46, 22, 14);
    pg.fillStyle(0xd0d8f0,1); pg.fillTriangle(18,2, 32,38, 4,38);
    pg.fillStyle(CFG.accN,.85); pg.fillEllipse(18, 19, 12, 18);
    pg.generateTexture('player',36,50); pg.destroy();

    const eg = this.make.graphics({add:false});
    eg.fillStyle(0xff4444,1); eg.fillEllipse(14, 11, 28, 22);
    eg.fillStyle(0x00ffff,.5); eg.fillEllipse(14, 7, 8, 6);
    eg.generateTexture('enemy',28,22); eg.destroy();

    const bg = this.make.graphics({add:false});
    bg.fillStyle(0xffffff,1); bg.fillRect(0,0,4,16);
    bg.generateTexture('bullet',4,16); bg.destroy();

    const pg2 = this.make.graphics({add:false});
    pg2.fillStyle(0xffffff); pg2.fillRect(0,0,4,4);
    pg2.generateTexture('px',4,4); pg2.destroy();

    this.scene.start('Game');
  }
}

class Game extends Phaser.Scene {
  constructor(){ super('Game'); }
  create(){
    this.lvIdx=0; this.score=0; this.hp=3; this.active=false; this.invincible=0; this.killed=0;
    this.bg1 = this.add.tileSprite(GW/2,GH/2,GW,GH,'stars').setDepth(0);
    this.player = this.physics.add.image(GW/2, GH-90, 'player').setDepth(6).setCollideWorldBounds(true).body.setSize(24,36).setOffset(6,8);
    this.bullets = this.physics.add.group();
    this.enemies = this.physics.add.group();
    this.cursors = this.input.keyboard?.createCursorKeys();
    window._gs = this;
  }

  startLevel(){
    this.active=true; this.killed=0; this.enemies.clear(true,true); this.bullets.clear(true,true);
    const lv = CFG.lvls[this.lvIdx] || CFG.lvls[0];
    const cnt = lv.enemyCount || 8, spd = lv.enemySpeed || 1.3;
    for(let i=0;i<cnt;i++){
      const x = 30 + (i%5)*(GW-60)/4;
      const y = 50 + Math.floor(i/5)*40;
      const e = this.physics.add.image(x, -y, 'enemy').setDepth(5).body.setSize(24,20).setOffset(2,2).velocity.y = spd*30;
      this.enemies.add(e);
    }
    document.getElementById('lvFlash').style.display='block';
    setTimeout(()=>document.getElementById('lvFlash').style.display='none',1500);
    this._updateHUD();
  }

  update(time, delta){
    if(!this.active) return;
    const dt = delta/1000;
    this.bg1.tilePositionY -= 1.4;
    const L = this.cursors?.left.isDown, R = this.cursors?.right.isDown;
    this.player.body.velocity.x = L?-290:R?290:0;
    if(this.invincible>0){ this.invincible-=dt; this.player.setAlpha(.5+Math.abs(Math.sin(time*.015))); }
    else this.player.setAlpha(1);

    if(this.cursors?.space.isDown){
      if(!this._lastFire || time-this._lastFire>200){
        const b = this.physics.add.image(this.player.x, this.player.y-28,'bullet').setDepth(7).body.velocity.y=-580;
        this.bullets.add(b); this._lastFire=time;
      }
    }

    this.enemies.getChildren().forEach(e=>{
      if(!e.active) return;
      e.x += Math.sin(time*.002+e.y)*1.5;
      if(e.y>GH+40){ if(this.invincible<=0) this._damagePlayer(1); e.destroy(); }
    });

    this.physics.overlap(this.bullets, this.enemies, (b,e)=>{
      b.destroy(); e.destroy(); this.score+=10*(this.lvIdx+1); this.killed++;
      this._updateHUD();
    });

    if(this.killed>=this.enemies.getLength()&&this.enemies.getLength()===0){
      this.active=false;
      this.time.delayedCall(800,()=>{
        this.lvIdx++;
        if(this.lvIdx>=CFG.lvls.length){ _endGame(true,this.score); return; }
        this.startLevel();
      });
    }
  }

  _damagePlayer(amt){
    if(this.invincible>0) return;
    this.hp-=amt; this.invincible=2;
    this.cameras.main.shake(200,.012);
    this._updateHUD();
    if(this.hp<=0){ this.active=false; this.time.delayedCall(600,()=>_endGame(false,this.score)); }
  }

  _updateHUD(){
    document.getElementById('hudScore').textContent=this.score;
    document.getElementById('hudLevel').textContent=this.lvIdx+1;
    const pct=(this.hp/3)*100;
    document.getElementById('hpFill').style.width=pct+'%';
    document.getElementById('hpFill').style.background=pct>60?'linear-gradient(90deg,#22cc44,#44ff66)':pct>30?'linear-gradient(90deg,#f97316,#fbbf24)':'linear-gradient(90deg,#ef4444,#ff6666)';
  }

  resetGame(){
    this.lvIdx=0; this.score=0; this.hp=3; this.active=false; this.invincible=0; this.killed=0;
    this.enemies.clear(true,true); this.bullets.clear(true,true);
    this.player.setPosition(GW/2,GH-90).setAlpha(1); this._updateHUD();
  }
}

new Phaser.Game({
  type: Phaser.AUTO, width:GW, height:GH, backgroundColor:0x000000,
  physics:{default:'arcade',arcade:{gravity:{y:0},debug:false}},
  scene:[Boot,Game], parent:'wrap'
});

function startGame(){
  document.getElementById('sStart').classList.remove('on');
  document.getElementById('sEnd').classList.remove('on');
  document.getElementById('hud').style.display='flex';
  if(mob()){ document.getElementById('fireBtn').style.display='flex'; document.getElementById('movePad').style.display='flex'; }
  const sc=window._gs; if(sc){ sc.resetGame(); sc.startLevel(); }
}
function _endGame(win,score){
  document.getElementById('hud').style.display='none';
  document.getElementById('fireBtn').style.display='none';
  document.getElementById('movePad').style.display='none';
  document.getElementById('sEnd').classList.add('on');
  document.getElementById('sEnd').querySelector('.g-title').textContent=win?'Bravo!':'Game Over';
}
</script>
</body>
</html>
