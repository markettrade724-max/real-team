<!DOCTYPE html>
<html lang="zh" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>叙事熔炉 — realteam</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--acc:#818cf8;--bg:#0a0608;--panel:#120e10;--border:rgba(255,200,100,0.2);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Tajawal',sans-serif;color:#e8d5b0;min-height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(0,0,0,0.7);border-bottom:1px solid var(--border);flex-shrink:0;}
.hero-name{font-family:'Cinzel',serif;color:var(--acc);font-size:0.9rem;font-weight:700;}
.stats{display:flex;gap:12px;align-items:center;}
.stat{font-size:0.72rem;color:rgba(255,255,255,0.6);display:flex;align-items:center;gap:4px;}
.stat span{color:var(--acc);font-weight:700;}
.bar-w{width:50px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;display:inline-block;}
.bar-f{height:100%;border-radius:3px;transition:width 0.4s;}
.hp-f{background:linear-gradient(90deg,#ff4444,#ff8888);}
.mp-f{background:linear-gradient(90deg,#4488ff,#88aaff);}
.scene{flex:1;position:relative;overflow:hidden;min-height:140px;}
.scene-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity 0.8s;}
.scene-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.1),rgba(0,0,0,0.72));}
.scene-art{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.scene-emoji{font-size:clamp(3.5rem,12vw,7rem);filter:drop-shadow(0 0 28px var(--acc));animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.dialogue{flex-shrink:0;background:rgba(10,6,8,0.97);border-top:1px solid var(--border);padding:14px 16px;}
.speaker{font-family:'Cinzel',serif;color:var(--acc);font-size:0.8rem;margin-bottom:5px;font-weight:700;}
.text-box{font-size:0.9rem;line-height:1.7;color:#e8d5b0;min-height:52px;margin-bottom:10px;}
.choices{display:flex;flex-direction:column;gap:7px;}
.choice-btn{background:rgba(255,200,100,0.07);border:1px solid var(--border);color:#e8d5b0;
  padding:9px 14px;border-radius:8px;text-align:right;cursor:pointer;
  font-size:0.85rem;font-family:'Tajawal',sans-serif;transition:0.2s;line-height:1.4;}
.choice-btn:active{background:rgba(255,200,100,0.2);border-color:var(--acc);color:var(--acc);}
[dir=ltr] .choice-btn{text-align:left;}
.combat-view{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.93);
  flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:14px;}
.combat-view.active{display:flex;}
.enemy-disp{text-align:center;}
.enemy-emoji{font-size:clamp(2.8rem,10vw,5rem);animation:shk 0.6s ease infinite;}
@keyframes shk{0%,100%{transform:rotate(0)}25%{transform:rotate(-4deg)}75%{transform:rotate(4deg)}}
.enemy-name{font-family:'Cinzel',serif;color:#ff4444;font-size:1rem;margin:6px 0 4px;}
.enemy-hp-txt{font-size:0.75rem;color:rgba(255,255,255,0.5);margin-bottom:4px;}
.bar-w-big{width:160px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;}
.combat-btns{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:320px;}
.c-btn{padding:13px 8px;border-radius:10px;border:none;font-size:0.88rem;cursor:pointer;font-family:'Tajawal',sans-serif;font-weight:700;transition:0.15s;}
.c-btn:active{transform:scale(0.95);}
.c-atk{background:linear-gradient(135deg,#cc2200,#ff4422);color:#fff;}
.c-mag{background:linear-gradient(135deg,#2244cc,#4466ff);color:#fff;}
.c-def{background:linear-gradient(135deg,#226622,#44aa44);color:#fff;}
.c-itm{background:linear-gradient(135deg,#664400,#aa7700);color:#fff;}
.combat-log{font-size:0.8rem;color:#aaa;text-align:center;min-height:28px;}
.dmg-float{position:absolute;font-family:'Cinzel',serif;font-size:1.4rem;font-weight:900;pointer-events:none;animation:dmgUp 1s ease forwards;}
@keyframes dmgUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-55px)}}
.notif{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);border:1px solid var(--acc);padding:8px 18px;border-radius:8px;font-size:0.82rem;color:var(--acc);opacity:0;transition:opacity 0.3s;z-index:20;white-space:nowrap;pointer-events:none;}
.notif.show{opacity:1;}
</style>
</head>
<body>
<div class="topbar">
  <div class="hero-name" id="heroName">英雄</div>
  <div class="stats">
    <div class="stat">❤️<div class="bar-w"><div class="bar-f hp-f" id="hpBar" style="width:100%"></div></div><span id="hpVal">100</span></div>
    <div class="stat">✨<div class="bar-w"><div class="bar-f mp-f" id="mpBar" style="width:100%"></div></div><span id="mpVal">50</span></div>
    <div class="stat">⚔️Lv.<span id="lvlVal">1</span></div>
  </div>
</div>
<div class="scene" id="scene">
  <div class="scene-bg" id="sceneBg"></div>
  <div class="scene-ov"></div>
  <div class="scene-art"><div class="scene-emoji" id="sceneEmoji">🌑</div></div>
  <div class="combat-view" id="combatView">
    <div class="enemy-disp">
      <div class="enemy-emoji" id="enemyEmoji">👹</div>
      <div class="enemy-name" id="enemyName">Enemy</div>
      <div class="enemy-hp-txt" id="enemyHpTxt">HP: 50/50</div>
      <div class="bar-w-big"><div class="bar-f hp-f" id="enemyHpBar" style="width:100%"></div></div>
    </div>
    <div class="combat-log" id="combatLog">{{COMBAT_START_LBL}}</div>
    <div class="combat-btns">
      <button class="c-btn c-atk" onclick="doCombat('attack')">⚔️ 攻击</button>
      <button class="c-btn c-mag" onclick="doCombat('magic')">✨ {{MAGIC_LBL}}</button>
      <button class="c-btn c-def" onclick="doCombat('defend')">🛡️ {{DEFEND_LBL}}</button>
      <button class="c-btn c-itm" onclick="doCombat('item')">🧪 道具</button>
    </div>
  </div>
</div>
<div class="dialogue">
  <div class="speaker" id="speaker">{{NARRATOR_LBL}}</div>
  <div class="text-box" id="textBox">沉浸于叙事熔炉，一款开创性的协作游戏，你的创造力塑造着不断演变的体素景观及其所讲述的故事。见证高级AI“编年史官”如何将玩家的集体行动转化为史诗、异想天开或戏剧性的故事，在每个周期生成独特的传说和可分享的数字传奇。</div>
  <div class="choices" id="choices"></div>
</div>
<div class="notif" id="notif"></div>
<script src="/iap-modal.js"></script>
<script src="/social-bar.js"></script>
<script>
IAPStore.init('verse-forge','zh',[{"id":"no-ads","type":"remove_ads","price":1.99,"emoji":"🚫","name":{"ar":"إزالة الإعلانات","en":"Remove Ads","fr":"Sans pub","es":"Sin anuncios","de":"Werbefrei","zh":"去广告"}},{"id":"hint-pack","type":"consumable","price":0.99,"emoji":"💡","name":{"ar":"10 تلميحات","en":"10 Hints","fr":"10 indices","es":"10 pistas","de":"10 Hinweise","zh":"10个提示"}},{"id":"theme-pack","type":"cosmetic","price":1.49,"emoji":"🎨","name":{"ar":"حزمة الثيمات","en":"Themes Pack","fr":"Pack thèmes","es":"Pack temas","de":"Theme-Paket","zh":"主题包"}},{"id":"full-unlock","type":"unlock","price":2.99,"emoji":"⭐","name":{"ar":"فتح كل المحتوى","en":"Unlock All","fr":"Tout débloquer","es":"Desbloquear todo","de":"Alles freischalten","zh":"解锁全部"}}]);
SocialBar.init({title:'叙事熔炉',url:location.href,lang:'zh'});

const hero={hp:100,maxHp:100,mp:50,maxMp:50,atk:15,def:5,mag:12,level:1,xp:0,xpNext:100,gold:0,items:{potion:3},flags:{}};
let curEnemy=null,defending=false,curScene='intro',typeTimer;

const S={
  intro:{bg:'linear-gradient(135deg,#1a0a0f,#2d1020)',emoji:'🌑',sp:'{{NARRATOR_LBL}}',
    text:'{{SCENE_INTRO}}',
    choices:[{t:'{{CHOICE_ENTER}}',n:'village'},{t:'{{CHOICE_CAMP}}',n:'camp'}]},
  village:{bg:'linear-gradient(135deg,#0a1a0a,#1a3020)',emoji:'🏘️',sp:'{{ELDER_LBL}}',
    text:'{{SCENE_VILLAGE}}',
    choices:[{t:'{{CHOICE_ACCEPT}}',n:'forest',reward:{xp:20,gold:10}},{t:'{{CHOICE_SHOP}}',n:'shop'},{t:'{{CHOICE_LEAVE}}',n:'intro'}]},
  camp:{bg:'linear-gradient(135deg,#0a0a1a,#0f1520)',emoji:'🔥',sp:'{{NARRATOR_LBL}}',
    text:'{{SCENE_CAMP}}',
    choices:[{t:'{{CHOICE_REST}}',n:'intro',heal:30}]},
  shop:{bg:'linear-gradient(135deg,#1a1200,#2a1e00)',emoji:'⚗️',sp:'{{MERCHANT_LBL}}',
    text:'{{SCENE_SHOP}}',
    choices:[{t:'{{CHOICE_BUY_POTION}}',n:'village',buy:'potion',cost:15},{t:'{{CHOICE_LEAVE}}',n:'village'}]},
  forest:{bg:'linear-gradient(135deg,#041008,#081a10)',emoji:'🌲',sp:'{{NARRATOR_LBL}}',
    text:'{{SCENE_FOREST}}',
    choices:[
      {t:'{{CHOICE_FIGHT}}',n:'forest',combat:{name:'🐺 {{ENEMY_WOLF}}',hp:40,atk:12,emoji:'🐺',maxHp:40}},
      {t:'{{CHOICE_BACK}}',n:'village'}]},
  dungeon:{bg:'linear-gradient(135deg,#0d0810,#160c1e)',emoji:'🗝️',sp:'{{NARRATOR_LBL}}',
    text:'{{SCENE_DUNGEON}}',
    choices:[
      {t:'{{CHOICE_EXPLORE}}',n:'treasure',reward:{xp:50,gold:30}},
      {t:'{{CHOICE_BOSS}}',n:'dungeon',combat:{name:'👹 {{ENEMY_BOSS}}',hp:120,atk:22,emoji:'👹',maxHp:120,isBoss:true}}]},
  treasure:{bg:'linear-gradient(135deg,#1a1000,#2a1800)',emoji:'💎',sp:'{{NARRATOR_LBL}}',
    text:'{{SCENE_TREASURE}}',
    choices:[{t:'{{CHOICE_CONTINUE}}',n:'dungeon'}]},
  victory:{bg:'linear-gradient(135deg,#0a1a00,#182800)',emoji:'🏆',sp:'{{NARRATOR_LBL}}',
    text:'{{SCENE_VICTORY}}',
    choices:[{t:'{{CHOICE_RESTART}}',n:'intro',action:'revive'},{t:'🛒 {{SHOP_LBL}}',action:'shop'}]},
  defeat:{bg:'linear-gradient(135deg,#1a0000,#2a0000)',emoji:'💀',sp:'{{NARRATOR_LBL}}',
    text:'{{SCENE_DEFEAT}}',
    choices:[{t:'{{CHOICE_RESTART}}',n:'intro',action:'revive'}]},
};

function loadScene(k){
  curScene=k;const s=S[k];if(!s)return;
  document.getElementById('combatView').classList.remove('active');
  document.getElementById('sceneBg').style.background=s.bg||'#0a0608';
  document.getElementById('sceneEmoji').textContent=s.emoji||'🌑';
  document.getElementById('speaker').textContent=s.sp||'';
  typeText(s.text||'');
  const ch=document.getElementById('choices');ch.innerHTML='';
  (s.choices||[]).forEach(c=>{
    const b=document.createElement('button');b.className='choice-btn';b.textContent=c.t;
    b.onclick=()=>pick(c);ch.appendChild(b);
  });
}

function pick(c){
  if(c.action==='shop'){IAPStore.open();return;}
  if(c.action==='revive'){hero.hp=Math.floor(hero.maxHp*0.5);updateStats();}
  if(c.heal){hero.hp=Math.min(hero.maxHp,hero.hp+c.heal);updateStats();notify('❤️ +'+c.heal);}
  if(c.reward){if(c.reward.xp)gainXP(c.reward.xp);if(c.reward.gold){hero.gold+=c.reward.gold;notify('💰 +'+c.reward.gold);}}
  if(c.buy){if(hero.gold>=c.cost){hero.gold-=c.cost;hero.items[c.buy]=(hero.items[c.buy]||0)+1;notify('🧪 +1');}else{notify('{{NO_GOLD_LBL}}');return;}}
  if(c.combat){curEnemy={...c.combat};startCombat();return;}
  loadScene(c.n);
}

function startCombat(){
  defending=false;
  document.getElementById('combatView').classList.add('active');
  document.getElementById('enemyEmoji').textContent=curEnemy.emoji;
  document.getElementById('enemyName').textContent=curEnemy.name;
  updateEnemyHp();
  document.getElementById('combatLog').textContent='{{COMBAT_START_LBL}}';
}

function updateEnemyHp(){
  const p=(curEnemy.hp/curEnemy.maxHp)*100;
  document.getElementById('enemyHpBar').style.width=p+'%';
  document.getElementById('enemyHpTxt').textContent='HP: '+curEnemy.hp+'/'+curEnemy.maxHp;
}

function doCombat(a){
  if(!curEnemy)return;let log='';
  if(a==='attack'){const d=hero.atk+Math.floor(Math.random()*10)-2;curEnemy.hp-=d;log='⚔️ -'+d;showDmg('-'+d,'#ff4444');}
  else if(a==='magic'){if(hero.mp<10){document.getElementById('combatLog').textContent='{{NO_MP_LBL}}';return;}hero.mp-=10;const d=hero.mag+Math.floor(Math.random()*14);curEnemy.hp-=d;log='✨ -'+d;showDmg('-'+d,'#4488ff');}
  else if(a==='defend'){defending=true;log='🛡️ {{DEFEND_MSG_LBL}}';}
  else if(a==='item'){if(!(hero.items.potion>0)){document.getElementById('combatLog').textContent='{{NO_ITEM_LBL}}';return;}hero.items.potion--;hero.hp=Math.min(hero.maxHp,hero.hp+40);log='🧪 +40 HP';}
  curEnemy.hp=Math.max(0,curEnemy.hp);updateEnemyHp();updateStats();
  if(curEnemy.hp<=0){
    const xp=curEnemy.isBoss?200:80,g=curEnemy.isBoss?50:20;gainXP(xp);hero.gold+=g;
    if(curEnemy.isBoss)hero.flags.boss=true;
    document.getElementById('combatView').classList.remove('active');curEnemy=null;
    notify('🏆 +'+xp+' XP +'+g+'💰');
    loadScene(hero.flags.boss?'victory':'dungeon');return;
  }
  setTimeout(()=>{
    const bd=curEnemy.atk+Math.floor(Math.random()*7);
    const d=defending?Math.max(1,bd-hero.def-5):Math.max(1,bd-hero.def);
    hero.hp=Math.max(0,hero.hp-d);defending=false;
    log+=' | 👹 -'+d;document.getElementById('combatLog').textContent=log;
    updateStats();if(hero.hp<=0){document.getElementById('combatView').classList.remove('active');loadScene('defeat');}
  },400);
}

function showDmg(txt,col){
  const d=document.createElement('div');d.className='dmg-float';d.textContent=txt;
  d.style.cssText='color:'+col+';top:38%;left:50%;transform:translateX(-50%);position:absolute;';
  document.getElementById('combatView').appendChild(d);setTimeout(()=>d.remove(),1000);
}

function updateStats(){
  document.getElementById('hpVal').textContent=hero.hp;
  document.getElementById('mpVal').textContent=hero.mp;
  document.getElementById('lvlVal').textContent=hero.level;
  document.getElementById('hpBar').style.width=(hero.hp/hero.maxHp*100)+'%';
  document.getElementById('mpBar').style.width=(hero.mp/hero.maxMp*100)+'%';
}

function gainXP(n){
  hero.xp+=n;if(hero.xp>=hero.xpNext){hero.level++;hero.xp-=hero.xpNext;hero.xpNext=Math.floor(hero.xpNext*1.5);hero.maxHp+=20;hero.hp=hero.maxHp;hero.maxMp+=10;hero.mp=hero.maxMp;hero.atk+=3;hero.def+=2;hero.mag+=3;notify('🆙 LEVEL '+hero.level+'!');}
  updateStats();
}

function typeText(t){const el=document.getElementById('textBox');el.textContent='';let i=0;clearInterval(typeTimer);typeTimer=setInterval(()=>{el.textContent+=t[i++]||'';if(i>=t.length)clearInterval(typeTimer);},22);}

function notify(m){const n=document.getElementById('notif');n.textContent=m;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),2000);}

loadScene('intro');updateStats();
</script>
</body>
</html>
