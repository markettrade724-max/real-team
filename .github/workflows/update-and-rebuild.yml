name: Update Templates and Rebuild All Games

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install
      - name: Update products
        run: node update-products.js
      - name: Rebuild games
        run: node game-generator.js
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add products.json public/games/
          git diff --staged --quiet && echo "done" || (git commit -m "rebuild games" && git push)
