name: Godot Export to HTML5

on:
  push:
    paths:
      - 'godot-projects/**'
      - 'base-godot-project/**'
  workflow_dispatch:
    inputs:
      project-slug:
        description: 'مُعرّف المشروع (slug) لتصديره (اتركه فارغاً لتصدير الكل)'
        required: false

jobs:
  export-godot:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot Engine
        id: cache-godot
        uses: actions/cache@v3
        with:
          path: C:\godot
          key: godot-4.2.1-windows-x86_64

      - name: Download Godot Engine
        if: steps.cache-godot.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p /c/godot
          curl -L -o /c/godot/godot.zip https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_win64.exe.zip
          unzip -q /c/godot/godot.zip -d /c/godot
          rm /c/godot/godot.zip

      # ✅ إضافة: تنزيل Export Templates (كانت ناقصة)
      - name: Cache Godot Export Templates
        id: cache-templates
        uses: actions/cache@v3
        with:
          path: C:\Users\runneradmin\AppData\Roaming\Godot\export_templates\4.2.1.stable
          key: godot-templates-4.2.1-stable

      - name: Download Godot Export Templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        shell: bash
        run: |
          TEMPLATES_DIR="/c/Users/runneradmin/AppData/Roaming/Godot/export_templates/4.2.1.stable"
          mkdir -p "$TEMPLATES_DIR"
          echo "📥 Downloading Export Templates..."
          curl -L -o /tmp/templates.tpz https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$TEMPLATES_DIR/"
          rm -rf /tmp/templates /tmp/templates.tpz
          echo "✅ Templates installed in: $TEMPLATES_DIR"
          ls -la "$TEMPLATES_DIR/" | head -10

      - name: Export Godot projects
        shell: bash
        run: |
          echo "🔍=== START GODOT DIAGNOSTIC ==="
          echo "📁 Current directory: $(pwd)"

          GODOT_BIN="/c/godot/Godot_v4.2.1-stable_win64.exe"
          if [ ! -f "$GODOT_BIN" ]; then
            echo "❌ GODOT EXECUTABLE NOT FOUND: $GODOT_BIN"
            ls -la /c/godot/ 2>/dev/null || echo "  /c/godot/ does not exist"
            exit 1
          fi
          echo "✅ Godot found: $GODOT_BIN"
          echo ""

          echo "🔎 Scanning for project.godot files anywhere in the repository..."
          FOUND_PROJECTS=$(find . -name "project.godot" -type f 2>/dev/null)

          if [ -z "$FOUND_PROJECTS" ]; then
            echo "❌ NO GODOT PROJECT FOUND ANYWHERE IN THE REPOSITORY"
            ls -laR godot-projects/ 2>/dev/null || echo "  (folder not found)"
            find . -maxdepth 1 -name "*.gd" -o -name "*.tscn" -o -name "*.godot" 2>/dev/null || echo "  (no Godot files in root)"
            exit 1
          fi

          echo "✅ Found Godot projects:"
          echo "$FOUND_PROJECTS"
          echo ""

          export EXPORT_COUNT=0
          export FAILED_COUNT=0

          for proj_file in $FOUND_PROJECTS; do
            proj_dir=$(dirname "$proj_file")
            slug=$(basename "$proj_dir")

            echo ""
            echo "🎯=== EXPORTING: $slug ==="
            echo "📁 Project directory: $proj_dir"
            echo "📁 Contents of $proj_dir/:"
            ls -la "$proj_dir/"
            echo ""

            if [ ! -f "$proj_dir/export_presets.cfg" ]; then
              echo "⚠️  WARNING: export_presets.cfg not found. Creating default..."
              echo '[preset.0]' > "$proj_dir/export_presets.cfg"
              echo 'name="HTML5"' >> "$proj_dir/export_presets.cfg"
              echo 'platform="Web"' >> "$proj_dir/export_presets.cfg"
              echo 'runnable=true' >> "$proj_dir/export_presets.cfg"
              echo 'custom_features=""' >> "$proj_dir/export_presets.cfg"
              echo 'export_filter="all_resources"' >> "$proj_dir/export_presets.cfg"
              echo 'include_filter=""' >> "$proj_dir/export_presets.cfg"
              echo 'exclude_filter=""' >> "$proj_dir/export_presets.cfg"
              echo 'export_path="./index.html"' >> "$proj_dir/export_presets.cfg"
              echo 'encryption_include_filters=""' >> "$proj_dir/export_presets.cfg"
              echo 'encryption_exclude_filters=""' >> "$proj_dir/export_presets.cfg"
              echo 'script_encryption_key=""' >> "$proj_dir/export_presets.cfg"
              echo '' >> "$proj_dir/export_presets.cfg"
              echo '[preset.0.options]' >> "$proj_dir/export_presets.cfg"
              echo 'html/export_presets=""' >> "$proj_dir/export_presets.cfg"
              echo 'html/custom_html_shell=""' >> "$proj_dir/export_presets.cfg"
              echo 'html/head_include=""' >> "$proj_dir/export_presets.cfg"
              echo 'html/canvas_resize_policy=2' >> "$proj_dir/export_presets.cfg"
              echo 'html/focus_canvas_on_start=true' >> "$proj_dir/export_presets.cfg"
              echo 'html/experimental_ear_clipping=false' >> "$proj_dir/export_presets.cfg"
              echo 'progressive_web_app/enabled=false' >> "$proj_dir/export_presets.cfg"
              echo 'progressive_web_app/offline_page=""' >> "$proj_dir/export_presets.cfg"
              echo 'progressive_web_app/display=1' >> "$proj_dir/export_presets.cfg"
              echo 'progressive_web_app/orientation=0' >> "$proj_dir/export_presets.cfg"
              echo 'progressive_web_app/icon_144x144=""' >> "$proj_dir/export_presets.cfg"
              echo 'progressive_web_app/icon_180x180=""' >> "$proj_dir/export_presets.cfg"
              echo 'progressive_web_app/icon_maskable_192x192=""' >> "$proj_dir/export_presets.cfg"
              echo 'progressive_web_app/icon_maskable_512x512=""' >> "$proj_dir/export_presets.cfg"
              echo 'progressive_web_app/background_color=Color(0, 0, 0, 1)' >> "$proj_dir/export_presets.cfg"
              echo 'html/use_html5=true' >> "$proj_dir/export_presets.cfg"
              echo 'html/use_thread=true' >> "$proj_dir/export_presets.cfg"
              echo "✅ Default export_presets.cfg created"
            else
              echo "✅ export_presets.cfg found"
            fi
            echo ""

            OUTPUT_DIR="public/games/godot/$slug"
            mkdir -p "$OUTPUT_DIR"
            echo "📤 Output directory: $OUTPUT_DIR"
            echo ""

            echo "⚙️  Running Godot export (this may take a minute)..."
            LOG_FILE="/tmp/godot-export-$slug.log"

            # ✅ إصلاح: timeout لا يعمل على Windows، تم حذفه
            "$GODOT_BIN" \
              --headless \
              --path "$proj_dir" \
              --export-release "HTML5" "$OUTPUT_DIR/index.html" \
              > "$LOG_FILE" 2>&1

            GODOT_EXIT=$?

            if [ $GODOT_EXIT -ne 0 ]; then
              echo "❌ GODOT EXPORT FAILED (exit code: $GODOT_EXIT)"
              echo "📋 Godot output:"
              cat "$LOG_FILE"
              FAILED_COUNT=$((FAILED_COUNT + 1))
            else
              echo "✅ Export successful!"
              EXPORT_COUNT=$((EXPORT_COUNT + 1))
            fi

            echo ""
            echo "📁 Output files:"
            if [ -d "$OUTPUT_DIR" ]; then
              ls -lh "$OUTPUT_DIR/"
              if [ ! -f "$OUTPUT_DIR/index.html" ]; then
                echo "⚠️  WARNING: index.html not found!"
              fi
              SIZE=$(du -sh "$OUTPUT_DIR" | cut -f1)
              echo "💾 Total size: $SIZE"
            else
              echo "❌ Output directory not created"
            fi
            echo ""
          done

          echo "════════════════════════════════════"
          echo "🎉 GODOT EXPORT SUMMARY"
          echo "════════════════════════════════════"
          echo "✅ Successful exports: $EXPORT_COUNT"
          echo "❌ Failed exports: $FAILED_COUNT"

          if [ $FAILED_COUNT -gt 0 ]; then
            echo ""
            echo "❌ EXPORT COMPLETED WITH ERRORS"
            exit 1
          else
            echo ""
            echo "✅ ALL EXPORTS COMPLETED SUCCESSFULLY"
            exit 0
          fi

      - name: Commit exported files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "public/games/godot/" ] && [ "$(ls -A public/games/godot/ 2>/dev/null)" ]; then
            git add public/games/godot/
          fi
          if ! git diff --staged --quiet; then
            git commit -m "🎮 Auto-export Godot games [skip ci]"
            git pull --rebase origin main || git rebase --abort
            git push origin main
          else
            echo "No changes to commit"
          fi
