      - name: Replace Godot index.html with simple loader
        shell: bash
        run: |
          echo "🔧 Replacing Godot index.html with simple loader..."
          find public/games/godot -name "index.html" -type f | while read file; do
            # حفظ نسخة احتياطية
            cp "$file" "${file}.bak"
            
            # كتابة index.html بسيط يستخدم طريقة التحميل المباشرة
            cat > "$file" << 'HTMLEOF'
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Godot Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script src="index.js"></script>
<script>
// انتظر حتى يتم تعريف Engine
function waitForEngine(callback) {
  if (typeof Engine !== 'undefined') {
    callback();
  } else {
    setTimeout(function() { waitForEngine(callback); }, 50);
  }
}

waitForEngine(function() {
  var engine = new Engine({
    canvas: document.getElementById('canvas'),
    executable: 'index',
    onProgress: function(current, total) {
      console.log('Loading: ' + current + '/' + total);
    }
  });
  engine.startGame();
});
</script>
</body>
</html>
HTMLEOF
            echo "✅ Replaced: $file"
          done
