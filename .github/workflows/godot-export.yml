name: Godot Export to HTML5

on:
  push:
    paths:
      - 'godot-projects/**'
      - '.github/workflows/godot-export.yml'
  workflow_dispatch:
    inputs:
      project-slug:
        description: 'مُعرّف المشروع (slug) - اتركه فارغاً لتصدير الكل'
        required: false
        default: ''

env:
  GODOT_VERSION: 4.2.1
  GODOT_BIN: "Godot_v4.2.1-stable_linux.x86_64"

jobs:
  export-godot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Godot Engine
        id: cache-godot
        uses: actions/cache@v3
        with:
          path: |
            /home/runner/godot
          key: godot-${{ env.GODOT_VERSION }}-linux
          restore-keys: godot-${{ env.GODOT_VERSION }}

      - name: Download Godot Engine
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p /home/runner/godot
          cd /home/runner/godot
          echo "📥 Downloading Godot ${{ env.GODOT_VERSION }}..."
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/${{ env.GODOT_BIN }}.zip
          unzip -q ${{ env.GODOT_BIN }}.zip
          chmod +x ${{ env.GODOT_BIN }}
          rm ${{ env.GODOT_BIN }}.zip
          ls -lh ${{ env.GODOT_BIN }}

      - name: Verify Godot
        run: |
          /home/runner/godot/${{ env.GODOT_BIN }} --version
          echo "✅ Godot is ready"

      - name: Export Projects
        run: |
          GODOT="/home/runner/godot/${{ env.GODOT_BIN }}"
          SUCCESS=0
          FAILED=0
          
          echo "🔍 Checking for projects in godot-projects/"
          
          if [ ! -d "godot-projects" ]; then
            echo "❌ Directory godot-projects/ not found"
            exit 1
          fi
          
          # Find all project directories
          for proj_path in godot-projects/*/; do
            if [ ! -d "$proj_path" ]; then
              continue
            fi
            
            slug=$(basename "$proj_path")
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🎯 Exporting: $slug"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Check if project.godot exists
            if [ ! -f "$proj_path/project.godot" ]; then
              echo "❌ Missing project.godot"
              FAILED=$((FAILED + 1))
              continue
            fi
            
            # Create export presets if missing
            if [ ! -f "$proj_path/export_presets.cfg" ]; then
              echo "⚠️  Creating export_presets.cfg..."
              cat > "$proj_path/export_presets.cfg" << 'PRESET'
[preset.0]
name="HTML5"
platform="Web"
runnable=true
export_filter="all_resources"
export_path="./index.html"

[preset.0.options]
html/custom_html_shell=""
html/head_include=""
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/use_html5=true
html/use_thread=true
PRESET
            fi
            
            # Create output directory
            OUTPUT="public/games/godot/$slug"
            rm -rf "$OUTPUT"
            mkdir -p "$OUTPUT"
            
            # Run export
            echo "⚙️  Exporting to HTML5..."
            if timeout 300 "$GODOT" \
              --headless \
              --path "$proj_path" \
              --export-release "HTML5" "$OUTPUT/index.html" 2>&1 | grep -E "(Exporting|ERROR|error)" ; then
              
              # Check if export succeeded
              if [ -f "$OUTPUT/index.html" ]; then
                SIZE=$(du -sh "$OUTPUT" | cut -f1)
                echo "✅ Success! Size: $SIZE"
                SUCCESS=$((SUCCESS + 1))
              else
                echo "❌ Export failed - no index.html"
                FAILED=$((FAILED + 1))
              fi
            else
              echo "❌ Export failed or timed out"
              FAILED=$((FAILED + 1))
            fi
          done
          
          echo ""
          echo "════════════════════════════════"
          echo "📊 Results"
          echo "════════════════════════════════"
          echo "✅ Success: $SUCCESS"
          echo "❌ Failed: $FAILED"
          echo "════════════════════════════════"
          
          if [ $FAILED -gt 0 ]; then
            exit 1
          fi

      - name: Commit and Push
        if: success()
        run: |
          if [ ! -d "public/games/godot" ]; then
            echo "❌ No output directory created"
            exit 1
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "ℹ️  No changes to commit"
            exit 0
          fi
          
          git add public/games/godot/
          git commit -m "🎮 Auto-export Godot games [skip ci]" || true
          git push origin main || true
          echo "✅ Changes pushed"
