name: Run All Agents

on:
  schedule:
    - cron: '0 8 * * 1'   # كل إثنين الساعة 8 صباحاً
  workflow_dispatch:        # تشغيل يدوي

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run orchestrator
        run: node orchestrator.js
        env:
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SITE_URL: https://real-team-production.up.railway.app

      - name: Commit all changes
        run: |
          git config user.name  "agents-bot[bot]"
          git config user.email "agents-bot@users.noreply.github.com"
          git add products.json public/games/ agent-results/
          git diff --staged --quiet && echo "⏭ No changes" || (git commit -m "🤖 Agents: weekly update [skip ci]" && git push)
