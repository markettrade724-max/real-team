name: Run All Agents

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create agent-results directory
        run: mkdir -p agent-results

      - name: Run orchestrator
        run: node orchestrator.js
        env:
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SITE_URL: https://real-team-production.up.railway.app

      - name: Show results
        run: |
          echo "=== agent-results ==="
          ls -la agent-results/ || echo "empty"
          echo "=== products count ==="
          node -e "const p=JSON.parse(require('fs').readFileSync('products.json')); console.log('Products:', p.length)"

      - name: Commit all changes
        run: |
          git config user.name  "agents-bot[bot]"
          git config user.email "agents-bot@users.noreply.github.com"
          git add -f agent-results/
          git add products.json public/games/
          git diff --staged --quiet && echo "No changes" || (git commit -m "🤖 Agents: weekly update [skip ci]" && git push)
