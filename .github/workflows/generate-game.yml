name: Generate Games & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate all available games & apps
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: node game-generator.js

      - name: Verify output
        run: |
          COUNT=$(find public/games -name "*.html" 2>/dev/null | wc -l)
          echo "✅ Generated $COUNT HTML files"
          if [ "$COUNT" -eq "0" ]; then
            echo "❌ No files generated — aborting"
            exit 1
          fi

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/games/
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "🎮 Auto-generate games [skip ci]" && git push)
