name: Deploy and Run Server

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *'  # كل ساعة
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Verify Supabase package installed
      run: npm list @supabase/supabase-js || echo "Package not found"
    
    - name: Run server in background
      run: |
        node server.js &
        sleep 5
    
    - name: Test API endpoints
      run: |
        echo "Testing /api/earnings..."
        curl -s http://localhost:3000/api/earnings || echo "API not ready yet"
        
        echo "Testing /api/earnings/total..."
        curl -s http://localhost:3000/api/earnings/total || echo "API not ready yet"
    
    - name: Keep server alive
      run: sleep 3600  # يحافظ على تشغيل السيرفر لمدة ساعة
