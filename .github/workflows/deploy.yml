name: Run Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm install
    
    - name: Start server
      run: |
        node server.js 2>&1 | tee server.log &
        SERVER_PID=$!
        sleep 10
        
        # تحقق إذا كان السيرفر لا يزال يعمل
        if kill -0 $SERVER_PID 2>/dev/null; then
          echo "✅ Server is running (PID: $SERVER_PID)"
          curl http://localhost:3000/api/test
        else
          echo "❌ Server failed to start"
          cat server.log
          exit 1
        fi
        
        # ابق السيرفر يعمل
        wait $SERVER_PID
    
    - name: Keep running
      run: sleep 3600
