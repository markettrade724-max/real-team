name: Run Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 👈 أضف هذا السطر

jobs:
  run:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Start server
      run: |
        node server.js &
        sleep 5
        curl http://localhost:3000/api/test || echo "Server running"
    
    - name: Keep running
      run: sleep 3600
