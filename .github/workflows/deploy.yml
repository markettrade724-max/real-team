name: Run Server

on:
  push:
    branches: [ main ]      # 👈 يعمل تلقائياً عند الدفع
  workflow_dispatch:        # 👈 يمكن تشغيله يدوياً أيضاً

jobs:
  run:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm install
    
    - name: Start server
      run: |
        node server.js &
        sleep 5
        curl http://localhost:3000/api/test
    
    - name: Keep running
      run: sleep 3600
